<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIBESIM // OVERDRIVE X1</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap');

        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff00ff;
            --deep-space: #05070a;
            --panel-bg: rgba(10, 15, 25, 0.95);
            --border-glow: rgba(0, 242, 255, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

        body {
            background-color: var(--deep-space);
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Top HUD */
        header {
            height: 60px;
            border-bottom: 1px solid var(--border-glow);
            display: flex;
            align-items: center;
            padding: 0 30px;
            justify-content: space-between;
            background: linear-gradient(90deg, #0a0f19 0%, #000 100%);
        }

        .logo { font-family: 'Orbitron', sans-serif; letter-spacing: 5px; color: var(--neon-blue); font-weight: 700; }

        #main-layout {
            display: grid;
            grid-template-columns: 380px 1fr 380px;
            flex: 1;
            padding: 15px;
            gap: 15px;
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            padding: 20px;
            position: relative;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        .panel::before {
            content: ""; position: absolute; top: 0; left: 0; width: 10px; height: 10px;
            border-top: 2px solid var(--neon-blue); border-left: 2px solid var(--neon-blue);
        }

        h2 { font-family: 'Orbitron', sans-serif; font-size: 0.8rem; margin-bottom: 20px; color: var(--neon-pink); text-transform: uppercase; }

        /* Controls Overhaul */
        .control-row { margin-bottom: 20px; }
        label { display: block; font-size: 10px; color: #888; margin-bottom: 8px; }
        
        input[type="range"] {
            -webkit-appearance: none; width: 100%; background: transparent;
        }
        input[type="range"]::-webkit-slider-runnable-track {
            background: #1a202c; height: 2px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 14px; width: 14px; background: var(--neon-blue);
            margin-top: -6px; border-radius: 0; box-shadow: 0 0 10px var(--neon-blue);
        }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .stat-box { background: #000; padding: 15px; border-left: 2px solid var(--neon-blue); }
        .stat-label { font-size: 9px; color: #555; display: block; }
        .stat-value { font-size: 1.2rem; color: var(--neon-blue); font-family: 'Orbitron'; }

        /* Viewport */
        #viewport {
            grid-column: 2;
            position: relative;
            background: #000;
            border: 1px solid var(--border-glow);
        }

        canvas { width: 100% !important; height: 100% !important; }

        /* Chart Vertical Stack */
        .right-sidebar { display: flex; flex-direction: column; gap: 15px; }
        .chart-container { flex: 1; min-height: 0; }

        .resonance-warning {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 0, 255, 0.2); border: 1px solid var(--neon-pink);
            padding: 10px 30px; color: var(--neon-pink); font-size: 12px;
            display: none; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">VIBESIM // OD-X1</div>
        <div id="system-time" style="font-size: 12px; color: var(--neon-blue)">CORE_STABLE_001</div>
    </header>

    <div id="main-layout">
        <aside class="panel">
            <h2>System Calibration</h2>
            
            <div class="control-row">
                <label>INERTIAL MASS (kg)</label>
                <input type="range" id="mass" min="1" max="20" step="0.1" value="5">
            </div>
            
            <div class="control-row">
                <label>TENSION STIFFNESS (N/m)</label>
                <input type="range" id="stiffness" min="100" max="2000" step="10" value="500">
            </div>

            <div class="control-row">
                <label>DAMPING COEFFICIENT</label>
                <input type="range" id="damping" min="0.1" max="15" step="0.1" value="2">
            </div>

            <hr style="border: 0; border-top: 1px solid #111; margin: 25px 0;">

            <h2>Excitation Matrix</h2>
            
            <div class="control-row">
                <label>INPUT FREQUENCY (rad/s)</label>
                <input type="range" id="frequency" min="0" max="50" step="0.1" value="10">
            </div>

            <div class="control-row">
                <label>MAGNITUDE (N)</label>
                <input type="range" id="force" min="0" max="100" step="1" value="30">
            </div>

            <div class="stat-grid">
                <div class="stat-box">
                    <span class="stat-label">NATURAL FREQ</span>
                    <div class="stat-value" id="val-fn">--</div>
                </div>
                <div class="stat-box">
                    <span class="stat-label">AMPLITUDE</span>
                    <div class="stat-value" id="val-amp">--</div>
                </div>
            </div>
        </aside>

        <main id="viewport">
            <div id="three-container"></div>
            <div class="resonance-warning" id="resonance-ui">WARNING: RESONANCE CASCADE IMMINENT</div>
        </main>

        <div class="right-sidebar">
            <div class="panel chart-container">
                <h2>Phase Space Analysis</h2>
                <canvas id="phaseChart"></canvas>
            </div>
            <div class="panel chart-container">
                <h2>Time-Domain Trace</h2>
                <canvas id="timeChart"></canvas>
            </div>
        </div>
    </div>

<script>
/**
 * RE-ENGINEERED PHYSICS: 2D FORCED HARMONIC OSCILLATION
 */
class CoreEngine {
    constructor() {
        this.params = { m: 5, k: 500, c: 2, w: 10, f0: 30 };
        this.pos = { x: 0, v: 0, t: 0 };
        this.history = [];
    }

    update(dt) {
        const { m, k, c, w, f0 } = this.params;
        
        // RK4 Algorithm
        const accel = (x, v, t) => (f0 * Math.cos(w * t) - c * v - k * x) / m;

        const k1v = accel(this.pos.x, this.pos.v, this.pos.t);
        const k1x = this.pos.v;

        const k2v = accel(this.pos.x + 0.5*dt*k1x, this.pos.v + 0.5*dt*k1v, this.pos.t + 0.5*dt);
        const k2x = this.pos.v + 0.5*dt*k1v;

        const k3v = accel(this.pos.x + 0.5*dt*k2x, this.pos.v + 0.5*dt*k2v, this.pos.t + 0.5*dt);
        const k3x = this.pos.v + 0.5*dt*k2v;

        const k4v = accel(this.pos.x + dt*k3x, this.pos.v + dt*k3v, this.pos.t + dt);
        const k4x = this.pos.v + dt*k3v;

        this.pos.v += (dt/6) * (k1v + 2*k2v + 2*k3v + k4v);
        this.pos.x += (dt/6) * (k1x + 2*k2x + 2*k3x + k4x);
        this.pos.t += dt;

        return { x: this.pos.x, v: this.pos.v };
    }
}

/**
 * UI & GRAPHICS ORCHESTRATOR
 */
class Simulation {
    constructor() {
        this.engine = new CoreEngine();
        this.initThree();
        this.initCharts();
        this.setupEvents();
        this.loop();
    }

    initThree() {
        const container = document.getElementById('three-container');
        this.scene = new THREE.Scene();
        this.camera = new THREE.PerspectiveCamera(50, container.clientWidth/container.clientHeight, 0.1, 1000);
        this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        this.renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(this.renderer.domElement);

        // Grid & Visuals
        const grid = new THREE.GridHelper(20, 40, 0xff00ff, 0x111111);
        grid.rotation.x = Math.PI / 2;
        grid.position.z = -2;
        this.scene.add(grid);

        // The Bobblehead (Mass)
        // Styled as a high-tech "Probe"
        const group = new THREE.Group();
        
        const coreGeo = new THREE.OctahedronGeometry(0.8, 0);
        const coreMat = new THREE.MeshPhongMaterial({ 
            color: 0x00f2ff, 
            emissive: 0x004444, 
            wireframe: true 
        });
        this.probe = new THREE.Mesh(coreGeo, coreMat);
        group.add(this.probe);

        // Inner solid core
        const innerGeo = new THREE.SphereGeometry(0.4, 8, 8);
        const innerMat = new THREE.MeshBasicMaterial({ color: 0xff00ff });
        this.inner = new THREE.Mesh(innerGeo, innerMat);
        group.add(this.inner);

        this.scene.add(group);
        this.toyGroup = group;

        // Spring (The connector)
        const springGeo = new THREE.BufferGeometry();
        this.springLine = new THREE.Line(springGeo, new THREE.LineBasicMaterial({ color: 0x00f2ff }));
        this.scene.add(this.springLine);

        const light = new THREE.PointLight(0x00f2ff, 2, 50);
        light.position.set(5, 5, 5);
        this.scene.add(light, new THREE.AmbientLight(0x222222));

        this.camera.position.set(0, 0, 10);
    }

    initCharts() {
        const cfg = (title, color) => ({
            type: 'line',
            data: { labels: Array(50).fill(''), datasets: [{ data: Array(50).fill(0), borderColor: color, borderWidth: 1, pointRadius: 0, fill: false }] },
            options: {
                responsive: true, maintainAspectRatio: false,
                animation: false, plugins: { legend: false },
                scales: { x: { display: false }, y: { grid: { color: '#111' }, ticks: { color: '#444', font: { size: 8 } } } }
            }
        });

        this.phaseChart = new Chart(document.getElementById('phaseChart'), cfg('PHASE SPACE', '#ff00ff'));
        this.timeChart = new Chart(document.getElementById('timeChart'), cfg('TRACE', '#00f2ff'));
    }

    setupEvents() {
        ['mass', 'stiffness', 'damping', 'frequency', 'force'].forEach(id => {
            document.getElementById(id).addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                const map = { mass:'m', stiffness:'k', damping:'c', frequency:'w', force:'f0' };
                this.engine.params[map[id]] = val;
                this.updateStats();
            });
        });
    }

    updateStats() {
        const { m, k, w } = this.engine.params;
        const fn = Math.sqrt(k/m);
        document.getElementById('val-fn').innerText = (fn / (2 * Math.PI)).toFixed(2) + " Hz";
        
        const resonance = Math.abs(w - fn) < 1.0;
        document.getElementById('resonance-ui').style.display = resonance ? 'block' : 'none';
    }

    loop() {
        requestAnimationFrame(() => this.loop());

        // Physics Calculation
        const result = this.engine.update(0.016);
        const amp = result.x;

        // Visual Manipulation
        this.toyGroup.position.y = amp;
        this.probe.rotation.y += 0.05;
        this.probe.rotation.x += 0.02;

        // Dynamic Spring Geometry
        const springPts = [];
        for(let i=0; i<=20; i++) {
            const t = i/20;
            springPts.push(new THREE.Vector3(Math.sin(i)*0.2, -5 + (t * (5 + amp)), Math.cos(i)*0.2));
        }
        this.springLine.geometry.setFromPoints(springPts);

        // Chart Updates
        this.timeChart.data.datasets[0].data.push(amp);
        this.timeChart.data.datasets[0].data.shift();
        this.timeChart.update('none');

        this.phaseChart.data.datasets[0].data.push(result.v);
        this.phaseChart.data.datasets[0].data.shift();
        this.phaseChart.update('none');

        document.getElementById('val-amp').innerText = amp.toFixed(2);

        this.renderer.render(this.scene, this.camera);
    }
}

// Start Command
window.onload = () => new Simulation();
</script>
</body>
</html>

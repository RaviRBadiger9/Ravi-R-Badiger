<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpurGear Pro | Engineering PDF Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <!-- PDF Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #1e293b; margin: 0; overflow: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(0, 0, 0, 0.05); }
        input, select { background: #ffffff !important; border: 1px solid #cbd5e1 !important; color: #334155 !important; padding: 0.5rem; font-size: 0.75rem; border-radius: 6px; width: 100%; }
        
        #splash-screen { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(8px); z-index: 100; display: flex; align-items: center; justify-content: center; }
        .option-card { background: white; padding: 2rem; border-radius: 12px; width: 320px; cursor: pointer; border: 2px solid transparent; transition: all 0.3s; }
        .option-card:hover { transform: translateY(-5px); border-color: #3b82f6; }
        
        /* PDF Layout Helper (Hidden from Viewport) */
        #pdf-template { position: absolute; left: -9999px; width: 800px; padding: 40px; background: white; color: black; }
        .sketch-canvas { border: 1px solid #ddd; background: #fafafa; }
    </style>
</head>
<body>

    <!-- STARTUP SELECTOR -->
    <div id="splash-screen">
        <div class="max-w-5xl w-full px-8 text-center">
            <h2 class="text-white text-3xl font-bold mb-10">Select Design Path</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="option-card text-left" onclick="launchEngine('single')">
                    <h3 class="font-bold text-slate-800">Single Stage</h3>
                    <p class="text-xs text-slate-500 mt-2">Standard 2-gear drive with axial shafting.</p>
                </div>
                <div class="option-card text-left" onclick="launchEngine('double')">
                    <h3 class="font-bold text-slate-800">Double Stage</h3>
                    <p class="text-xs text-slate-500 mt-2">Extended torque multi-shaft system.</p>
                </div>
                <div class="option-card text-left" onclick="launchEngine('compound')">
                    <h3 class="font-bold text-slate-800">Compound</h3>
                    <p class="text-xs text-slate-500 mt-2">Common shaft multi-gear train.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- MAIN ENGINE -->
    <div id="main-engine" class="h-screen flex flex-col hidden">
        <header class="h-12 glass flex items-center justify-between px-8 border-b border-black/5 z-20">
            <div class="flex items-center gap-4">
                <button onclick="location.reload()" class="text-[10px] bg-slate-100 px-2 py-1 rounded">← MENU</button>
                <h1 class="text-xs font-bold tracking-widest uppercase text-slate-800">SpurGear <span id="mode-label" class="text-blue-600">--</span></h1>
            </div>
            <button onclick="generatePDF()" class="bg-blue-600 text-white text-[10px] px-4 py-1.5 rounded-full font-bold hover:bg-blue-700 transition">
                PRINT CALCULATION (PDF)
            </button>
        </header>

        <div class="flex-1 flex overflow-hidden">
            <aside class="w-72 glass border-r border-black/5 p-6 space-y-5 overflow-y-auto z-10">
                <section>
                    <label class="text-[9px] text-slate-500 uppercase font-bold">Material</label>
                    <select id="mat-sut" onchange="updateDesign()">
                        <option value="600">Steel C45 (600 MPa)</option>
                        <option value="850">40Cr1 Steel (850 MPa)</option>
                    </select>
                </section>
                <section class="grid grid-cols-2 gap-2">
                    <div><label class="text-[9px] text-slate-500 uppercase">Power (kW)</label><input type="number" id="in-p" value="10" oninput="updateDesign()"></div>
                    <div><label class="text-[9px] text-slate-500 uppercase">Input RPM</label><input type="number" id="in-n" value="1440" oninput="updateDesign()"></div>
                </section>
                <section>
                    <label class="text-[9px] text-slate-500 uppercase font-bold">Teeth Count</label>
                    <div class="grid grid-cols-2 gap-2 mt-1">
                        <div><label class="text-[8px] text-slate-400">Pinion (Z1)</label><input type="number" id="z1" value="18" oninput="updateDesign()"></div>
                        <div><label class="text-[8px] text-slate-400">Gear (Z2)</label><input type="number" id="z2" value="54" oninput="updateDesign()"></div>
                    </div>
                </section>
            </aside>

            <main class="flex-1 relative bg-[#f8fafc]">
                <div id="render-area" class="w-full h-full"></div>
            </main>

            <aside id="data-panel" class="w-80 glass border-l border-black/5 p-6 overflow-y-auto z-10">
                <h2 class="text-xs font-bold text-slate-600 mb-6 uppercase">Current Calculation</h2>
                <div id="step-output" class="text-[11px] mono space-y-4"></div>
            </aside>
        </div>
    </div>

    <!-- HIDDEN PDF TEMPLATE -->
    <div id="pdf-template">
        <h1 style="font-size: 24px; border-bottom: 2px solid #333;">Gear Design Report</h1>
        <div id="pdf-content" style="margin-top: 20px; font-family: monospace; font-size: 14px;"></div>
        <h2 style="margin-top: 30px;">2D Technical Sketch</h2>
        <canvas id="sketch-canvas" width="600" height="400" class="sketch-canvas"></canvas>
    </div>

    <script>
        let scene, camera, renderer, controls, gearGroup;
        let currentMode = 'single';

        function launchEngine(mode) {
            currentMode = mode;
            document.getElementById('splash-screen').style.display = 'none';
            document.getElementById('main-engine').classList.remove('hidden');
            document.getElementById('mode-label').innerText = mode.toUpperCase();
            init();
            updateDesign();
        }

        function init() {
            const area = document.getElementById('render-area');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf8fafc);
            camera = new THREE.PerspectiveCamera(40, area.clientWidth / area.clientHeight, 1, 1000);
            camera.position.set(120, 100, 120);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(area.clientWidth, area.clientHeight);
            area.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            
            const sun = new THREE.DirectionalLight(0xffffff, 0.4);
            sun.position.set(50, 100, 50);
            scene.add(sun);

            gearGroup = new THREE.Group();
            scene.add(gearGroup);
            animate();
        }

        function createGearWithShaft(z, m, x, yPos, speed, color) {
            const group = new THREE.Group();
            const pitchR = (z * m) / 2;
            const holeR = pitchR * 0.3;

            // 1. THE GEAR
            const shape = new THREE.Shape();
            for(let i=0; i <= z*2; i++) {
                const a = (i/(z*2)) * Math.PI * 2;
                const r = i%2 === 0 ? pitchR + (m * 0.8) : pitchR - (m * 1.2);
                if (i === 0) shape.moveTo(Math.cos(a)*r, Math.sin(a)*r);
                else shape.lineTo(Math.cos(a)*r, Math.sin(a)*r);
            }
            const holePath = new THREE.Path();
            holePath.absarc(0, 0, holeR, 0, Math.PI * 2, true);
            shape.holes.push(holePath);

            const gearGeo = new THREE.ExtrudeGeometry(shape, { depth: 8, bevelEnabled: true, bevelSize: 0.2 });
            const gearMat = new THREE.MeshStandardMaterial({ color: color, metalness: 0.7, roughness: 0.3 });
            const gearMesh = new THREE.Mesh(gearGeo, gearMat);
            gearMesh.rotation.x = Math.PI/2;
            group.add(gearMesh);

            // 2. THE SHAFT
            const shaftGeo = new THREE.CylinderGeometry(holeR * 0.95, holeR * 0.95, 40, 32);
            const shaftMat = new THREE.MeshStandardMaterial({ color: 0xcbd5e1, metalness: 0.9, roughness: 0.1 });
            const shaftMesh = new THREE.Mesh(shaftGeo, shaftMat);
            group.add(shaftMesh);

            group.position.set(x, yPos, 0);
            group.userData = { speed };
            return group;
        }

        function updateDesign() {
            while(gearGroup.children.length > 0) gearGroup.remove(gearGroup.children[0]);
            const z1 = parseInt(document.getElementById('z1').value);
            const z2 = parseInt(document.getElementById('z2').value);
            const m = 3;

            const cDist = (z1 + z2) * m / 2;
            gearGroup.add(createGearWithShaft(z1, m, 0, 0, 0.01, 0x3b82f6));
            gearGroup.add(createGearWithShaft(z2, m, cDist, 0, -0.01 * (z1/z2), 0x94a3b8));
            
            draw2DSketch(z1, z2, m);
            document.getElementById('step-output').innerHTML = `
                <div class="p-3 bg-slate-50 border rounded">
                    <b>Module:</b> ${m} mm<br>
                    <b>Center Distance:</b> ${cDist} mm<br>
                    <b>Reduction:</b> ${(z2/z1).toFixed(2)}:1
                </div>
            `;
        }

        function draw2DSketch(z1, z2, m) {
            const canvas = document.getElementById('sketch-canvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1;

            const draw = (z, m, offset) => {
                const r = (z * m) / 2;
                ctx.beginPath();
                ctx.arc(offset, 200, r, 0, Math.PI * 2);
                ctx.stroke();
                // Add center hole circle
                ctx.beginPath();
                ctx.setLineDash([5, 5]);
                ctx.arc(offset, 200, r * 0.3, 0, Math.PI * 2);
                ctx.stroke();
                ctx.setLineDash([]);
            };

            draw(z1, m, 150);
            draw(z2, m, 150 + (z1 + z2) * m / 2);
        }

        async function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            // Fill template data
            document.getElementById('pdf-content').innerText = document.getElementById('step-output').innerText;
            
            const element = document.getElementById('pdf-template');
            const canvas = await html2canvas(element);
            const imgData = canvas.toDataURL('image/png');
            
            doc.addImage(imgData, 'PNG', 10, 10, 190, 0);
            doc.save('Gear_Calculation_Report.pdf');
        }

        function animate() {
            requestAnimationFrame(animate);
            if(controls) controls.update();
            gearGroup.children.forEach(g => { g.rotation.y += g.userData.speed; });
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>

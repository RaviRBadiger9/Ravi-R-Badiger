<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KINETIC_LAB // System Dynamics</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0a0a0b;
            --panel: #141417;
            --accent: #f59e0b;
            --text: #e2e8f0;
            --border: #2d2d32;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }

        /* Main Grid Layout */
        #main-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            height: 100vh;
        }

        /* Sidebar UI */
        #sidebar {
            background: var(--panel);
            border-right: 1px solid var(--border);
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h2 { font-size: 0.8rem; letter-spacing: 2px; color: var(--accent); margin-bottom: 10px; }
        .ctrl-box { margin-bottom: 15px; }
        .label-row { display: flex; justify-content: space-between; font-size: 0.75rem; margin-bottom: 8px; color: #94a3b8; }
        .val { color: #fff; font-family: monospace; font-weight: bold; }

        input[type="range"] { width: 100%; height: 4px; background: #2d2d32; appearance: none; border-radius: 2px; }
        input[type="range"]::-webkit-slider-thumb { appearance: none; width: 14px; height: 14px; background: var(--accent); border-radius: 50%; cursor: pointer; border: 2px solid #fff; }

        /* Workspace Viewport */
        #workspace {
            display: grid;
            grid-template-rows: 1fr 280px;
        }

        #canvas-3d { width: 100%; height: 100%; background: radial-gradient(circle at center, #1e1e24 0%, #0a0a0b 100%); }

        /* Analytics Footer */
        #analytics {
            background: #000;
            border-top: 1px solid var(--border);
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            padding: 15px;
            gap: 15px;
        }

        .chart-card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 10px; height: 100%; position: relative; }
    </style>
</head>
<body>

<div id="main-layout">
    <aside id="sidebar">
        <h2>CORE_ADJUSTMENT</h2>
        
        <div class="ctrl-box">
            <div class="label-row"><span>MASS (m)</span> <span class="val" id="v-m">2.0 kg</span></div>
            <input type="range" id="m" min="0.5" max="10" step="0.1" value="2.0">
        </div>

        <div class="ctrl-box">
            <div class="label-row"><span>STIFFNESS (k)</span> <span class="val" id="v-k">200 N/m</span></div>
            <input type="range" id="k" min="50" max="1000" step="10" value="200">
        </div>

        <div class="ctrl-box">
            <div class="label-row"><span>DAMPING (c)</span> <span class="val" id="v-c">1.0 Ns/m</span></div>
            <input type="range" id="c" min="0" max="10" step="0.1" value="1.0">
        </div>

        <div class="ctrl-box">
            <div class="label-row"><span>FREQUENCY (ω)</span> <span class="val" id="v-w">5.0 rad/s</span></div>
            <input type="range" id="w" min="0" max="30" step="0.1" value="5.0">
        </div>

        <div style="margin-top:auto; padding:15px; background:#1c1c21; border-radius:8px; font-size:0.7rem;">
            <div id="status" style="color:var(--accent); font-weight:bold;">SYSTEM_STABLE</div>
            <div id="live-p" style="margin-top:4px; opacity:0.6;">MOMENTUM: 0.00 kg⋅m/s</div>
        </div>
    </aside>

    <main id="workspace">
        <div id="canvas-3d"></div>
        <div id="analytics">
            <div class="chart-card"><canvas id="chX"></canvas></div>
            <div class="chart-card"><canvas id="chV"></canvas></div>
            <div class="chart-card"><canvas id="chP"></canvas></div>
        </div>
    </main>
</div>

<script>
/** * PHYSICS INTEGRATOR
 */
class Engine {
    constructor() {
        this.m = 2; this.k = 200; this.c = 1; this.w = 5; this.f0 = 35;
        this.x = 0; this.v = 0; this.t = 0;
    }
    update(dt) {
        // Simple Euler Step for real-time smoothness
        const force = this.f0 * Math.sin(this.w * this.t);
        const damping = -this.c * this.v;
        const spring = -this.k * this.x;
        const accel = (force + damping + spring) / this.m;
        
        this.v += accel * dt;
        this.x += this.v * dt;
        this.t += dt;
        return { x: this.x, v: this.v, p: this.m * this.v };
    }
}

/**
 * APPLICATION MANAGER
 */
class App {
    constructor() {
        this.engine = new Engine();
        this.init3D();
        this.initCharts();
        this.bindEvents();
        this.animate();
    }

    init3D() {
        const container = document.getElementById('canvas-3d');
        this.scene = new THREE.Scene();
        this.camera = new THREE.PerspectiveCamera(45, container.clientWidth/container.clientHeight, 0.1, 1000);
        this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        this.renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(this.renderer.domElement);

        // Lights
        const sun = new THREE.DirectionalLight(0xffffff, 2);
        sun.position.set(5, 10, 7);
        this.scene.add(sun, new THREE.AmbientLight(0xffffff, 0.3));

        // Car Group
        this.car = new THREE.Group();
        const chassis = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.6, 1.2), new THREE.MeshStandardMaterial({color: 0xf59e0b, metalness: 0.8, roughness: 0.1}));
        const top = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.5, 1), new THREE.MeshStandardMaterial({color: 0x111111, transparent: true, opacity: 0.8}));
        top.position.set(-0.2, 0.5, 0);
        this.car.add(chassis, top);
        this.scene.add(this.car);

        // Coil Spring
        this.springPoints = 150;
        this.springLine = new THREE.Line(new THREE.BufferGeometry(), new THREE.LineBasicMaterial({color: 0x888888}));
        this.scene.add(this.springLine);

        this.camera.position.set(8, 4, 10);
        this.camera.lookAt(0, 1.5, 0);
    }

    initCharts() {
        const createCfg = (label, color) => ({
            type: 'line',
            data: { labels: Array(50).fill(''), datasets: [{ data: Array(50).fill(0), borderColor: color, borderWidth: 2, pointRadius: 0 }] },
            options: { responsive: true, maintainAspectRatio: false, animation: false, scales: { x: { display: false }, y: { grid: { color: '#1c1c21' } } }, plugins: { title: { display: true, text: label, color: '#666' } } }
        });

        this.charts = {
            x: new Chart(document.getElementById('chX'), createCfg('DISPLACEMENT [x]', '#f59e0b')),
            v: new Chart(document.getElementById('chV'), createCfg('VELOCITY [v]', '#3b82f6')),
            p: new Chart(document.getElementById('chP'), createCfg('MOMENTUM [p]', '#ef4444'))
        };
    }

    bindEvents() {
        ['m','k','c','w'].forEach(id => {
            document.getElementById(id).addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                this.engine[id] = val;
                document.getElementById(`v-${id}`).innerText = val.toFixed(1);
            });
        });
        window.addEventListener('resize', () => {
            const container = document.getElementById('canvas-3d');
            this.camera.aspect = container.clientWidth / container.clientHeight;
            this.camera.updateProjectionMatrix();
            this.renderer.setSize(container.clientWidth, container.clientHeight);
        });
    }

    drawSpring(h) {
        const pts = [];
        const turns = 12, radius = 0.3;
        for (let i = 0; i <= this.springPoints; i++) {
            const t = i / this.springPoints;
            pts.push(new THREE.Vector3(Math.cos(t * Math.PI * 2 * turns) * radius, t * h, Math.sin(t * Math.PI * 2 * turns) * radius));
        }
        this.springLine.geometry.setFromPoints(pts);
    }

    animate() {
        requestAnimationFrame(() => this.animate());
        const data = this.engine.update(0.016);
        const yBase = 2.5;

        // Visuals
        this.car.position.y = yBase + data.x;
        this.drawSpring(yBase + data.x);

        // Update UI Text
        document.getElementById('live-p').innerText = `MOMENTUM: ${data.p.toFixed(2)} kg⋅m/s`;

        // Update Charts
        const pairs = [['x', data.x], ['v', data.v], ['p', data.p]];
        pairs.forEach(([key, val]) => {
            this.charts[key].data.datasets[0].data.push(val);
            this.charts[key].data.datasets[0].data.shift();
            this.charts[key].update('none');
        });

        this.renderer.render(this.scene, this.camera);
    }
}

window.onload = () => new App();
</script>
</body>
</html>

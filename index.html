<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpurGear Pro | Baja Engineering Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <style>
        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }
        input[type="range"] { 
            -webkit-appearance: none; 
            background: rgba(255, 255, 255, 0.1); 
            height: 4px; 
            border-radius: 2px; 
        }
        input[type="range"]::-webkit-slider-thumb { 
            -webkit-appearance: none; 
            width: 16px; 
            height: 16px; 
            background: #60a5fa; 
            border-radius: 50%; 
            cursor: pointer; 
            box-shadow: 0 0 10px rgba(96, 165, 250, 0.5); 
            transition: transform 0.2s;
        }
        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }
        #outputLog::-webkit-scrollbar { width: 4px; }
        #outputLog::-webkit-scrollbar-thumb { 
            background: rgba(255, 255, 255, 0.1); 
            border-radius: 10px; 
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen overflow-x-hidden">
    <nav class="border-b border-white/10 backdrop-blur-md sticky top-0 z-50 px-8 py-4 flex justify-between items-center">
        <h1 class="text-2xl font-bold tracking-tighter bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">
            SPURGEAR PRO <span class="text-xs font-mono text-slate-500 ml-2">BAJA SAE CORE</span>
        </h1>
    </nav>

    <main class="p-6 grid grid-cols-12 gap-6 max-w-[1600px] mx-auto">
        
        <section class="col-span-12 lg:col-span-3 glass p-6 rounded-2xl space-y-6">
            <h2 class="text-lg font-semibold border-b border-white/5 pb-2">Design Parameters</h2>
            
            <div>
                <label class="block text-xs uppercase text-slate-400 mb-2">Power (kW)</label>
                <input type="range" id="power" min="1" max="20" value="7.5" step="0.5" class="w-full">
                <div class="flex justify-between text-xs mt-1"><span id="powerVal" class="text-blue-400">7.5</span>kW</div>
            </div>

            <div>
                <label class="block text-xs uppercase text-slate-400 mb-2">Input RPM</label>
                <input type="range" id="rpm" min="500" max="5000" value="3800" step="100" class="w-full">
                <div class="flex justify-between text-xs mt-1"><span id="rpmVal" class="text-blue-400">3800</span>RPM</div>
            </div>

            <div>
                <label class="block text-xs uppercase text-slate-400 mb-2">Material Hardness (BHN)</label>
                <input type="range" id="bhn" min="150" max="700" value="400" step="10" class="w-full">
                <div class="flex justify-between text-xs mt-1"><span id="bhnVal" class="text-emerald-400">400</span>BHN</div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs text-slate-400 mb-1">Teeth (Pinion)</label>
                    <input type="number" id="z1" value="18" class="w-full bg-slate-900 border border-white/10 rounded p-2 text-sm focus:ring-1 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs text-slate-400 mb-1">Gear Ratio</label>
                    <input type="number" id="ratio" value="3" step="0.1" class="w-full bg-slate-900 border border-white/10 rounded p-2 text-sm focus:ring-1 focus:ring-blue-500 outline-none">
                </div>
            </div>

            <button id="calculateBtn" class="w-full py-3 bg-blue-600 hover:bg-blue-500 rounded-xl font-bold shadow-lg transition-all active:scale-95">
                RUN FULL VALIDATION
            </button>
        </section>

        <section class="col-span-12 lg:col-span-6 space-y-6">
            <div class="glass h-[500px] rounded-2xl relative overflow-hidden">
                <div id="canvas-container" class="w-full h-full"></div>
            </div>
            
            <div class="grid grid-cols-3 gap-4 text-center">
                <div class="glass p-4 rounded-xl">
                    <p class="text-[10px] text-slate-500 uppercase">Optimal Module</p>
                    <p id="resModule" class="text-2xl font-mono text-blue-400 font-bold">--</p>
                </div>
                <div class="glass p-4 rounded-xl">
                    <p class="text-[10px] text-slate-500 uppercase">Weak Member</p>
                    <p id="resWeak" class="text-lg font-mono text-amber-400 font-bold">--</p>
                </div>
                <div class="glass p-4 rounded-xl">
                    <p class="text-[10px] text-slate-500 uppercase">Dynamic Load</p>
                    <p id="resFd" class="text-2xl font-mono text-emerald-400 font-bold">--</p>
                </div>
            </div>
        </section>

        <section class="col-span-12 lg:col-span-3">
            <div class="glass p-6 rounded-2xl border border-white/10 h-[620px] flex flex-col">
                <h2 class="text-sm font-bold mb-4 flex items-center gap-2">
                    <span class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></span>
                    ENGINEERING VALIDATION
                </h2>
                <div id="outputLog" class="space-y-3 text-xs font-mono text-slate-400 overflow-y-auto flex-grow pr-2">
                    <div class="opacity-50 italic">Awaiting parameters...</div>
                </div>
            </div>
        </section>
    </main>

    <script>
        // --- ENGINEERING DATA & CONFIG ---
        const GEAR_DATA = {
            pressure_angle: 20 * (Math.PI / 180),
            service_factor: 1.5, // High shock for Baja SAE
            sigma_b: 350,        // Allowable bending stress for 20MnCr5 (MPa)
        };

        let scene, camera, renderer, pinionMesh, gearMesh, casingMesh;

        // --- CORE SOLVER ENGINE ---
        function runEngineeringCheck() {
            // Get inputs
            const P = parseFloat(document.getElementById('power').value) * 1000; // kW to W
            const n1 = parseFloat(document.getElementById('rpm').value);
            const z1 = parseInt(document.getElementById('z1').value);
            const ratio = parseFloat(document.getElementById('ratio').value);
            const z2 = Math.round(z1 * ratio);
            const bhn = parseInt(document.getElementById('bhn').value);
            
            // 1. Identify Weaker Member (Lewis Form Factor Y)
            const Y1 = Math.PI * (0.154 - (0.912 / z1));
            const Y2 = Math.PI * (0.154 - (0.912 / z2));
            
            const strength1 = GEAR_DATA.sigma_b * Y1;
            const strength2 = GEAR_DATA.sigma_b * Y2;
            const isPinionWeaker = strength1 <= strength2;
            const weakerY = isPinionWeaker ? Y1 : Y2;

            // 2. Module Calculation (Lewis Beam Strength)
            // m = [ (2 * Torque * FOS) / (sigma_b * b_factor * z * Y) ] ^ 1/3
            const torque = (9.55 * P) / n1; // Nm
            const m_req = Math.pow((2 * torque * 1000 * 2.0) / (GEAR_DATA.sigma_b * 10 * z1 * weakerY), 1/3);
            const m = Math.ceil(m_req * 2) / 2; // Round to nearest 0.5 step

            // 3. Static Loading (Beam Strength Sb)
            const b = 10 * m; // Face width
            const Sb = m * b * GEAR_DATA.sigma_b * weakerY;

            // 4. Dynamic Loading (Buckingham Equation)
            const dp = m * z1;
            const v = (Math.PI * dp * n1) / 60000; // m/s
            const Ft = (2000 * torque) / dp;      // Tangential force (N)
            
            // Buckingham calculation
            const C = 0.111; // Error factor for grade 8 gear
            const Fd = Ft + ((21 * v * (b * C + Ft)) / (21 * v + Math.sqrt(b * C + Ft)));

            // 5. Wear Loading (Sw)
            const Q = (2 * z2) / (z1 + z2);
            const K = 0.16 * Math.pow(bhn / 100, 2); // K factor for steel
            const Sw = dp * b * Q * K;

            // Update UI Displays
            document.getElementById('resModule').innerText = m.toFixed(2) + " mm";
            document.getElementById('resWeak').innerText = isPinionWeaker ? "PINION" : "GEAR";
            document.getElementById('resFd').innerText = Math.round(Fd) + " N";

            updateLog(m, Sb, Fd, Sw, Ft);
            update3D(z1, z2, m);
        }

        function updateLog(m, Sb, Fd, Sw, Ft) {
            const log = document.getElementById('outputLog');
            log.innerHTML = ""; // Clear existing log
            
            const addLogEntry = (txt, borderColor) => {
                const div = document.createElement('div');
                div.className = `p-3 border-l-4 ${borderColor} bg-white/5 animate-in fade-in slide-in-from-left-2 duration-300`;
                div.innerHTML = `<span class="text-[10px] block opacity-50 mb-1">${new Date().toLocaleTimeString()}</span>${txt}`;
                log.prepend(div);
            };

            addLogEntry(`Wear/Pitting Check: ${Sw > Fd ? 'DURABLE' : 'WEAR RISK'} (S_w: ${Math.round(Sw)}N)`, Sw > Fd ? "border-emerald-500" : "border-amber-500");
            addLogEntry(`Dynamic Check (Buckingham): ${Sb > Fd ? 'SAFE' : 'CRITICAL'} (F_d: ${Math.round(Fd)}N)`, Sb > Fd ? "border-emerald-500" : "border-red-500");
            addLogEntry(`Static Loading (Sb): ${Math.round(Sb)}N vs Tangential: ${Math.round(Ft)}N`, "border-blue-500");
            addLogEntry(`Design Initialized: m=${m}mm, Ratio=${(Ft/torque).toFixed(2)}`, "border-slate-500");
        }

        // --- THREE.JS RENDERING ENGINE ---
        function init3D() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(15, 12, 35);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);

            // Lighting
            scene.add(new THREE.AmbientLight(0x404040, 2));
            const light = new THREE.DirectionalLight(0xffffff, 1.2);
            light.position.set(10, 20, 15);
            scene.add(light);

            runEngineeringCheck(); // Initial validation run
            animate();
        }

        function update3D(z1, z2, m) {
            // Remove previous models
            if(pinionMesh) scene.remove(pinionMesh, gearMesh, casingMesh);

            const matGear = new THREE.MeshStandardMaterial({ 
                color: 0x3b82f6, 
                wireframe: true,
                emissive: 0x1d4ed8,
                emissiveIntensity: 0.2
            });
            const matCasing = new THREE.MeshStandardMaterial({ 
                color: 0xffffff, 
                transparent: true, 
                opacity: 0.05,
                metalness: 0.9,
                roughness: 0.1
            });

            // Scale factor for visualization
            const visualScale = 0.5;

            // Pinion
            const pinionRad = (z1 * m * visualScale) / 2;
            pinionMesh = new THREE.Mesh(new THREE.CylinderGeometry(pinionRad, pinionRad, 5, 32), matGear);
            pinionMesh.rotation.x = Math.PI / 2;

            // Gear
            const gearRad = (z2 * m * visualScale) / 2;
            gearMesh = new THREE.Mesh(new THREE.CylinderGeometry(gearRad, gearRad, 4.8, 32), matGear);
            gearMesh.rotation.x = Math.PI / 2;
            
            const centerDist = ((m * z1) + (m * z2)) * visualScale / 2;
            gearMesh.position.x = centerDist;
            
            // Casing (Bounding Box)
            const casingWidth = centerDist + (gearRad * 2) + 4;
            const casingHeight = (gearRad * 2) + 4;
            const casingGeo = new THREE.BoxGeometry(casingWidth, casingHeight, 8);
            casingMesh = new THREE.Mesh(casingGeo, matCasing);
            casingMesh.position.x = centerDist / 2;
            casingMesh.position.z = -1;

            scene.add(pinionMesh, gearMesh, casingMesh);
        }

        function animate() {
            requestAnimationFrame(animate);
            if(pinionMesh && gearMesh) {
                // Pinion rotation
                pinionMesh.rotation.y += 0.015;
                // Sync gear rotation based on ratio
                const r = pinionMesh.geometry.parameters.radiusTop / gearMesh.geometry.parameters.radiusTop;
                gearMesh.rotation.y -= 0.015 * r;
            }
            renderer.render(scene, camera);
        }

        // Handle Responsive Resize
        window.addEventListener('resize', () => {
            const container = document.getElementById('canvas-container');
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });

        // Event Listeners for UI
        document.getElementById('calculateBtn').onclick = runEngineeringCheck;
        
        const inputs = ['power', 'rpm', 'bhn'];
        inputs.forEach(id => {
            document.getElementById(id).oninput = (e) => {
                document.getElementById(`${id}Val`).innerText = e.target.value;
            };
        });

        // Initialize on load
        window.onload = init3D;
    </script>
</body>
</html>

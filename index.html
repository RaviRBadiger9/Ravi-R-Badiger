<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpurGear Pro | Engineering Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #1e293b; margin: 0; overflow: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(248, 250, 252, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(0, 0, 0, 0.05); }
        input, select { background: #ffffff !important; border: 1px solid #cbd5e1 !important; color: #334155 !important; padding: 0.5rem; font-size: 0.75rem; border-radius: 6px; width: 100%; }
        .step-card { border-left: 3px solid #3b82f6; background: rgba(59, 130, 246, 0.05); padding: 12px; border-radius: 0 8px 8px 0; }
        .mode-tab { border: 1px solid #cbd5e1; color: #64748b; cursor: pointer; text-align: center; font-size: 10px; font-weight: bold; padding: 8px; border-radius: 6px; flex: 1; transition: 0.2s; }
        .mode-tab.active { background: #3b82f6; color: white; border-color: #2563eb; }
    </style>
</head>
<body>

    <div class="h-screen flex flex-col">
        <header class="h-12 glass flex items-center justify-between px-8 border-b border-black/5 z-20">
            <h1 class="text-xs font-bold tracking-widest uppercase">SpurGear <span class="text-blue-600">Pro</span></h1>
            <div class="flex gap-2 w-64">
                <div onclick="setMode('single')" id="tab-single" class="mode-tab active">SINGLE</div>
                <div onclick="setMode('double')" id="tab-double" class="mode-tab">DOUBLE</div>
                <div onclick="setMode('compound')" id="tab-compound" class="mode-tab">COMPOUND</div>
            </div>
        </header>

        <div class="flex-1 flex overflow-hidden">
            <aside class="w-72 glass border-r border-black/5 p-6 space-y-5 overflow-y-auto z-10">
                <section>
                    <label class="text-[9px] text-slate-500 uppercase font-bold">1. Input Power</label>
                    <div class="grid grid-cols-2 gap-2 mt-1">
                        <div><label class="text-[8px] text-slate-400">Power (kW)</label><input type="number" id="in-p" value="5" oninput="updateDesign()"></div>
                        <div><label class="text-[8px] text-slate-400">RPM</label><input type="number" id="in-n" value="1440" oninput="updateDesign()"></div>
                    </div>
                </section>

                <section>
                    <label class="text-[9px] text-slate-500 uppercase font-bold">2. Gear Train (Z)</label>
                    <div class="grid grid-cols-2 gap-2 mt-1">
                        <div><label class="text-[8px] text-slate-400">Z1 (Driver)</label><input type="number" id="z1" value="18" oninput="updateDesign()"></div>
                        <div><label class="text-[8px] text-slate-400">Z2 (Driven)</label><input type="number" id="z2" value="42" oninput="updateDesign()"></div>
                    </div>
                    <div id="extra-gears" class="hidden grid grid-cols-2 gap-2 mt-2">
                        <div><label class="text-[8px] text-slate-400">Z3 (Driver 2)</label><input type="number" id="z3" value="18" oninput="updateDesign()"></div>
                        <div><label class="text-[8px] text-slate-400">Z4 (Driven 2)</label><input type="number" id="z4" value="42" oninput="updateDesign()"></div>
                    </div>
                </section>
            </aside>

            <main class="flex-1 relative bg-[#f1f5f9]">
                <div id="render-area" class="w-full h-full"></div>
            </main>

            <aside class="w-80 glass border-l border-black/5 p-6 overflow-y-auto z-10">
                <h2 class="text-xs font-bold text-slate-600 mb-6 uppercase">Calculation Results</h2>
                <div id="step-output" class="text-[11px] mono space-y-4"></div>
            </aside>
        </div>
    </div>

    <script>
        let scene, camera, renderer, controls, gearGroup;
        let currentMode = 'single';

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${mode}`).classList.add('active');
            document.getElementById('extra-gears').classList.toggle('hidden', mode === 'single');
            updateDesign();
        }

        function init() {
            const area = document.getElementById('render-area');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf1f5f9);
            camera = new THREE.PerspectiveCamera(40, area.clientWidth / area.clientHeight, 1, 1000);
            camera.position.set(100, 100, 150);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(area.clientWidth, area.clientHeight);
            area.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            
            const light = new THREE.DirectionalLight(0xffffff, 0.5);
            light.position.set(50, 100, 50);
            scene.add(light);

            gearGroup = new THREE.Group();
            scene.add(gearGroup);
            updateDesign();
            animate();
        }

        function createGear(z, m, x, y, zPos, speed, color) {
            const pitchR = (z * m) / 2;
            const shape = new THREE.Shape();
            for(let i=0; i <= z*2; i++) {
                const a = (i/(z*2)) * Math.PI * 2;
                const r = i%2 === 0 ? pitchR + (m * 0.7) : pitchR - (m * 0.9);
                if (i === 0) shape.moveTo(Math.cos(a)*r, Math.sin(a)*r);
                else shape.lineTo(Math.cos(a)*r, Math.sin(a)*r);
            }
            
            const hole = new THREE.Path();
            hole.absarc(0, 0, pitchR * 0.25, 0, Math.PI * 2, true);
            shape.holes.push(hole);

            const geo = new THREE.ExtrudeGeometry(shape, { depth: 10, bevelEnabled: false });
            const mat = new THREE.MeshStandardMaterial({ color, metalness: 0.5, roughness: 0.5 });
            const mesh = new THREE.Mesh(geo, mat);
            
            mesh.position.set(x, y, zPos);
            mesh.rotation.x = Math.PI / 2;
            mesh.userData = { speed };
            return mesh;
        }

        function updateDesign() {
            if (!gearGroup) return;
            gearGroup.clear();
            
            const P = parseFloat(document.getElementById('in-p').value);
            const n = parseFloat(document.getElementById('in-n').value);
            const z1 = parseInt(document.getElementById('z1').value);
            const z2 = parseInt(document.getElementById('z2').value);
            const m = 3; 

            let totalRatio, outN;

            if (currentMode === 'single') {
                totalRatio = z2 / z1;
                outN = n / totalRatio;
                gearGroup.add(createGear(z1, m, 0, 0, 0, 1, 0x3b82f6));
                gearGroup.add(createGear(z2, m, (z1+z2)*m/2, 0, 0, -(z1/z2), 0x94a3b8));
            } else {
                const z3 = parseInt(document.getElementById('z3').value);
                const z4 = parseInt(document.getElementById('z4').value);
                const c1 = (z1 + z2) * m / 2;
                const c2 = (z3 + z4) * m / 2;
                
                totalRatio = (z2 / z1) * (z4 / z3);
                outN = n / totalRatio;

                gearGroup.add(createGear(z1, m, 0, 0, 0, 1, 0x3b82f6)); // G1
                gearGroup.add(createGear(z2, m, c1, 0, 0, -(z1/z2), 0x94a3b8)); // G2
                
                // Second stage
                const yOffset = currentMode === 'double' ? 0 : 12; // Stacked for compound
                const xPos = currentMode === 'double' ? c1 + c2 : c1;
                const zPos = currentMode === 'double' ? 12 : 0;
                
                gearGroup.add(createGear(z3, m, c1, yOffset, zPos, -(z1/z2), 0x3b82f6)); // G3
                gearGroup.add(createGear(z4, m, xPos, yOffset, zPos, (z1/z2)*(z3/z4), 0x94a3b8)); // G4
            }

            const torque = (9550 * P) / outN;
            document.getElementById('step-output').innerHTML = `
                <div class="step-card">
                    <b>VELOCITY RATIO</b><br>
                    Ratio: ${totalRatio.toFixed(2)}:1<br>
                    Output: ${outN.toFixed(1)} RPM
                </div>
                <div class="step-card">
                    <b>OUTPUT TORQUE</b><br>
                    Value: ${torque.toFixed(2)} Nm
                </div>
            `;
        }

        function animate() {
            requestAnimationFrame(animate);
            gearGroup.children.forEach(g => { g.rotation.z += 0.02 * g.userData.speed; });
            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>

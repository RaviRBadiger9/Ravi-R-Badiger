<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpurGear Pro | Textured Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;700&display=swap');
        :root { --bg-site: #020617; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-site); color: #f1f5f9; margin: 0; overflow: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        input, select { background: #0f172a !important; border: 1px solid #334155 !important; color: #94a3b8 !important; padding: 0.5rem; font-size: 0.75rem; border-radius: 6px; width: 100%; }
        .step-card { border-left: 3px solid #3b82f6; background: rgba(255, 255, 255, 0.02); padding: 15px; margin-bottom: 20px; border-radius: 0 8px 8px 0; }
    </style>
</head>
<body>

    <div class="h-screen flex flex-col">
        <header class="h-12 glass flex items-center justify-between px-8 border-b border-white/5 z-20">
            <h1 class="text-xs font-bold tracking-widest uppercase">SpurGear <span class="text-blue-400">Textured Engine</span></h1>
            <span class="text-[9px] mono text-slate-500 italic">Realistic Industrial Rendering</span>
        </header>

        <div class="flex-1 flex overflow-hidden">
            <!-- INPUT PANEL -->
            <aside class="w-72 glass border-r border-white/5 p-6 space-y-5 overflow-y-auto z-10">
                <section>
                    <label class="text-[9px] text-slate-500 uppercase font-bold">1. Material Selection</label>
                    <select id="mat-sut" onchange="updateDesign()">
                        <option value="600">Steel C45 (Sut: 600 MPa)</option>
                        <option value="850">40Cr1 Steel (Sut: 850 MPa)</option>
                        <option value="400">Grey Cast Iron (Sut: 400 MPa)</option>
                    </select>
                </section>
                <section class="grid grid-cols-2 gap-2">
                    <div><label class="text-[9px] text-slate-500 uppercase">Power (kW)</label><input type="number" id="in-p" value="10" oninput="updateDesign()"></div>
                    <div><label class="text-[9px] text-slate-500 uppercase">Input RPM</label><input type="number" id="in-n" value="1440" oninput="updateDesign()"></div>
                </section>
                <section>
                    <label class="text-[9px] text-slate-500 uppercase font-bold">2. Tooth Data</label>
                    <div class="grid grid-cols-2 gap-2">
                        <div><label class="text-[8px] text-slate-400">Pinion (Z1)</label><input type="number" id="z1" value="18" oninput="updateDesign()"></div>
                        <div><label class="text-[8px] text-slate-400">Gear (Z2)</label><input type="number" id="z2" value="54" oninput="updateDesign()"></div>
                    </div>
                </section>
            </aside>

            <!-- 3D VIEWPORT -->
            <main class="flex-1 relative bg-[#020617]">
                <div id="render-area" class="w-full h-full"></div>
            </main>

            <!-- ANALYTICS -->
            <aside class="w-80 glass border-l border-white/5 p-6 overflow-y-auto z-10">
                <h2 class="text-xs font-bold text-slate-400 mb-6 uppercase">Calculation Record</h2>
                <div id="step-output" class="text-[11px] mono space-y-4"></div>
            </aside>
        </div>
    </div>

    <script>
        let scene, camera, renderer, controls, gearGroup, gearTexture;
        const STD_MODULES = [1, 1.25, 1.5, 2, 2.5, 3, 4, 5, 6, 8, 10];

        function init() {
            const area = document.getElementById('render-area');
            scene = new THREE.Scene();
            
            // Texture Loading - Replace URL with your actual gear image/texture file
            const loader = new THREE.TextureLoader();
            gearTexture = loader.load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg'); // Placeholder texture

            camera = new THREE.PerspectiveCamera(45, area.clientWidth / area.clientHeight, 1, 1000);
            camera.position.set(100, 80, 100);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(area.clientWidth, area.clientHeight);
            renderer.toneMapping = THREE.ReinhardToneMapping;
            area.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);

            // Industrial Lighting
            scene.add(new THREE.AmbientLight(0xffffff, 0.3));
            const blueLight = new THREE.PointLight(0x3b82f6, 2, 200);
            blueLight.position.set(-50, 50, 50);
            scene.add(blueLight);

            // Blue Grid Floor
            const grid = new THREE.GridHelper(400, 40, 0x1e293b, 0x0f172a);
            grid.position.y = -15;
            scene.add(grid);

            gearGroup = new THREE.Group();
            scene.add(gearGroup);

            updateDesign();
            animate();
        }

        function createSteelGear(z, m, x, speed) {
            const pitchR = (z * m) / 2;
            const shape = new THREE.Shape();
            const segments = z * 4; 
            
            for(let i=0; i <= segments; i++) {
                const a = (i/segments) * Math.PI * 2;
                const r = i % 4 < 2 ? pitchR + (0.7 * m) : pitchR - (1.1 * m);
                shape.lineTo(Math.cos(a) * r, Math.sin(a) * r);
            }

            const geo = new THREE.ExtrudeGeometry(shape, { depth: 12, bevelEnabled: true, bevelSize: 0.5 });
            
            // Apply Image/Texture to Material
            const mat = new THREE.MeshStandardMaterial({ 
                map: gearTexture,
                color: 0x94a3b8, 
                metalness: 0.9, 
                roughness: 0.2 
            });

            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, 0, 0);
            mesh.rotation.x = Math.PI / 2;
            mesh.userData = { speed };
            return mesh;
        }

        function updateDesign() {
            while(gearGroup.children.length > 0) gearGroup.remove(gearGroup.children[0]);

            const P = parseFloat(document.getElementById('in-p').value) * 1000;
            const n = parseFloat(document.getElementById('in-n').value);
            const Sut = parseInt(document.getElementById('mat-sut').value);
            const z1 = parseInt(document.getElementById('z1').value);
            const z2 = parseInt(document.getElementById('z2').value);

            const sig_all = Sut / 3;
            const y1 = 0.154 - (0.912/z1);
            const Y = Math.PI * y1;
            const Mt = (9550 * (P/1000)) / n;
            const m_req = Math.pow((2 * Mt * 1000 * 1.5) / (sig_all * 10 * z1 * Y), 1/3);
            const m = STD_MODULES.find(v => v >= m_req) || m_req;

            const dp = m * z1;
            const v = (Math.PI * dp * n) / 60000;
            const Cv = 3 / (3 + (v || 0.1));
            const Sb = m * (10*m) * sig_all * Y;
            const Feff = ((P * 1.5) / (v || 1)) / Cv;
            const fos = Sb / Feff;

            const cDist = (z1 + z2) * m / 2;
            gearGroup.add(createSteelGear(z1, m, 0, 1));
            gearGroup.add(createSteelGear(z2, m, cDist, -(z1/z2)));
            gearGroup.position.x = -cDist/2;

            renderSteps(sig_all, Mt, m, Sb, Feff, fos);
        }

        function renderSteps(sig, mt, m, sb, feff, fos) {
            document.getElementById('step-output').innerHTML = `
                <div class="step-card">
                    <p class="text-blue-400 font-bold uppercase mb-1">1. Material Base</p>
                    <p>Stress (σ): ${sig.toFixed(1)} MPa</p>
                    <p>Torque (Mt): ${mt.toFixed(1)} Nm</p>
                </div>
                <div class="step-card">
                    <p class="text-blue-400 font-bold uppercase mb-1">2. Lewis Equation</p>
                    <p>Module: ${m}mm | Width: ${10*m}mm</p>
                </div>
                <div class="step-card">
                    <p class="text-blue-400 font-bold uppercase mb-1">3. Check</p>
                    <p>F.O.S: <span class="${fos > 1.5 ? 'text-green-400' : 'text-red-400'}">${fos.toFixed(2)}</span></p>
                </div>
            `;
        }

        function animate() {
            requestAnimationFrame(animate);
            if(controls) controls.update();
            gearGroup.children.forEach(g => { g.rotation.z += 0.005 * g.userData.speed; });
            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>

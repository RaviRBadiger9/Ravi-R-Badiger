<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpurGear Pro V3 | Analytical Engineering Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@300;400;600;700&display=swap');
        
        :root {
            --accent: #3b82f6;
            --bg-dark: #020617;
            --panel: rgba(15, 23, 42, 0.8);
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg-dark); color: #e2e8f0; overflow: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        .glass-panel {
            background: var(--panel);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .scroll-custom::-webkit-scrollbar { width: 4px; }
        .scroll-custom::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        input, select {
            background: rgba(0, 0, 0, 0.3) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: #93c5fd !important;
            padding: 0.5rem;
            font-size: 0.875rem;
            border-radius: 4px;
        }

        input:focus { border-color: var(--accent) !important; outline: none; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
        
        .step-node {
            border-left: 2px solid #1e293b;
            padding-left: 1rem;
            position: relative;
            margin-bottom: 1.5rem;
        }
        .step-node::before {
            content: '';
            position: absolute;
            left: -5px;
            top: 0;
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- Header -->
    <header class="h-16 border-b border-white/10 px-6 flex items-center justify-between bg-slate-950/50">
        <div class="flex items-center gap-4">
            <div class="bg-blue-600 p-1.5 rounded font-bold text-white leading-none text-xl">Σ</div>
            <div>
                <h1 class="font-bold tracking-tighter text-lg leading-tight">SPURGEAR PRO</h1>
                <p class="text-[10px] text-slate-500 uppercase tracking-widest">Industrial Design & Analytical Validation</p>
            </div>
        </div>
        <div class="flex gap-4 items-center">
            <span class="text-[10px] mono text-emerald-500 bg-emerald-500/10 px-2 py-1 rounded">ENGINE v3.2.0 ACTIVE</span>
        </div>
    </header>

    <!-- Main Workspace -->
    <div class="flex-1 flex overflow-hidden">
        
        <!-- COLUMN 1: Inputs -->
        <aside class="w-72 border-r border-white/5 flex flex-col glass-panel p-5 space-y-6 overflow-y-auto">
            <section>
                <h2 class="text-[10px] font-bold text-slate-500 uppercase mb-4 tracking-widest">Load Parameters</h2>
                <div class="space-y-3">
                    <div class="flex flex-col">
                        <label class="text-[11px] text-slate-400 mb-1">POWER (P) [kW]</label>
                        <input type="number" id="valP" value="7.5" step="0.1">
                    </div>
                    <div class="flex flex-col">
                        <label class="text-[11px] text-slate-400 mb-1">SPEED (n) [RPM]</label>
                        <input type="number" id="valN" value="3800">
                    </div>
                    <div class="flex flex-col">
                        <label class="text-[11px] text-slate-400 mb-1">SERVICE FACTOR (Cs)</label>
                        <select id="valCs">
                            <option value="1.0">Steady (1.0)</option>
                            <option value="1.25">Light Shock (1.25)</option>
                            <option value="1.5" selected>Medium Shock (1.5)</option>
                            <option value="2.0">Heavy Shock (2.0)</option>
                        </select>
                    </div>
                </div>
            </section>

            <section>
                <h2 class="text-[10px] font-bold text-slate-500 uppercase mb-4 tracking-widest">Gear Geometry</h2>
                <div class="space-y-3">
                    <div class="flex flex-col">
                        <label class="text-[11px] text-slate-400 mb-1">PINION TEETH (Z1)</label>
                        <input type="number" id="valZ1" value="18">
                    </div>
                    <div class="flex flex-col">
                        <label class="text-[11px] text-slate-400 mb-1">RATIO (i)</label>
                        <input type="number" id="valI" value="3.5" step="0.1">
                    </div>
                    <div class="flex flex-col">
                        <label class="text-[11px] text-slate-400 mb-1">STATIC STRESS (σd) [MPa]</label>
                        <input type="number" id="valSigma" value="230">
                    </div>
                </div>
            </section>

            <button onclick="performIndustrialCalculation()" class="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded text-xs tracking-widest transition-all">
                RUN FULL CALCULATION
            </button>
        </aside>

        <!-- COLUMN 2: Visualization -->
        <main class="flex-1 flex flex-col relative bg-[#010409]">
            <div id="canvas-container" class="flex-1"></div>
            
            <!-- Bottom Data Strip -->
            <div class="h-32 border-t border-white/5 glass-panel p-4 grid grid-cols-4 gap-4">
                <div class="border-r border-white/5 p-2">
                    <p class="text-[10px] text-slate-500 uppercase">Selected Module</p>
                    <p id="resM" class="text-xl font-bold mono text-blue-400">--</p>
                </div>
                <div class="border-r border-white/5 p-2">
                    <p class="text-[10px] text-slate-500 uppercase">Beam Strength (Sb)</p>
                    <p id="resSb" class="text-xl font-bold mono text-emerald-400">--</p>
                </div>
                <div class="border-r border-white/5 p-2">
                    <p class="text-[10px] text-slate-500 uppercase">Tangential Load (Ft)</p>
                    <p id="resFt" class="text-xl font-bold mono text-slate-300">--</p>
                </div>
                <div class="p-2">
                    <p class="text-[10px] text-slate-500 uppercase">Velocity Factor (Cv)</p>
                    <p id="resCv" class="text-xl font-bold mono text-slate-300">--</p>
                </div>
            </div>
        </main>

        <!-- COLUMN 3: Calculation Steps -->
        <aside class="w-96 border-l border-white/5 glass-panel p-6 flex flex-col">
            <h2 class="text-xs font-bold text-blue-400 uppercase mb-6 tracking-widest flex items-center gap-2">
                <span class="w-2 h-2 bg-blue-400 rounded-full animate-pulse"></span>
                Mathematical Trace
            </h2>
            <div id="stepContainer" class="flex-1 overflow-y-auto scroll-custom pr-2 mono text-[11px] leading-relaxed">
                <div class="text-slate-500 italic">Initiate calculation to view steps...</div>
            </div>
        </aside>
    </div>

    <script>
        const STANDARD_MODULES = [1.0, 1.25, 1.5, 2.0, 2.5, 3.0, 4.0, 5.0, 6.0, 8.0, 10.0, 12.0];
        let scene, camera, renderer, gearGroup;

        function init3D() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(15, 10, 25);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);

            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(5, 10, 7);
            scene.add(new THREE.AmbientLight(0xffffff, 0.3), light);

            gearGroup = new THREE.Group();
            scene.add(gearGroup);

            performIndustrialCalculation();
            animate();
        }

        function performIndustrialCalculation() {
            const P = parseFloat(document.getElementById('valP').value) * 1000;
            const n = parseFloat(document.getElementById('valN').value);
            const z1 = parseInt(document.getElementById('valZ1').value);
            const ratio = parseFloat(document.getElementById('valI').value);
            const Cs = parseFloat(document.getElementById('valCs').value);
            const sigmaD = parseFloat(document.getElementById('valSigma').value);
            const z2 = Math.round(z1 * ratio);

            const steps = [];

            // Step 1: Torque Calculation
            const torque = (9550 * (P / 1000)) / n;
            steps.push({
                title: "01. TORQUE DERIVATION",
                body: `T = (9550 * P_kW) / n <br> T = (9550 * ${P/1000}) / ${n} = <span class='text-blue-400'>${torque.toFixed(2)} Nm</span>`
            });

            // Step 2: Lewis Factor
            const y1 = 0.154 - (0.912 / z1);
            const Y = Math.PI * y1;
            steps.push({
                title: "02. LEWIS FORM FACTOR (Y)",
                body: `y = 0.154 - (0.912 / ${z1}) = ${y1.toFixed(4)} <br> Y = π * y = <span class='text-blue-400'>${Y.toFixed(4)}</span>`
            });

            // Step 3: Module Estimation
            // b = 10m, initial Cv guess 0.5
            let m_req = Math.pow((2 * torque * 1000 * Cs) / (sigmaD * 0.5 * 10 * z1 * Y), 1/3);
            let m = STANDARD_MODULES.find(v => v >= m_req) || m_req;
            steps.push({
                title: "03. MODULE SELECTION",
                body: `m_req = [ (2*T*Cs) / (σd*Cv*b*z1*Y) ]^(1/3) <br> m_req = ${m_req.toFixed(2)} mm <br> Standard Selected (Table 12.2): <span class='text-emerald-400'>${m} mm</span>`
            });

            // Step 4: Velocity & Dynamic Check
            const v = (Math.PI * (m * z1) * n) / 60000;
            const Cv = 3.05 / (3.05 + v);
            const Ft = (P * Cs) / v;
            const Sb = m * (10 * m) * sigmaD * Y * Cv;
            
            steps.push({
                title: "04. DYNAMIC VALIDATION",
                body: `v = (π * d1 * n) / 60000 = ${v.toFixed(2)} m/s <br> Cv = 3.05 / (3.05 + v) = ${Cv.toFixed(3)} <br> Sb (Beam Strength) = <span class='text-emerald-400'>${Math.round(Sb)} N</span>`
            });

            steps.push({
                title: "05. FINAL STATUS",
                body: `Tangential Load Ft = ${Math.round(Ft)} N <br> Condition: ${Sb > Ft ? '<span class="text-emerald-400">SAFE (Sb > Ft)</span>' : '<span class="text-red-400">FAIL (Sb < Ft)</span>'}`
            });

            renderSteps(steps);
            updateUI(m, Sb, Ft, Cv);
            update3D(m, z1, z2);
        }

        function renderSteps(steps) {
            const container = document.getElementById('stepContainer');
            container.innerHTML = steps.map(s => `
                <div class="step-node">
                    <h3 class="text-slate-300 font-bold mb-1">${s.title}</h3>
                    <p class="text-slate-500">${s.body}</p>
                </div>
            `).join('');
        }

        function updateUI(m, Sb, Ft, Cv) {
            document.getElementById('resM').innerText = m + " mm";
            document.getElementById('resSb').innerText = Math.round(Sb) + " N";
            document.getElementById('resFt').innerText = Math.round(Ft) + " N";
            document.getElementById('resCv').innerText = Cv.toFixed(3);
        }

        function update3D(m, z1, z2) {
            while(gearGroup.children.length > 0) gearGroup.remove(gearGroup.children[0]);
            
            const mat = new THREE.MeshStandardMaterial({ color: 0x3b82f6, wireframe: true });
            const r1 = (z1 * m) / 20;
            const r2 = (z2 * m) / 20;

            const g1 = new THREE.Mesh(new THREE.CylinderGeometry(r1, r1, 2, 32), mat);
            g1.rotation.x = Math.PI/2;
            
            const g2 = new THREE.Mesh(new THREE.CylinderGeometry(r2, r2, 2.1, 32), mat);
            g2.rotation.x = Math.PI/2;
            g2.position.x = r1 + r2;

            gearGroup.add(g1, g2);
            gearGroup.userData = { r1: z1, r2: z2 };
        }

        function animate() {
            requestAnimationFrame(animate);
            if(gearGroup.children.length > 1) {
                gearGroup.children[0].rotation.y += 0.01;
                gearGroup.children[1].rotation.y -= 0.01 * (gearGroup.userData.r1 / gearGroup.userData.r2);
            }
            renderer.render(scene, camera);
        }

        window.onload = init3D;
        window.onresize = () => {
            const container = document.getElementById('canvas-container');
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        };
    </script>
</body>
</html>

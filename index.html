<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpurGear Pro | Off-Metal Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;700&display=swap');
        
        :root { 
            --accent: #64748b; 
            --bg-site: #0f172a; 
            --metal-finish: #94a3b8; /* Off-metal slate steel color */
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg-site); color: #f1f5f9; margin: 0; overflow: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(30, 41, 59, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        input, select { background: #020617 !important; border: 1px solid #334155 !important; color: #94a3b8 !important; padding: 0.5rem; font-size: 0.75rem; border-radius: 6px; width: 100%; }
        .step-card { border-left: 3px solid #64748b; background: rgba(255, 255, 255, 0.02); padding: 15px; margin-bottom: 20px; border-radius: 0 8px 8px 0; }
        .scroll-v::-webkit-scrollbar { width: 4px; }
        .scroll-v::-webkit-scrollbar-thumb { background: #334155; }
    </style>
</head>
<body>

    <div class="h-screen flex flex-col">
        <header class="h-12 glass flex items-center justify-between px-8 border-b border-white/5 z-20">
            <h1 class="text-xs font-bold tracking-widest uppercase">SpurGear <span class="text-slate-400">Off-Metal Engine</span></h1>
            <span class="text-[9px] mono text-slate-500 italic">Material: Machined Low-Carbon Steel (Sut Basis)</span>
        </header>

        <div class="flex-1 flex overflow-hidden">
            <!-- INPUT PANEL -->
            <aside class="w-72 glass border-r border-white/5 p-6 space-y-5 overflow-y-auto scroll-v z-10">
                <section>
                    <label class="text-[9px] text-slate-500 uppercase font-bold tracking-tighter">1. Material Selection</label>
                    <select id="mat-sut" onchange="updateDesign()">
                        <option value="600">Steel C45 (Sut: 600 MPa)</option>
                        <option value="850">40Cr1 Steel (Sut: 850 MPa)</option>
                        <option value="400">Grey Cast Iron (Sut: 400 MPa)</option>
                    </select>
                </section>
                <section class="grid grid-cols-2 gap-2">
                    <div><label class="text-[9px] text-slate-500 uppercase">Power (kW)</label><input type="number" id="in-p" value="10" oninput="updateDesign()"></div>
                    <div><label class="text-[9px] text-slate-500 uppercase">Input RPM</label><input type="number" id="in-n" value="1440" oninput="updateDesign()"></div>
                </section>
                <section>
                    <label class="text-[9px] text-slate-500 uppercase font-bold tracking-tighter">2. Tooth Data</label>
                    <div class="grid grid-cols-2 gap-2 mt-1">
                        <div><label class="text-[8px] text-slate-400">Pinion (Z1)</label><input type="number" id="z1" value="18" oninput="updateDesign()"></div>
                        <div><label class="text-[8px] text-slate-400">Gear (Z2)</label><input type="number" id="z2" value="54" oninput="updateDesign()"></div>
                    </div>
                </section>
                <div class="p-3 bg-slate-800/50 rounded border border-slate-700 text-[10px] text-slate-400 leading-tight">
                    Simulation uses <b>20° Full Depth Involute</b> profile. Off-metal finish adjusted for industrial realism.
                </div>
            </aside>

            <!-- 3D VIEWPORT -->
            <main class="flex-1 relative bg-[#0a0f1d]">
                <div id="render-area" class="w-full h-full"></div>
                <div class="absolute bottom-6 left-6 flex gap-4">
                    <div class="glass p-3 rounded border-l-4 border-slate-400">
                        <p class="text-[9px] text-slate-500 uppercase">Selected Module</p>
                        <p id="res-m" class="text-lg font-bold mono">--</p>
                    </div>
                    <div class="glass p-3 rounded border-l-4 border-slate-500">
                        <p class="text-[9px] text-slate-500 uppercase">F.O.S (Bending)</p>
                        <p id="res-fos" class="text-lg font-bold mono">--</p>
                    </div>
                </div>
            </main>

            <!-- ANALYTICS PANEL -->
            <aside class="w-80 glass border-l border-white/5 p-6 overflow-y-auto scroll-v z-10">
                <h2 class="text-xs font-bold text-slate-400 mb-6 uppercase">Calculation Record</h2>
                <div id="step-output" class="text-[11px] mono space-y-4"></div>
            </aside>
        </div>
    </div>

    <script>
        let scene, camera, renderer, controls, gearGroup;
        const STD_MODULES = [1, 1.25, 1.5, 2, 2.5, 3, 4, 5, 6, 8, 10];

        function init() {
            const area = document.getElementById('render-area');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(40, area.clientWidth / area.clientHeight, 1, 1000);
            camera.position.set(60, 40, 60);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(area.clientWidth, area.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            area.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            scene.add(new THREE.AmbientLight(0xffffff, 0.4));
            const sun = new THREE.DirectionalLight(0xffffff, 0.8);
            sun.position.set(20, 50, 20);
            scene.add(sun);

            gearGroup = new THREE.Group();
            scene.add(gearGroup);

            updateDesign();
            animate();
        }

        function createSteelGear(z, m, x, speed) {
            const pitchR = (z * m) / 2;
            const shape = new THREE.Shape();
            const segments = z * 2;
            for(let i=0; i <= segments; i++) {
                const a = (i/segments) * Math.PI * 2;
                const r = i%2 === 0 ? pitchR + m : pitchR - (1.25*m);
                shape.lineTo(Math.cos(a)*r, Math.sin(a)*r);
            }
            const geo = new THREE.ExtrudeGeometry(shape, { depth: 8, bevelEnabled: true, bevelSize: 0.2 });
            const mat = new THREE.MeshStandardMaterial({ 
                color: 0x94a3b8, // Off-metal Slate Steel
                metalness: 0.85, 
                roughness: 0.25 
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, 0, 0);
            mesh.rotation.x = Math.PI/2;
            mesh.userData = { speed };
            return mesh;
        }

        function updateDesign() {
            while(gearGroup.children.length > 0) gearGroup.remove(gearGroup.children[0]);

            const P = parseFloat(document.getElementById('in-p').value) * 1000;
            const n = parseFloat(document.getElementById('in-n').value);
            const Sut = parseInt(document.getElementById('mat-sut').value);
            const z1 = parseInt(document.getElementById('z1').value);
            const z2 = parseInt(document.getElementById('z2').value);

            // Lewis Strength Logic
            const sig_all = Sut / 3;
            const y1 = 0.154 - (0.912/z1);
            const Y = Math.PI * y1;
            const Mt = (9550 * (P/1000)) / n;
            const m_req = Math.pow((2 * Mt * 1000 * 1.5) / (sig_all * 10 * z1 * Y), 1/3);
            const m = STD_MODULES.find(v => v >= m_req) || m_req;

            const dp = m * z1;
            const v = (Math.PI * dp * n) / 60000;
            const Cv = 3 / (3 + v);
            const Sb = m * (10*m) * sig_all * Y;
            const Feff = ((P * 1.5) / (v || 1)) / Cv;
            const fos = Sb / Feff;

            document.getElementById('res-m').innerText = m + " mm";
            document.getElementById('res-fos').innerText = fos.toFixed(2);
            document.getElementById('res-fos').style.color = fos > 1.5 ? '#94a3b8' : '#f87171';

            renderSteps(sig_all, Mt, m, Sb, Feff, fos);

            const cDist = (z1 + z2) * m / 2;
            gearGroup.add(createSteelGear(z1, m, 0, 1));
            gearGroup.add(createSteelGear(z2, m, cDist, -(z1/z2)));
            gearGroup.position.x = -cDist/2;
        }

        function renderSteps(sig, mt, m, sb, feff, fos) {
            document.getElementById('step-output').innerHTML = `
                <div class="step-card">
                    <p class="text-slate-400 font-bold uppercase mb-1">1. Material Base</p>
                    <p>Stress (σ): ${sig.toFixed(1)} MPa</p>
                    <p>Torque (Mt): ${mt.toFixed(1)} Nm</p>
                </div>
                <div class="step-card">
                    <p class="text-slate-400 font-bold uppercase mb-1">2. Lewis Equation</p>
                    <p>Calculated Module: ${m}mm</p>
                    <p>Face Width: ${10*m}mm</p>
                </div>
                <div class="step-card">
                    <p class="text-slate-400 font-bold uppercase mb-1">3. Dynamic Check</p>
                    <p>Beam Str (Sb): ${Math.round(sb)} N</p>
                    <p>Eff. Load (Feff): ${Math.round(feff)} N</p>
                    <p class="mt-2 font-bold ${fos > 1.5 ? 'text-slate-300' : 'text-red-400'}">F.O.S: ${fos.toFixed(2)}</p>
                </div>
            `;
        }

        function animate() {
            requestAnimationFrame(animate);
            if(controls) controls.update();
            gearGroup.children.forEach(g => { g.rotation.z += 0.01 * g.userData.speed; });
            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>

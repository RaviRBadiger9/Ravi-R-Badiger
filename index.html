<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANSYS-Style Gear Stress Simulator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Inter', sans-serif; background: #0f172a; }
        #render-area { width: 100vw; height: 100vh; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .ansys-gradient {
            background: linear-gradient(180deg, #ff0000 0%, #ffff00 25%, #00ff00 50%, #00ffff 75%, #0000ff 100%);
            width: 15px; height: 150px; border-radius: 4px;
        }
    </style>
</head>
<body>

<!-- Splash Screen -->
<div id="splash-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900 text-white">
    <div class="text-center p-8 border border-slate-700 rounded-2xl bg-slate-800 shadow-2xl">
        <h1 class="text-4xl font-bold mb-2">GEAR<span class="text-blue-500">LAB</span> Pro</h1>
        <p class="text-slate-400 mb-6">FEA Stress Analysis & Kinematic Engine</p>
        <div class="grid grid-cols-1 gap-4">
            <button onclick="launchEngine('single')" class="py-3 px-6 bg-blue-600 hover:bg-blue-500 rounded-lg font-bold transition">SINGLE STAGE MESH</button>
            <button onclick="launchEngine('compound')" class="py-3 px-6 bg-indigo-600 hover:bg-indigo-500 rounded-lg font-bold transition">COMPOUND TRAIN</button>
        </div>
    </div>
</div>

<!-- Main UI -->
<div id="main-engine" class="hidden">
    <!-- Left Sidebar: Controls -->
    <div class="fixed top-5 left-5 z-40 w-80 glass-panel p-6 rounded-2xl shadow-2xl max-h-[90vh] overflow-y-auto">
        <div class="flex items-center justify-between mb-4">
            <h2 class="font-black text-slate-800 tracking-tight">DESIGN PARAMETERS</h2>
            <span id="mode-label" class="text-[10px] bg-blue-100 text-blue-700 px-2 py-1 rounded font-bold"></span>
        </div>

        <div class="space-y-4 text-sm">
            <div>
                <label class="block text-slate-500 font-bold mb-1">MODULE (m)</label>
                <select id="module-sel" onchange="updateDesign()" class="w-full p-2 border rounded bg-white">
                    <option value="2">2.0 (Precision)</option>
                    <option value="4" selected>4.0 (Standard)</option>
                    <option value="8">8.0 (Heavy Duty)</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-2">
                <div>
                    <label class="block text-slate-500 font-bold mb-1">TEETH Z1</label>
                    <input type="number" id="z1" value="20" oninput="updateDesign()" class="w-full p-2 border rounded">
                </div>
                <div>
                    <label class="block text-slate-500 font-bold mb-1">TEETH Z2</label>
                    <input type="number" id="z2" value="40" oninput="updateDesign()" class="w-full p-2 border rounded">
                </div>
            </div>

            <div id="multi-stage-inputs" class="hidden grid grid-cols-2 gap-2 border-t pt-4">
                <div>
                    <label class="block text-slate-500 font-bold mb-1">TEETH Z3</label>
                    <input type="number" id="z3" value="20" oninput="updateDesign()" class="w-full p-2 border rounded">
                </div>
                <div>
                    <label class="block text-slate-500 font-bold mb-1">TEETH Z4</label>
                    <input type="number" id="z4" value="50" oninput="updateDesign()" class="w-full p-2 border rounded">
                </div>
            </div>

            <div>
                <label class="block text-slate-500 font-bold mb-1">MATERIAL STRESS (σ₀)</label>
                <select id="material-stress" onchange="updateDesign()" class="w-full p-2 border rounded bg-white">
                    <option value="140" data-color="#94a3b8">Cast Iron (140 MPa)</option>
                    <option value="210" data-color="#64748b" selected>Medium Steel (210 MPa)</option>
                    <option value="350" data-color="#334155">Alloy Steel (350 MPa)</option>
                </select>
            </div>

            <div class="pt-4 border-t">
                <button id="toggleBtn" onclick="toggleAnimation()" class="w-full py-3 bg-slate-800 text-white rounded-xl font-bold mb-2">MOTION: ON</button>
                <button onclick="location.reload()" class="w-full py-2 text-slate-500 font-medium italic">Reset Simulation</button>
            </div>
        </div>
    </div>

    <!-- Right Sidebar: Stress Results -->
    <div class="fixed top-5 right-5 z-40 w-64 glass-panel p-6 rounded-2xl shadow-2xl">
        <h2 class="font-black text-slate-800 mb-4 tracking-tight">STRESS ANALYSIS</h2>
        <div class="flex gap-4">
            <div class="ansys-gradient"></div>
            <div class="flex-1 flex flex-col justify-between text-[10px] font-bold text-slate-600 uppercase">
                <span>Max: <span id="max-stress-label" class="text-red-600">--</span></span>
                <span>Average</span>
                <span>Minimum</span>
                <span>Zero Load</span>
            </div>
        </div>
        <div id="step-output" class="mt-6 space-y-2"></div>
    </div>

    <div id="render-area"></div>
</div>

<script>
    let scene, camera, renderer, controls, gearGroup, engineMode;
    let activeGears = []; 
    let isAnimating = true;

    function toggleAnimation() {
        isAnimating = !isAnimating;
        const btn = document.getElementById('toggleBtn');
        btn.innerText = isAnimating ? "MOTION: ON" : "MOTION: OFF";
        btn.classList.toggle('bg-slate-800');
        btn.classList.toggle('bg-red-500');
    }

    function launchEngine(mode) {
        engineMode = mode;
        document.getElementById('splash-screen').style.display = 'none';
        document.getElementById('main-engine').classList.remove('hidden');
        document.getElementById('mode-label').innerText = mode.toUpperCase();
        if(mode !== 'single') document.getElementById('multi-stage-inputs').classList.remove('hidden');
        init();
        updateDesign();
    }

    function init() {
        const area = document.getElementById('render-area');
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf1f5f9);
        
        camera = new THREE.PerspectiveCamera(45, area.clientWidth / area.clientHeight, 1, 2000);
        camera.position.set(150, 150, 150);
        
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(area.clientWidth, area.clientHeight);
        renderer.shadowMap.enabled = true;
        area.appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        
        const ambient = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambient);
        
        const light = new THREE.DirectionalLight(0xffffff, 0.8);
        light.position.set(50, 100, 50);
        scene.add(light);

        gearGroup = new THREE.Group();
        scene.add(gearGroup);

        animate();
    }

    function createGearMesh(z, m, x, colorHex, yOffset = 0, zOffset = 0, speedFactor = 1, initialOffset = 0) {
        const r_pitch = (z * m) / 2;
        const r_dedendum = r_pitch - 1.25 * m;
        const thickness = 10;
        const gearContainer = new THREE.Group(); 
        
        // Gear Body (The core disk)
        const gearShape = new THREE.Shape();
        gearShape.absarc(0, 0, r_dedendum, 0, Math.PI * 2, false);
        const bodyGeo = new THREE.ExtrudeGeometry(gearShape, { depth: thickness, bevelEnabled: true, bevelThickness: 1 });
        const bodyMat = new THREE.MeshStandardMaterial({ color: colorHex, metalness: 0.7, roughness: 0.2 });
        const bodyMesh = new THREE.Mesh(bodyGeo, bodyMat);
        gearContainer.add(bodyMesh);

        // Teeth Geometry
        const toothWidthBottom = m * 1.57;
        const toothWidthTop = m * 0.8;
        const toothHeight = 2.25 * m;
        const teethMeshes = [];

        for (let i = 0; i < z; i++) {
            const angle = (i / z) * Math.PI * 2;
            const toothShape = new THREE.Shape();
            toothShape.moveTo(-toothWidthBottom / 2, 0);
            toothShape.lineTo(-toothWidthTop / 2, toothHeight);
            toothShape.lineTo(toothWidthTop / 2, toothHeight);
            toothShape.lineTo(toothWidthBottom / 2, 0);
            
            const toothGeo = new THREE.ExtrudeGeometry(toothShape, { depth: thickness, bevelEnabled: false });
            // Individual material so they can change color independently
            const toothMat = new THREE.MeshStandardMaterial({ color: colorHex, metalness: 0.6, roughness: 0.3 });
            const toothMesh = new THREE.Mesh(toothGeo, toothMat);
            
            toothMesh.position.x = Math.cos(angle) * r_dedendum;
            toothMesh.position.y = Math.sin(angle) * r_dedendum;
            toothMesh.rotation.z = angle - Math.PI / 2;
            
            // Logic: Store its angular position relative to the gear center
            toothMesh.userData = { relativeAngle: angle };
            
            bodyMesh.add(toothMesh);
            teethMeshes.push(toothMesh);
        }

        gearContainer.position.set(x, yOffset, zOffset);
        gearContainer.rotation.x = Math.PI / 2;
        bodyMesh.rotation.z = initialOffset; 
        
        activeGears.push({ 
            obj: bodyMesh, 
            speed: speedFactor, 
            teeth: teethMeshes, 
            baseColor: new THREE.Color(colorHex),
            isPinion: speedFactor > 0 
        });

        return gearContainer;
    }

    function updateDesign() {
        if(!gearGroup) return;
        while(gearGroup.children.length > 0) gearGroup.remove(gearGroup.children[0]);
        activeGears = [];
        
        const z1 = parseInt(document.getElementById('z1').value) || 12;
        const z2 = parseInt(document.getElementById('z2').value) || 12;
        const m = parseFloat(document.getElementById('module-sel').value);
        const matEl = document.getElementById('material-stress');
        const gearColor = matEl.options[matEl.selectedIndex].getAttribute('data-color');

        const d1 = z1 * m, d2 = z2 * m;
        const ratio = z1 / z2;

        if(engineMode === 'single') {
            gearGroup.add(createGearMesh(z1, m, 0, gearColor, 0, 0, 1, 0));
            gearGroup.add(createGearMesh(z2, m, (d1 + d2)/2, gearColor, 0, 0, -ratio, Math.PI/z2));
        } else {
            // Compound logic
            const z3 = parseInt(document.getElementById('z3').value) || 12;
            const z4 = parseInt(document.getElementById('z4').value) || 12;
            const d3 = z3 * m, d4 = z4 * m;
            
            gearGroup.add(createGearMesh(z1, m, 0, gearColor, 0, 0, 1, 0));
            gearGroup.add(createGearMesh(z2, m, (d1 + d2)/2, gearColor, 0, 0, -ratio, Math.PI/z2));
            gearGroup.add(createGearMesh(z3, m, (d1 + d2)/2, gearColor, 12, 0, -ratio, 0));
            gearGroup.add(createGearMesh(z4, m, (d1 + d2)/2 + (d3 + d4)/2, gearColor, 12, 0, ratio * (z3/z4), Math.PI/z4));
        }

        document.getElementById('max-stress-label').innerText = matEl.value + " MPa";
        document.getElementById('step-output').innerHTML = `
            <div class="p-3 bg-blue-50 border border-blue-200 rounded text-[11px]">
                <b>RATIO:</b> 1:${(z2/z1).toFixed(2)}<br>
                <b>DISTANCE:</b> ${((d1+d2)/2).toFixed(2)}mm
            </div>
        `;
    }

    function animate() {
        requestAnimationFrame(animate);
        if(isAnimating) {
            const speed = 0.01;
            
            activeGears.forEach(gear => {
                gear.obj.rotation.z += speed * gear.speed;

                // Color changing logic
                gear.teeth.forEach(tooth => {
                    // Find the tooth's current angle in world space
                    let currentAngle = (gear.obj.rotation.z + tooth.userData.relativeAngle) % (Math.PI * 2);
                    if (currentAngle < 0) currentAngle += Math.PI * 2;

                    // Point of mesh: 
                    // Pinion (Left gear) meshes at angle 0 (right side)
                    // Gear (Right gear) meshes at angle PI (left side)
                    let target = gear.speed > 0 ? 0 : Math.PI;
                    let distance = Math.abs(currentAngle - target);

                    if (distance < 0.25 || distance > (Math.PI * 2 - 0.25)) {
                        // Tooth is in contact zone: RED/ORANGE
                        tooth.material.color.setRGB(1, 0.2, 0);
                        tooth.position.z = 1; // Subtle pop-out effect
                    } else {
                        // Tooth is normal: Back to base material color
                        tooth.material.color.copy(gear.baseColor);
                        tooth.position.z = 0;
                    }
                });
            });
        }
        controls.update();
        renderer.render(scene, camera);
    }

    // Handle Window Resize
    window.addEventListener('resize', () => {
        const area = document.getElementById('render-area');
        camera.aspect = area.clientWidth / area.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(area.clientWidth, area.clientHeight);
    });
</script>
</body>
</html>

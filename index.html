<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpurGear Pro | Extruded Design Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;700&display=swap');
        :root { --accent: #3b82f6; --bg-dark: #0a0c10; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-dark); color: #e2e8f0; margin: 0; overflow: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .hidden { display: none !important; }
        input, select { background: #000 !important; border: 1px solid #334155 !important; color: #60a5fa !important; padding: 0.5rem; font-size: 0.8rem; border-radius: 6px; width: 100%; }
        .btn-primary { background: var(--accent); transition: all 0.2s; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .btn-primary:hover { background: #2563eb; transform: translateY(-1px); }
    </style>
</head>
<body>

    <!-- PORTAL SELECTION -->
    <div id="portal" class="h-screen flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-5xl font-bold tracking-tighter mb-4">SPURGEAR <span class="text-blue-500">PRO</span></h1>
        <p class="text-slate-500 mono text-xs mb-12 tracking-widest uppercase">Precision Extruded Geometry Engine</p>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-5xl w-full">
            <button onclick="startApp('SINGLE')" class="glass p-8 rounded-2xl border border-white/5 hover:border-blue-500 transition-all group">
                <div class="text-blue-500 mb-4 group-hover:scale-110 transition-transform">⚙️</div>
                <h3 class="text-lg font-bold">Single Stage</h3>
                <p class="text-xs text-slate-500 mt-2">Direct pinion-gear interface</p>
            </button>
            <button onclick="startApp('DOUBLE')" class="glass p-8 rounded-2xl border border-white/5 hover:border-emerald-500 transition-all group">
                <div class="text-emerald-500 mb-4 group-hover:scale-110 transition-transform">⚙️⚙️</div>
                <h3 class="text-lg font-bold">Double Stage</h3>
                <p class="text-xs text-slate-500 mt-2">Multi-shaft reduction series</p>
            </button>
            <button onclick="startApp('COMPOUND')" class="glass p-8 rounded-2xl border border-white/5 hover:border-purple-500 transition-all group">
                <div class="text-purple-500 mb-4 group-hover:scale-110 transition-transform">⛓️</div>
                <h3 class="text-lg font-bold">Compound Gear</h3>
                <p class="text-xs text-slate-500 mt-2">Torque-dense axial reduction</p>
            </button>
        </div>
    </div>

    <!-- MAIN WORKSPACE -->
    <div id="workspace" class="h-screen flex flex-col hidden">
        <header class="h-14 glass flex items-center justify-between px-6 border-b border-white/5">
            <button onclick="location.reload()" class="text-xs font-bold text-slate-400 hover:text-white">← PORTAL</button>
            <span id="mode-title" class="text-xs font-bold mono text-blue-400"></span>
            <span class="text-[10px] text-slate-600">IS:2535-1969 COMPLIANT</span>
        </header>

        <div class="flex-1 flex overflow-hidden">
            <!-- Parameters -->
            <aside id="inputs" class="w-80 glass border-r border-white/5 p-6 space-y-6 overflow-y-auto"></aside>
            
            <!-- 3D Render Area -->
            <main class="flex-1 relative bg-black">
                <div id="canvas-container" class="w-full h-full"></div>
                <div class="absolute bottom-6 left-6 right-6 grid grid-cols-4 gap-4">
                    <div class="glass p-4 rounded-xl">
                        <p class="text-[10px] text-slate-500">SYSTEM RATIO</p>
                        <p id="out-ratio" class="text-xl font-bold mono">--</p>
                    </div>
                    <div class="glass p-4 rounded-xl">
                        <p class="text-[10px] text-slate-500">MODULE (mm)</p>
                        <p id="out-module" class="text-xl font-bold mono">--</p>
                    </div>
                    <div class="glass p-4 rounded-xl">
                        <p class="text-[10px] text-slate-500">BENDING STRENGTH</p>
                        <p id="out-strength" class="text-xl font-bold mono text-emerald-400">--</p>
                    </div>
                    <div class="glass p-4 rounded-xl">
                        <p class="text-[10px] text-slate-500">MAX TORQUE (Nm)</p>
                        <p id="out-torque" class="text-xl font-bold mono text-blue-400">--</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        let scene, camera, renderer, gearGroup, currentMode;
        const STANDARD_MODULES = [1.0, 1.25, 1.5, 2.0, 2.5, 3.0, 4.0, 5.0, 6.0, 8.0];

        function startApp(mode) {
            currentMode = mode;
            document.getElementById('portal').classList.add('hidden');
            document.getElementById('workspace').classList.remove('hidden');
            document.getElementById('mode-title').innerText = mode + " CALCULATION";
            setupInputs();
            init3D();
            updateAll();
        }

        function setupInputs() {
            const container = document.getElementById('inputs');
            let html = `
                <div><label class="text-[10px] block mb-2">POWER (kW)</label><input type="number" id="p" value="5"></div>
                <div><label class="text-[10px] block mb-2">INPUT RPM</label><input type="number" id="rpm" value="1500"></div>
                <div class="h-px bg-white/10 my-4"></div>
            `;
            if (currentMode === 'SINGLE') {
                html += `<div><label class="text-[10px] block mb-2">Z1 (PINION)</label><input type="number" id="z1" value="18"></div>
                         <div><label class="text-[10px] block mb-2">Z2 (GEAR)</label><input type="number" id="z2" value="45"></div>`;
            } else {
                html += `<p class="text-[10px] text-slate-500 mb-2">STAGE 1</p>
                         <div class="flex gap-2"><div><label class="text-[9px]">Z1</label><input type="number" id="z1" value="18"></div>
                         <div><label class="text-[9px]">Z2</label><input type="number" id="z2" value="36"></div></div>
                         <p class="text-[10px] text-slate-500 mt-4 mb-2">STAGE 2</p>
                         <div class="flex gap-2"><div><label class="text-[9px]">Z3</label><input type="number" id="z3" value="18"></div>
                         <div><label class="text-[9px]">Z4</label><input type="number" id="z4" value="54"></div></div>`;
            }
            html += `<button onclick="updateAll()" class="w-full btn-primary py-3 rounded-lg mt-6 text-sm">Update Design</button>`;
            container.innerHTML = html;
        }

        function init3D() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 1, 1000);
            camera.position.set(40, 30, 60);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 0.4), new THREE.DirectionalLight(0xffffff, 0.8));
            gearGroup = new THREE.Group();
            scene.add(gearGroup);
            animate();
        }

        function createExtrudedGear(z, m, depth, color, x, zPos) {
            const pitchRadius = (z * m) / 2;
            const addendum = m;
            const dedendum = 1.25 * m;
            const shape = new THREE.Shape();
            const segments = z * 2;

            for (let i = 0; i <= segments; i++) {
                const angle = (i / segments) * Math.PI * 2;
                const r = i % 2 === 0 ? pitchRadius + addendum : pitchRadius - dedendum;
                const px = Math.cos(angle) * r;
                const py = Math.sin(angle) * r;
                if (i === 0) shape.moveTo(px, py);
                else shape.lineTo(px, py);
            }

            const extrudeSettings = { depth: depth, bevelEnabled: true, bevelThickness: 0.5, bevelSize: 0.5 };
            const geometry = new THREE.ExtrudeGeometry(shape, extrudeSettings);
            const material = new THREE.MeshStandardMaterial({ color: color, metalness: 0.7, roughness: 0.3 });
            const gear = new THREE.Mesh(geometry, material);
            gear.position.set(x, 0, zPos);
            gear.rotation.x = Math.PI / 2;
            return gear;
        }

        function updateAll() {
            while(gearGroup.children.length > 0) gearGroup.remove(gearGroup.children[0]);
            const P = parseFloat(document.getElementById('p').value) * 1000;
            const n = parseFloat(document.getElementById('rpm').value);
            const z1 = parseInt(document.getElementById('z1').value);
            const z2 = parseInt(document.getElementById('z2').value);

            // Calculation Logic
            const solve = (pw, spd, zp, zg) => {
                const T = (9550 * (pw/1000)) / spd;
                const y = 0.154 - (0.912/zp);
                let m_req = Math.pow((2 * T * 1000 * 1.5) / (230 * 5 * zp * Math.PI * y), 1/3);
                let m = STANDARD_MODULES.find(v => v >= m_req) || m_req;
                return { m, T, out_n: spd/(zg/zp) };
            };

            if (currentMode === 'SINGLE') {
                const res = solve(P, n, z1, z2);
                gearGroup.add(createExtrudedGear(z1, res.m, 5, 0x3b82f6, 0, 0));
                gearGroup.add(createExtrudedGear(z2, res.m, 5, 0x64748b, (z1+z2)*res.m/2, 0));
                updateDashboard((z2/z1).toFixed(2), res.m, 230, Math.round(res.T*(z2/z1)));
            } else {
                const z3 = parseInt(document.getElementById('z3').value);
                const z4 = parseInt(document.getElementById('z4').value);
                const s1 = solve(P, n, z1, z2);
                const s2 = solve(P, s1.out_n, z3, z4);
                
                gearGroup.add(createExtrudedGear(z1, s1.m, 5, 0x3b82f6, 0, 0));
                gearGroup.add(createExtrudedGear(z2, s1.m, 5, 0x64748b, (z1+z2)*s1.m/2, 0));
                gearGroup.add(createExtrudedGear(z3, s2.m, 5, 0x10b981, (z1+z2)*s1.m/2, 6));
                gearGroup.add(createExtrudedGear(z4, s2.m, 5, 0x64748b, ((z1+z2)*s1.m/2) + ((z3+z4)*s2.m/2), 6));
                
                updateDashboard(((z2/z1)*(z4/z3)).toFixed(2), `${s1.m}/${s2.m}`, 230, Math.round(s2.T*(z4/z3)));
            }
        }

        function updateDashboard(r, m, s, t) {
            document.getElementById('out-ratio').innerText = r + ":1";
            document.getElementById('out-module').innerText = m;
            document.getElementById('out-strength').innerText = s + " MPa";
            document.getElementById('out-torque').innerText = t;
        }

        function animate() {
            requestAnimationFrame(animate);
            gearGroup.rotation.y += 0.005;
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>

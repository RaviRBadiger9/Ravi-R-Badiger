<div id="pdf-template" style="background: white; color: black; font-family: 'Inter', sans-serif;">
    <div style="display: flex; justify-content: space-between; border-bottom: 2px solid #334155; padding-bottom: 10px;">
        <div>
            <h1 style="font-size: 24px; font-weight: bold; margin: 0;">SpurGear Pro Analysis Report</h1>
            <p style="font-size: 10px; color: #64748b; margin: 0;">Calculated per IS:2535 / Lewis & Buckingham Standards</p>
        </div>
        <div style="text-align: right; font-size: 10px;">
            Date: <span id="pdf-date"></span>
        </div>
    </div>

    <div style="display: grid; grid-cols: 2; gap: 20px; margin-top: 20px;">
        <!-- Technical Drawing Canvas -->
        <div style="border: 1px solid #e2e8f0; padding: 10px; text-align: center;">
            <p style="font-size: 9px; font-weight: bold; text-transform: uppercase; margin-bottom: 5px;">2D Schematic Layout</p>
            <canvas id="pdf-2d-canvas" width="400" height="250" style="width: 100%;"></canvas>
        </div>

        <!-- Input Summary -->
        <div style="font-size: 10px; border: 1px solid #e2e8f0; padding: 10px;">
            <p style="font-weight: bold; text-transform: uppercase; margin-bottom: 5px;">Design Inputs</p>
            <div id="pdf-inputs-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;"></div>
        </div>
    </div>

    <div style="margin-top: 20px;">
        <p style="font-size: 12px; font-weight: bold; border-left: 4px solid #3b82f6; padding-left: 10px;">Analytical Calculations</p>
        <div id="pdf-calculations" style="font-size: 10px; line-height: 1.8; font-family: 'JetBrains Mono', monospace; background: #f8fafc; padding: 15px; border-radius: 4px;"></div>
    </div>

    <div style="margin-top: 20px;">
        <p style="font-size: 10px; font-weight: bold;">VON-MISES STRESS ANALYSIS (MAX LOAD)</p>
        <div style="height: 15px; width: 100%; background: linear-gradient(to right, blue, cyan, green, yellow, red); border-radius: 2px;"></div>
        <div style="display: flex; justify-content: space-between; font-size: 8px; margin-top: 2px;">
            <span>0 MPa (Neutral)</span>
            <span id="pdf-max-stress-val"></span>
        </div>
    </div>
</div>

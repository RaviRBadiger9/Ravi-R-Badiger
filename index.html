<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpurGear Pro | Multi-Stage Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;700&display=swap');
        :root { --bg-site: #0f172a; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-site); color: #f1f5f9; margin: 0; overflow: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(30, 41, 59, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        input, select { background: #020617 !important; border: 1px solid #334155 !important; color: #94a3b8 !important; padding: 0.5rem; font-size: 0.75rem; border-radius: 6px; width: 100%; }
        .step-card { border-left: 3px solid #64748b; background: rgba(255, 255, 255, 0.02); padding: 15px; margin-bottom: 20px; border-radius: 0 8px 8px 0; }
        
        /* Tab Styling */
        .mode-tab { border: 1px solid #334155; color: #64748b; transition: all 0.2s; cursor: pointer; text-align: center; font-size: 10px; font-weight: bold; padding: 8px; border-radius: 6px; }
        .mode-tab.active { background: #334155; color: white; border-color: #64748b; }
    </style>
</head>
<body>

    <div class="h-screen flex flex-col">
        <header class="h-12 glass flex items-center justify-between px-8 border-b border-white/5 z-20">
            <h1 class="text-xs font-bold tracking-widest uppercase">SpurGear <span class="text-slate-400">Multi-Stage</span></h1>
            <div id="system-selector" class="flex gap-2">
                <div onclick="setMode('single')" id="tab-single" class="mode-tab active">SINGLE</div>
                <div onclick="setMode('double')" id="tab-double" class="mode-tab">DOUBLE</div>
                <div onclick="setMode('compound')" id="tab-compound" class="mode-tab">COMPOUND</div>
            </div>
        </header>

        <div class="flex-1 flex overflow-hidden">
            <!-- INPUT PANEL -->
            <aside class="w-72 glass border-r border-white/5 p-6 space-y-5 overflow-y-auto z-10">
                <section>
                    <label class="text-[9px] text-slate-500 uppercase font-bold">1. Material Selection</label>
                    <select id="mat-sut" onchange="updateDesign()">
                        <option value="600">Steel C45 (Sut: 600 MPa)</option>
                        <option value="850">40Cr1 Steel (Sut: 850 MPa)</option>
                        <option value="400">Grey Cast Iron (Sut: 400 MPa)</option>
                    </select>
                </section>
                <section class="grid grid-cols-2 gap-2">
                    <div><label class="text-[9px] text-slate-500 uppercase">Power (kW)</label><input type="number" id="in-p" value="10" oninput="updateDesign()"></div>
                    <div><label class="text-[9px] text-slate-500 uppercase">Input RPM</label><input type="number" id="in-n" value="1440" oninput="updateDesign()"></div>
                </section>
                <section>
                    <label class="text-[9px] text-slate-500 uppercase font-bold">2. Ratio Data</label>
                    <div class="grid grid-cols-2 gap-2 mt-1">
                        <div><label class="text-[8px] text-slate-400">Pinion (Z1)</label><input type="number" id="z1" value="18" oninput="updateDesign()"></div>
                        <div><label class="text-[8px] text-slate-400">Gear (Z2)</label><input type="number" id="z2" value="54" oninput="updateDesign()"></div>
                    </div>
                    <div id="extra-gears" class="hidden grid grid-cols-2 gap-2 mt-2">
                        <div><label class="text-[8px] text-slate-400">Pinion (Z3)</label><input type="number" id="z3" value="18" oninput="updateDesign()"></div>
                        <div><label class="text-[8px] text-slate-400">Gear (Z4)</label><input type="number" id="z4" value="54" oninput="updateDesign()"></div>
                    </div>
                </section>
            </aside>

            <!-- 3D VIEWPORT -->
            <main class="flex-1 relative bg-[#0a0f1d]">
                <div id="render-area" class="w-full h-full"></div>
            </main>

            <!-- ANALYTICS PANEL -->
            <aside class="w-80 glass border-l border-white/5 p-6 overflow-y-auto z-10">
                <h2 class="text-xs font-bold text-slate-400 mb-6 uppercase">System Metrics</h2>
                <div id="step-output" class="text-[11px] mono space-y-4"></div>
            </aside>
        </div>
    </div>

    <script>
        let scene, camera, renderer, controls, gearGroup;
        let currentMode = 'single';
        const STD_MODULES = [1, 1.25, 1.5, 2, 2.5, 3, 4, 5, 6, 8, 10];

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${mode}`).classList.add('active');
            document.getElementById('extra-gears').classList.toggle('hidden', mode === 'single');
            updateDesign();
        }

        function init() {
            const area = document.getElementById('render-area');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(40, area.clientWidth / area.clientHeight, 1, 1000);
            camera.position.set(100, 80, 100);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(area.clientWidth, area.clientHeight);
            area.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 0.4));
            const sun = new THREE.DirectionalLight(0xffffff, 0.8);
            sun.position.set(20, 50, 20);
            scene.add(sun);

            gearGroup = new THREE.Group();
            scene.add(gearGroup);

            updateDesign();
            animate();
        }

        function createGear(z, m, x, zPos, speed, color = 0x94a3b8) {
            const pitchR = (z * m) / 2;
            const shape = new THREE.Shape();
            for(let i=0; i <= z*2; i++) {
                const a = (i/(z*2)) * Math.PI * 2;
                const r = i%2 === 0 ? pitchR + m : pitchR - (1.2*m);
                shape.lineTo(Math.cos(a)*r, Math.sin(a)*r);
            }
            const geo = new THREE.ExtrudeGeometry(shape, { depth: 6, bevelEnabled: true, bevelSize: 0.2 });
            const mat = new THREE.MeshStandardMaterial({ color: color, metalness: 0.8, roughness: 0.3 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, zPos, 0);
            mesh.rotation.x = Math.PI/2;
            mesh.userData = { speed };
            return mesh;
        }

        function updateDesign() {
            while(gearGroup.children.length > 0) gearGroup.remove(gearGroup.children[0]);
            
            const P = parseFloat(document.getElementById('in-p').value) * 1000;
            const n = parseFloat(document.getElementById('in-n').value);
            const z1 = parseInt(document.getElementById('z1').value);
            const z2 = parseInt(document.getElementById('z2').value);
            const m = 3; // Base module for visual scaling

            if (currentMode === 'single') {
                const cDist = (z1 + z2) * m / 2;
                gearGroup.add(createGear(z1, m, 0, 0, 1));
                gearGroup.add(createGear(z2, m, cDist, 0, -(z1/z2)));
                renderStats(P, n, z1, z2, 1, 1);
            } 
            else if (currentMode === 'double') {
                const z3 = parseInt(document.getElementById('z3').value);
                const z4 = parseInt(document.getElementById('z4').value);
                const c1 = (z1 + z2) * m / 2;
                const c2 = (z3 + z4) * m / 2;
                
                // First Stage
                gearGroup.add(createGear(z1, m, 0, 0, 1, 0x64748b));
                gearGroup.add(createGear(z2, m, c1, 0, -(z1/z2), 0x94a3b8));
                // Second Stage (Offset Y)
                gearGroup.add(createGear(z3, m, c1, 10, -(z1/z2), 0x64748b));
                gearGroup.add(createGear(z4, m, c1 + c2, 10, (z1/z2)*(z3/z4), 0x94a3b8));
                renderStats(P, n, z1, z2, z3, z4);
            }
            else if (currentMode === 'compound') {
                const z3 = parseInt(document.getElementById('z3').value);
                const z4 = parseInt(document.getElementById('z4').value);
                const c1 = (z1 + z2) * m / 2;
                
                gearGroup.add(createGear(z1, m, 0, 0, 1));
                gearGroup.add(createGear(z2, m, c1, 0, -(z1/z2))); // Compound gear large
                gearGroup.add(createGear(z3, m/1.5, c1, 5, -(z1/z2), 0x475569)); // Compound gear small
                renderStats(P, n, z1, z2, z3, 1);
            }
        }

        function renderStats(P, n, z1, z2, z3, z4) {
            const ratio = (z2/z1) * (z4/z3);
            const outN = n / ratio;
            document.getElementById('step-output').innerHTML = `
                <div class="step-card">
                    <p class="text-slate-400 font-bold uppercase mb-1">Configuration</p>
                    <p>System: ${currentMode.toUpperCase()}</p>
                    <p>Total Reduction: ${ratio.toFixed(2)}:1</p>
                </div>
                <div class="step-card">
                    <p class="text-slate-400 font-bold uppercase mb-1">Performance</p>
                    <p>Input: ${n} RPM</p>
                    <p>Output: ${outN.toFixed(1)} RPM</p>
                    <p>Output Torque: ${((9550*(P/1000))/outN).toFixed(1)} Nm</p>
                </div>
            `;
        }

        function animate() {
            requestAnimationFrame(animate);
            if(controls) controls.update();
            gearGroup.children.forEach(g => { g.rotation.z += 0.01 * g.userData.speed; });
            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>

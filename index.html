<!-- Enhanced Export Template -->
<div id="pdf-template" style="background: white; color: black; font-family: 'Inter', sans-serif;">
    <div style="border-bottom: 3px solid #1e293b; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: flex-end;">
        <div>
            <h1 style="font-size: 26px; font-weight: 800; margin: 0; color: #0f172a;">SpurGear Pro | Technical Report</h1>
            <p style="font-size: 11px; color: #64748b; margin: 0; text-transform: uppercase; letter-spacing: 1px;">Generated via Engineering Design Suite</p>
        </div>
        <div style="text-align: right; font-size: 10px; color: #94a3b8;">
            Reference: IS:2535 / Lewis Standards<br>
            Date: <span id="pdf-date-stamp"></span>
        </div>
    </div>

    <div style="display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 30px; margin-top: 25px;">
        <!-- Technical 2D Layout -->
        <div style="border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; background: #f8fafc;">
            <h3 style="font-size: 12px; font-weight: 700; margin-bottom: 10px; color: #334155; border-bottom: 1px solid #e2e8f0; padding-bottom: 5px;">2D GEOMETRIC SCHEMATIC</h3>
            <div style="display: flex; justify-content: center;">
                <canvas id="pdf-2d-canvas" width="400" height="280" style="max-width: 100%;"></canvas>
            </div>
        </div>
        
        <!-- Input Parameters -->
        <div style="border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px;">
            <h3 style="font-size: 12px; font-weight: 700; margin-bottom: 10px; color: #334155; border-bottom: 1px solid #e2e8f0; padding-bottom: 5px;">DESIGN INPUTS</h3>
            <div id="pdf-inputs-list" style="font-size: 10px; line-height: 2.2; color: #475569;"></div>
        </div>
    </div>

    <div style="margin-top: 25px;">
        <h3 style="font-size: 12px; font-weight: 700; margin-bottom: 10px; color: #334155;">ANALYTICAL SOLVER (STEP-BY-STEP)</h3>
        <div id="pdf-math-block" style="font-family: 'JetBrains Mono', monospace; font-size: 10px; background: #0f172a; color: #e2e8f0; padding: 20px; border-radius: 6px; line-height: 1.8;">
            <!-- Math populated via JS -->
        </div>
    </div>

    <div style="margin-top: 25px; padding: 15px; background: #f1f5f9; border-radius: 8px;">
        <h3 style="font-size: 11px; font-weight: 700; color: #334155; margin-bottom: 10px;">VON-MISES STRESS INTENSITY GRAPH</h3>
        <div style="height: 14px; width: 100%; background: linear-gradient(to right, #3b82f6, #22c55e, #eab308, #ef4444); border-radius: 10px; margin-bottom: 5px;"></div>
        <div style="display: flex; justify-content: space-between; font-size: 9px; font-weight: 600; color: #64748b;">
            <span>MIN: 0.0 MPa (Neutral)</span>
            <span style="color: #ef4444;">MAX LOADING: <span id="pdf-stress-val"></span></span>
        </div>
    </div>
</div>

<script>
async function generatePDF() {
    const { jsPDF } = window.jspdf;
    
    // Setup Variables
    const m = parseFloat(document.getElementById('module-sel').value);
    const z1 = parseInt(document.getElementById('z1').value);
    const z2 = parseInt(document.getElementById('z2').value);
    const p = parseFloat(document.getElementById('in-p').value);
    const n1 = parseFloat(document.getElementById('in-n').value);
    const sigma0 = document.getElementById('material-stress').value;
    const toothType = document.getElementById('tooth-system').value;
    const matPair = document.getElementById('mat-pair').value;
    
    // Update Date and Stress
    document.getElementById('pdf-date-stamp').innerText = new Date().toLocaleDateString();
    document.getElementById('pdf-stress-val').innerText = document.getElementById('max-stress-label').innerText;

    // 1. Technical 2D Schematic (Scale for PDF visibility)
    const can = document.getElementById('pdf-2d-canvas');
    const ctx = can.getContext('2d');
    ctx.clearRect(0, 0, can.width, can.height);
    
    const scale = 1.2;
    const r1 = (z1 * m) / 2 * scale;
    const r2 = (z2 * m) / 2 * scale;
    const cx = 80, cy = 140;

    // Draw Pitch Circles
    ctx.lineWidth = 2;
    ctx.strokeStyle = '#3b82f6';
    ctx.beginPath(); ctx.arc(cx, cy, r1, 0, Math.PI * 2); ctx.stroke(); // Pinion
    ctx.strokeStyle = '#64748b';
    ctx.beginPath(); ctx.arc(cx + r1 + r2, cy, r2, 0, Math.PI * 2); ctx.stroke(); // Gear
    
    // Centers & Labels
    ctx.fillStyle = '#1e293b'; ctx.font = 'bold 10px Inter';
    ctx.fillText(`Pinion (Z=${z1})`, cx - 20, cy - r1 - 10);
    ctx.fillText(`Gear (Z=${z2})`, cx + r1 + r2 - 20, cy - r2 - 10);

    // 2. Populate Inputs
    document.getElementById('pdf-inputs-list').innerHTML = `
        <strong>• Power Transmitted:</strong> ${p} kW<br>
        <strong>• Input Speed (n1):</strong> ${n1} RPM<br>
        <strong>• Normal Module (m):</strong> ${m} mm<br>
        <strong>• Velocity Ratio:</strong> ${(z2/z1).toFixed(2)}<br>
        <strong>• Allowable Static Stress:</strong> ${sigma0} MPa<br>
        <strong>• Tooth System:</strong> ${toothType}° Involute
    `;

    // 3. Calculation Logic (Detailed Math)
    const v = (Math.PI * (z1 * m) * n1) / 60000;
    const ft = (1000 * p) / v;
    const cs = serviceFactorTable[document.getElementById('load-type').value][document.getElementById('service-type').value];
    const ftEff = ft * cs;
    
    const getY = (z) => {
        if(toothType === "20") return 0.154 - (0.912 / z);
        if(toothType === "20stub") return 0.175 - (0.841 / z);
        return 0.124 - (0.684 / z);
    };
    const yVal = getY(z1);
    const b = 10 * m;
    const fs = sigma0 * b * Math.PI * m * yVal;

    document.getElementById('pdf-math-block').innerHTML = `
        [STEP 01] Peripheral Velocity (V)<br>
        V = (π * d1 * n1) / 60000 = (π * ${z1*m} * ${n1}) / 60000 = ${v.toFixed(2)} m/s<br><br>
        
        [STEP 02] Tangential Load (Ft)<br>
        Ft = (1000 * P) / V = (1000 * ${p}) / ${v.toFixed(2)} = ${ft.toFixed(2)} N<br>
        Effective Ft = Ft * Cs = ${ft.toFixed(2)} * ${cs} = ${ftEff.toFixed(2)} N<br><br>
        
        [STEP 03] Beam Strength (Lewis Equation)<br>
        Fs = σo * b * π * m * y<br>
        Fs = ${sigma0} * ${b} * π * ${m} * ${yVal.toFixed(3)} = ${fs.toFixed(2)} N<br><br>
        
        [STEP 04] Safety Verification<br>
        Condition: Fs > Ft(eff) | Result: ${fs > ftEff ? '√ PASS' : 'X FAIL'}<br>
        Static Factor of Safety: ${(fs/ftEff).toFixed(2)}
    `;

    // 4. Render and Save
    const reportArea = document.getElementById('pdf-template');
    const canvas = await html2canvas(reportArea, { 
        scale: 2,
        useCORS: true,
        backgroundColor: '#ffffff'
    });
    
    const imgData = canvas.toDataURL('image/png');
    const pdf = new jsPDF('p', 'mm', 'a4');
    const pageWidth = pdf.internal.pageSize.getWidth();
    const imgWidth = pageWidth - 20; // 10mm margins
    const imgHeight = (canvas.height * imgWidth) / canvas.width;

    pdf.addImage(imgData, 'PNG', 10, 10, imgWidth, imgHeight);
    pdf.save(`Gear_Analysis_Report_${z1}T.pdf`);
}
</script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeSim Pro | Vibration-Driven System Simulator</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --bg: #0a0e14;
            --panel: rgba(20, 25, 35, 0.85);
            --accent: #00f2ff;
            --danger: #ff3e3e;
            --text: #e0e6ed;
            --font-mono: 'Space Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        #app {
            display: grid;
            grid-template-columns: 340px 1fr;
            grid-template-rows: 1fr 320px;
            height: 100vh;
            gap: 12px;
            padding: 12px;
        }

        .glass {
            background: var(--panel);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        /* Sidebar Controls */
        .controls {
            grid-row: 1 / 3;
            display: flex;
            flex-direction: column;
            gap: 24px;
            overflow-y: auto;
        }

        .brand h1 {
            font-size: 1.4rem;
            letter-spacing: 3px;
            color: var(--accent);
            font-weight: 800;
        }

        .badge {
            font-size: 0.65rem;
            background: rgba(0, 242, 255, 0.1);
            padding: 4px 8px;
            border-radius: 4px;
            color: var(--accent);
            border: 1px solid rgba(0, 242, 255, 0.2);
        }

        .control-group h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            margin-bottom: 16px;
            color: #8892b0;
            letter-spacing: 1px;
        }

        .input-field { margin-bottom: 18px; }

        .input-field label {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            margin-bottom: 10px;
        }

        .val-display { color: var(--accent); font-weight: bold; }

        input[type="range"] {
            width: 100%;
            height: 4px;
            background: #2d3748;
            border-radius: 2px;
            appearance: none;
            accent-color: var(--accent);
        }

        .metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: auto;
        }

        .metric-card {
            background: rgba(0, 0, 0, 0.4);
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .metric-card .label { font-size: 0.6rem; display: block; margin-bottom: 6px; color: #8892b0;}
        .metric-card .value { font-size: 1rem; font-weight: bold; color: var(--accent); }

        /* Main Simulation Area */
        .viewport-container {
            position: relative;
            background: radial-gradient(circle at center, #1a202c 0%, #0a0e14 100%);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }

        #canvas-container { width: 100%; height: 100%; }

        .overlay-ui {
            position: absolute;
            top: 24px;
            left: 24px;
            pointer-events: none;
        }

        .legend {
            font-size: 0.7rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0.4;
        }

        /* Analytics Panel */
        .analytics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .chart-wrapper {
            position: relative;
            height: 100%;
            width: 100%;
        }

        /* Status Effects */
        .res-active {
            color: var(--danger) !important;
            border-color: rgba(255, 62, 62, 0.3) !important;
            box-shadow: 0 0 15px rgba(255, 62, 62, 0.2);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); opacity: 0.8; }
            100% { transform: scale(1); }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 10px; }
    </style>
</head>
<body>

<div id="app">
    <aside class="controls glass">
        <div class="brand">
            <h1>VIBESIM</h1>
            <span class="badge">PHYSICS ENGINE V3.0</span>
        </div>

        <section class="control-group">
            <h3>System Properties</h3>
            <div class="input-field">
                <label>Mass (m) <span class="val-display" id="val-mass">2.0 kg</span></label>
                <input type="range" id="mass" min="0.5" max="10" step="0.1" value="2">
            </div>
            <div class="input-field">
                <label>Stiffness (k) <span class="val-display" id="val-stiffness">200 N/m</span></label>
                <input type="range" id="stiffness" min="50" max="1000" step="10" value="200">
            </div>
            <div class="input-field">
                <label>Damping (c) <span class="val-display" id="val-damping">1.5 Ns/m</span></label>
                <input type="range" id="damping" min="0.1" max="10" step="0.1" value="1.5">
            </div>
        </section>

        <section class="control-group">
            <h3>External Excitation</h3>
            <div class="input-field">
                <label>Frequency (ω) <span class="val-display" id="val-frequency">5.0 rad/s</span></label>
                <input type="range" id="frequency" min="0" max="30" step="0.1" value="5">
            </div>
            <div class="input-field">
                <label>Force (F₀) <span class="val-display" id="val-force">15 N</span></label>
                <input type="range" id="force" min="0" max="50" step="1" value="15">
            </div>
        </section>

        <div class="metrics">
            <div class="metric-card">
                <span class="label">NATURAL FREQ</span>
                <span class="value" id="res-fn">1.59 Hz</span>
            </div>
            <div class="metric-card" id="res-status-card">
                <span class="label">SYSTEM STATE</span>
                <span class="value" id="res-status">STABLE</span>
            </div>
        </div>
    </aside>

    <main class="viewport-container">
        <div id="canvas-container"></div>
        <div class="overlay-ui">
            <div class="legend">Real-Time Mechanical Simulation</div>
        </div>
    </main>

    <section class="analytics glass">
        <div class="chart-wrapper">
            <canvas id="freqChart"></canvas>
        </div>
        <div class="chart-wrapper">
            <canvas id="timeChart"></canvas>
        </div>
    </section>
</div>

<script>
/**
 * PHYSICS ENGINE
 * 2nd Order Differential Equation Solver (RK4)
 * m*x'' + c*x' + k*x = F0*sin(w*t)
 */
class PhysicsEngine {
    constructor() {
        this.params = { m: 2.0, k: 200, c: 1.5, w: 5.0, f0: 15 };
        this.state = { x: 0, v: 0, t: 0 };
    }

    getNaturalFrequency() {
        return Math.sqrt(this.params.k / this.params.m);
    }

    calculateSteadyStateAmp(omega) {
        const { m, k, c, f0 } = this.params;
        const denom = Math.sqrt(Math.pow(k - m * Math.pow(omega, 2), 2) + Math.pow(c * omega, 2));
        return f0 / denom;
    }

    update(dt) {
        const { m, k, c, w, f0 } = this.params;
        
        // Derivative function: a = (F_ext - F_damp - F_spring) / m
        const accel = (x, v, t) => (f0 * Math.sin(w * t) - c * v - k * x) / m;

        // Runge-Kutta 4th Order Integration
        const k1v = accel(this.state.x, this.state.v, this.state.t);
        const k1x = this.state.v;

        const k2v = accel(this.state.x + 0.5 * dt * k1x, this.state.v + 0.5 * dt * k1v, this.state.t + 0.5 * dt);
        const k2x = this.state.v + 0.5 * dt * k1v;

        const k3v = accel(this.state.x + 0.5 * dt * k2x, this.state.v + 0.5 * dt * k2v, this.state.t + 0.5 * dt);
        const k3x = this.state.v + 0.5 * dt * k2v;

        const k4v = accel(this.state.x + dt * k3x, this.state.v + dt * k3v, this.state.t + dt);
        const k4x = this.state.v + dt * k3v;

        this.state.v += (dt / 6) * (k1v + 2 * k2v + 2 * k3v + k4v);
        this.state.x += (dt / 6) * (k1x + 2 * k2x + 2 * k3x + k4x);
        this.state.t += dt;

        return this.state.x;
    }
}

/**
 * UI & 3D VISUALIZATION CONTROLLER
 */
class AppController {
    constructor() {
        this.engine = new PhysicsEngine();
        this.initThree();
        this.initCharts();
        this.bindEvents();
        this.animate();
        
        window.addEventListener('resize', () => this.onResize());
    }

    initThree() {
        const container = document.getElementById('canvas-container');
        this.scene = new THREE.Scene();
        this.camera = new THREE.PerspectiveCamera(40, container.clientWidth / container.clientHeight, 0.1, 1000);
        this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        
        this.renderer.setSize(container.clientWidth, container.clientHeight);
        this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(this.renderer.domElement);

        // Lighting
        const ambient = new THREE.AmbientLight(0xffffff, 0.4);
        const pointLight = new THREE.PointLight(0x00f2ff, 1.5);
        pointLight.position.set(5, 10, 5);
        this.scene.add(ambient, pointLight);

        // Stage
        const grid = new THREE.GridHelper(20, 20, 0x222222, 0x111111);
        grid.position.y = -0.1;
        this.scene.add(grid);

        // Base Platform
        const baseGeo = new THREE.CylinderGeometry(1.5, 1.6, 0.2, 32);
        const baseMat = new THREE.MeshStandardMaterial({ color: 0x1a202c, metalness: 0.8, roughness: 0.2 });
        this.base = new THREE.Mesh(baseGeo, baseMat);
        this.scene.add(this.base);

        // Mass (The "Toy Head")
        const headGeo = new THREE.SphereGeometry(0.7, 32, 32);
        const headMat = new THREE.MeshPhysicalMaterial({ 
            color: 0x00f2ff, 
            metalness: 0.9, 
            roughness: 0.1,
            emissive: 0x004444
        });
        this.head = new THREE.Mesh(headGeo, headMat);
        this.scene.add(this.head);

        // Procedural Spring
        this.springMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.6 });
        this.springGeo = new THREE.BufferGeometry();
        this.springLine = new THREE.Line(this.springGeo, this.springMat);
        this.scene.add(this.springLine);

        this.camera.position.set(5, 4, 7);
        this.camera.lookAt(0, 1.2, 0);
    }

    updateSpringGeometry(height) {
        const points = [];
        const turns = 12;
        const radius = 0.35;
        const segments = 120;
        
        for (let i = 0; i <= segments; i++) {
            const t = i / segments;
            const angle = t * Math.PI * 2 * turns;
            points.push(
                Math.cos(angle) * radius,
                t * height,
                Math.sin(angle) * radius
            );
        }
        this.springLine.geometry.setAttribute('position', new THREE.Float32BufferAttribute(points, 3));
    }

    initCharts() {
        Chart.defaults.color = '#8892b0';
        Chart.defaults.font.family = 'Space Mono, monospace';

        const commonOptions = {
            responsive: true,
            maintainAspectRatio: false,
            animation: false,
            plugins: { legend: { display: false } },
            scales: {
                x: { grid: { color: 'rgba(255,255,255,0.05)' } },
                y: { grid: { color: 'rgba(255,255,255,0.05)' } }
            }
        };

        this.freqChart = new Chart(document.getElementById('freqChart'), {
            type: 'line',
            data: { 
                labels: [], 
                datasets: [{ 
                    data: [], 
                    borderColor: '#00f2ff', 
                    borderWidth: 2, 
                    fill: true, 
                    backgroundColor: 'rgba(0, 242, 255, 0.05)',
                    pointRadius: 0,
                    tension: 0.4
                }] 
            },
            options: { ...commonOptions, plugins: { title: { display: true, text: 'FREQUENCY RESPONSE (AMPLITUDE)', color: '#e0e6ed' } } }
        });

        this.timeChart = new Chart(document.getElementById('timeChart'), {
            type: 'line',
            data: { 
                labels: Array(100).fill(''), 
                datasets: [{ 
                    data: Array(100).fill(0), 
                    borderColor: '#ff3e3e', 
                    borderWidth: 2,
                    pointRadius: 0,
                    tension: 0.2
                }] 
            },
            options: { ...commonOptions, plugins: { title: { display: true, text: 'REAL-TIME DISPLACEMENT (x)', color: '#e0e6ed' } } }
        });
    }

    bindEvents() {
        const inputs = ['mass', 'stiffness', 'damping', 'frequency', 'force'];
        const mapping = { mass: 'm', stiffness: 'k', damping: 'c', frequency: 'w', force: 'f0' };
        const units = { mass: 'kg', stiffness: 'N/m', damping: 'Ns/m', frequency: 'rad/s', force: 'N' };

        inputs.forEach(id => {
            const el = document.getElementById(id);
            el.addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                this.engine.params[mapping[id]] = val;
                document.getElementById(`val-${id}`).innerText = `${val.toFixed(1)} ${units[id]}`;
                this.updateStaticUI();
            });
        });
        this.updateStaticUI();
    }

    updateStaticUI() {
        const fn = this.engine.getNaturalFrequency();
        document.getElementById('res-fn').innerText = (fn / (Math.PI * 2)).toFixed(2) + ' Hz';

        // Update Frequency Response Chart Curve
        const labels = [];
        const data = [];
        for (let w = 0; w <= 30; w += 0.5) {
            labels.push(w);
            data.push(this.engine.calculateSteadyStateAmp(w));
        }
        this.freqChart.data.labels = labels;
        this.freqChart.data.datasets[0].data = data;
        this.freqChart.update();
    }

    onResize() {
        const container = document.getElementById('canvas-container');
        this.camera.aspect = container.clientWidth / container.clientHeight;
        this.camera.updateProjectionMatrix();
        this.renderer.setSize(container.clientWidth, container.clientHeight);
    }

    animate() {
        requestAnimationFrame(() => this.animate());

        // 1. Physics Step
        const x = this.engine.update(0.016); // ~60 FPS step
        const staticOffset = 2.0;

        // 2. 3D Updates
        this.head.position.y = staticOffset + x;
        this.updateSpringGeometry(staticOffset + x);

        // 3. UI Status Updates
        const currentW = this.engine.params.w;
        const fn = this.engine.getNaturalFrequency();
        const resRatio = Math.abs(currentW - fn) / fn;
        
        const statusEl = document.getElementById('res-status');
        const cardEl = document.getElementById('res-status-card');

        if (resRatio < 0.1) {
            statusEl.innerText = "RESONANCE";
            cardEl.classList.add('res-active');
        } else {
            statusEl.innerText = "STABLE";
            cardEl.classList.remove('res-active');
        }

        // 4. Time Chart Update
        this.timeChart.data.datasets[0].data.push(x);
        this.timeChart.data.datasets[0].data.shift();
        this.timeChart.update('none');

        this.renderer.render(this.scene, this.camera);
    }
}

// Initialize Application
window.addEventListener('DOMContentLoaded', () => {
    new AppController();
});
</script>

</body>
</html>

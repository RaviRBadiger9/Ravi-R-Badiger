<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAB_OS // VibeSim Core v5.0</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&display=swap');

        :root {
            --bg-black: #080808;
            --deck-bg: #121212;
            --accent: #00ff9d;
            --warn: #ffcc00;
            --error: #ff4444;
            --border: #2a2a2a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-black);
            color: #eee;
            font-family: 'Fira Code', monospace;
            display: grid;
            grid-template-columns: 320px 1fr;
            height: 100vh;
            overflow: hidden;
        }

        /* Side Deck */
        #control-deck {
            background: var(--deck-bg);
            border-right: 1px solid var(--border);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        .deck-header { border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-bottom: 10px; }
        .deck-header h2 { font-size: 0.9rem; letter-spacing: 2px; color: var(--accent); }

        .param-group { margin-bottom: 15px; }
        .param-label { display: flex; justify-content: space-between; font-size: 0.7rem; color: #888; margin-bottom: 5px; }
        .param-value { color: var(--accent); font-weight: bold; }

        input[type="range"] {
            width: 100%; -webkit-appearance: none; background: #222; height: 4px; border-radius: 2px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 12px; width: 12px; background: var(--accent); cursor: pointer;
        }

        select {
            width: 100%; background: #1a1a1a; color: #fff; border: 1px solid var(--border);
            padding: 8px; font-family: inherit; font-size: 0.8rem; outline: none;
        }

        /* Main Workspace */
        #workspace { display: grid; grid-template-rows: 1fr 250px; }

        #viewport { position: relative; background: radial-gradient(circle, #1a1a1a 0%, #080808 100%); }
        
        #data-log {
            background: var(--deck-bg);
            border-top: 1px solid var(--border);
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 15px;
        }

        .chart-container { position: relative; height: 100%; }

        .sys-badge {
            background: rgba(0, 255, 157, 0.05); border: 1px solid rgba(0, 255, 157, 0.2);
            padding: 10px; border-radius: 4px; margin-top: auto;
        }
    </style>
</head>
<body>

    <aside id="control-deck">
        <div class="deck-header">
            <h2>SYSTEM_ADJUST</h2>
        </div>

        <div class="param-group">
            <label class="param-label">ENV_PROFILE</label>
            <select id="profile-select">
                <option value="earth">Earth (Standard Damping)</option>
                <option value="vacuum">Vacuum (Zero Damping)</option>
                <option value="submerged">Viscous (High Damping)</option>
            </select>
        </div>

        <div class="param-group">
            <label class="param-label">MASS (m) <span class="param-value" id="val-m">2.0 kg</span></label>
            <input type="range" id="mass" min="0.5" max="10" step="0.1" value="2">
        </div>

        <div class="param-group">
            <label class="param-label">STIFFNESS (k) <span class="param-value" id="val-k">200 N/m</span></label>
            <input type="range" id="stiffness" min="50" max="1000" step="10" value="200">
        </div>

        <div class="param-group">
            <label class="param-label">FORCE_FREQ (ω) <span class="param-value" id="val-w">5.0 rad/s</span></label>
            <input type="range" id="frequency" min="0" max="30" step="0.1" value="5">
        </div>

        <div class="sys-badge">
            <div style="font-size: 0.6rem; color: #666;">DIAGNOSTICS</div>
            <div id="diag-res" style="font-size: 0.8rem; color: var(--accent);">Resonance: Nominal</div>
            <div id="diag-fn" style="font-size: 0.8rem;">Fn: 10.00 rad/s</div>
        </div>
    </aside>

    <main id="workspace">
        <div id="viewport"></div>
        <div id="data-log">
            <div class="chart-container"><canvas id="traceChart"></canvas></div>
            <div class="chart-container"><canvas id="freqChart"></canvas></div>
        </div>
    </main>

<script>
/**
 * CORE PHYSICS KERNEL
 */
class PhysicsKernel {
    constructor() {
        this.m = 2.0; this.k = 200; this.c = 1.0; this.w = 5.0; this.f0 = 15;
        this.x = 0; this.v = 0; this.t = 0;
    }

    step(dt) {
        // RK4 Integration
        const a = (x, v, t) => (this.f0 * Math.sin(this.w * t) - this.c * v - this.k * x) / this.m;
        
        const k1v = a(this.x, this.v, this.t);
        const k1x = this.v;
        const k2v = a(this.x + 0.5*dt*k1x, this.v + 0.5*dt*k1v, this.t + 0.5*dt);
        const k2x = this.v + 0.5*dt*k1v;
        const k3v = a(this.x + 0.5*dt*k2x, this.v + 0.5*dt*k2v, this.t + 0.5*dt);
        const k3x = this.v + 0.5*dt*k2v;
        const k4v = a(this.x + dt*k3x, this.v + dt*k3v, this.t + dt);
        const k4x = this.v + dt*k3v;

        this.v += (dt/6) * (k1v + 2*k2v + 2*k3v + k4v);
        this.x += (dt/6) * (k1x + 2*k2x + 2*k3x + k4x);
        this.t += dt;
        return this.x;
    }
}

/**
 * SIMULATION MANAGER
 */
class LabManager {
    constructor() {
        this.kernel = new PhysicsKernel();
        this.init3D();
        this.initCharts();
        this.bindUI();
        this.loop();
    }

    init3D() {
        const container = document.getElementById('viewport');
        this.scene = new THREE.Scene();
        this.camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        this.renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(this.renderer.domElement);

        this.scene.add(new THREE.GridHelper(10, 20, 0x222222, 0x111111));
        
        // The Mass
        this.bob = new THREE.Mesh(
            new THREE.BoxGeometry(1, 1, 1),
            new THREE.MeshStandardMaterial({ color: 0x00ff9d, wireframe: false, metalness: 0.8 })
        );
        this.scene.add(this.bob);

        // Light
        const pLight = new THREE.PointLight(0xffffff, 20);
        pLight.position.set(2, 5, 2);
        this.scene.add(pLight, new THREE.AmbientLight(0xffffff, 0.2));

        this.camera.position.set(4, 4, 4);
        this.camera.lookAt(0, 0, 0);
    }

    initCharts() {
        Chart.defaults.color = '#555';
        const config = (title) => ({
            type: 'line',
            data: { labels: Array(100).fill(''), datasets: [{ data: Array(100).fill(0), borderColor: '#00ff9d', borderWidth: 1, pointRadius: 0 }] },
            options: { responsive: true, maintainAspectRatio: false, animation: false, plugins: { title: { display: true, text: title, color: '#888' } } }
        });

        this.traceChart = new Chart(document.getElementById('traceChart'), config('TIME_TRACE (displacement)'));
        this.freqChart = new Chart(document.getElementById('freqChart'), config('PHASE_MAP (velocity)'));
    }

    bindUI() {
        const update = (id, prop) => {
            const el = document.getElementById(id);
            el.addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                this.kernel[prop] = val;
                document.getElementById(`val-${prop}`).innerText = `${val.toFixed(1)}`;
                this.updateDiagnostics();
            });
        };

        update('mass', 'm'); update('stiffness', 'k'); update('frequency', 'w');

        document.getElementById('profile-select').addEventListener('change', (e) => {
            const profiles = { earth: 1.0, vacuum: 0.0, submerged: 8.0 };
            this.kernel.c = profiles[e.target.value];
        });
    }

    updateDiagnostics() {
        const fn = Math.sqrt(this.kernel.k / this.kernel.m);
        document.getElementById('diag-fn').innerText = `Fn: ${fn.toFixed(2)} rad/s`;
        const res = Math.abs(this.kernel.w - fn) < 1 ? "CRITICAL" : "Nominal";
        document.getElementById('diag-res').innerText = `Resonance: ${res}`;
        document.getElementById('diag-res').style.color = res === "CRITICAL" ? "#ff4444" : "#00ff9d";
    }

    loop() {
        requestAnimationFrame(() => this.loop());
        
        const x = this.kernel.step(0.016);
        this.bob.position.y = x;

        // Update Charts
        this.traceChart.data.datasets[0].data.push(x);
        this.traceChart.data.datasets[0].data.shift();
        this.traceChart.update('none');

        this.renderer.render(this.scene, this.camera);
    }
}

window.onload = () => new LabManager();
</script>
</body>
</html>

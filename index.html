<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpurGear Pro | Analytical Engineering Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #1e293b; margin: 0; overflow: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(0, 0, 0, 0.05); }
        input, select { background: #ffffff !important; border: 1px solid #cbd5e1 !important; color: #334155 !important; padding: 0.4rem; font-size: 0.7rem; border-radius: 6px; width: 100%; }
        #splash-screen { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(8px); z-index: 100; display: flex; align-items: center; justify-content: center; }
        .option-card { background: white; padding: 2rem; border-radius: 12px; width: 320px; cursor: pointer; border: 2px solid transparent; transition: all 0.3s; }
        .option-card:hover { transform: translateY(-5px); border-color: #3b82f6; }
        #pdf-template { position: absolute; left: -9999px; width: 800px; padding: 40px; background: white; color: black; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .calc-card { animation: slideIn 0.4s ease-out forwards; }
        
        /* New Toggle Style */
        #anim-toggle { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 50; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="max-w-5xl w-full px-8 text-center">
            <img src="image_792432.png" alt="Gear Logo" class="w-24 h-24 mx-auto mb-6 rounded-lg shadow-xl">
            <h2 class="text-white text-3xl font-bold mb-10">Select Design Path</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="option-card text-left" onclick="launchEngine('single')">
                    <h3 class="font-bold text-slate-800">Single Stage</h3>
                    <p class="text-xs text-slate-500 mt-2">Standard 2-gear drive (IS:2535).</p>
                </div>
                <div class="option-card text-left" onclick="launchEngine('double')">
                    <h3 class="font-bold text-slate-800">Double Stage</h3>
                    <p class="text-xs text-slate-500 mt-2">Extended multi-shaft system.</p>
                </div>
                <div class="option-card text-left" onclick="launchEngine('compound')">
                    <h3 class="font-bold text-slate-800">Compound</h3>
                    <p class="text-xs text-slate-500 mt-2">Common shaft gear train.</p>
                </div>
            </div>
        </div>
    </div>

    <div id="main-engine" class="h-screen flex flex-col hidden">
        <header class="h-12 glass flex items-center justify-between px-8 border-b border-black/5 z-20">
            <div class="flex items-center gap-4">
                <button onclick="location.reload()" class="text-[10px] bg-slate-100 px-2 py-1 rounded">← MENU</button>
                <img src="image_792432.png" alt="Icon" class="h-6 w-6 rounded">
                <h1 class="text-xs font-bold tracking-widest uppercase text-slate-800">SpurGear <span id="mode-label" class="text-blue-600">--</span></h1>
            </div>
            <button onclick="generatePDF()" class="bg-blue-600 text-white text-[10px] px-4 py-1.5 rounded-full font-bold hover:bg-blue-700 transition">
                SAVE PDF REPORT
            </button>
        </header>

        <div class="flex-1 flex overflow-hidden relative">
            <!-- Animation Toggle Button -->
            <div id="anim-toggle">
                <button id="toggleBtn" onclick="toggleAnimation()" class="bg-slate-800 text-white text-[10px] px-6 py-2 rounded-full font-bold shadow-lg hover:bg-blue-600 transition-all">
                    MOTION: ON
                </button>
            </div>

            <aside class="w-80 glass border-r border-black/5 p-5 space-y-4 overflow-y-auto z-10">
                <section>
                    <label class="text-[9px] text-slate-500 uppercase font-bold">Material Stress (σo)</label>
                    <select id="material-stress" onchange="updateDesign()">
                        <option value="47.1" data-color="#94a3b8">Cast Iron Grade 20 (47.1 MPa)</option>
                        <option value="78.5" data-color="#64748b">Cast Iron Grade 35 (78.5 MPa)</option>
                        <option value="138.3" data-color="#cbd5e1">Cast Steel 0.20%C (138.3 MPa)</option>
                        <option value="233.4" selected data-color="#3b82f6">Steel C45 Untreated (233.4 MPa)</option>
                        <option value="345.2" data-color="#fbbf24">Alloy Steel Hardened (345.2 MPa)</option>
                    </select>
                </section>

                <section>
                    <label class="text-[9px] text-slate-500 uppercase font-bold">Material Pair</label>
                    <select id="mat-pair" onchange="updateDesign()">
                        <option value="ST_ST" selected>Steel & Steel</option>
                        <option value="CI_CI">Cast Iron & Cast Iron</option>
                        <option value="CI_ST">Cast Iron & Steel</option>
                    </select>
                </section>

                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="text-[9px] text-slate-500 uppercase font-bold">Load Type</label>
                        <select id="load-type" onchange="updateDesign()">
                            <option value="steady">Steady</option>
                            <option value="medium" selected>Medium</option>
                            <option value="heavy">Heavy</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[9px] text-slate-500 uppercase font-bold">Service</label>
                        <select id="service-type" onchange="updateDesign()">
                            <option value="intermittent">3h/day</option>
                            <option value="standard" selected>10h/day</option>
                            <option value="continuous">24h/day</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="text-[9px] text-slate-500 uppercase font-bold">Tooth System</label>
                        <select id="tooth-system" onchange="updateDesign()">
                            <option value="14.5">14.5° Inv</option>
                            <option value="20" selected>20° Full</option>
                            <option value="20stub">20° Stub</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[9px] text-slate-500 uppercase font-bold">Error (e)</label>
                        <select id="gear-error" onchange="updateDesign()">
                            <option value="0.01">0.01 mm</option>
                            <option value="0.03" selected>0.03 mm</option>
                            <option value="0.06">0.06 mm</option>
                        </select>
                    </div>
                </div>

                <section>
                    <label class="text-[9px] text-slate-500 uppercase font-bold">Module (m)</label>
                    <select id="module-sel" onchange="updateDesign()">
                        <option value="1">1.0</option><option value="2">2.0</option>
                        <option value="3" selected>3.0</option><option value="4">4.0</option>
                        <option value="5">5.0</option><option value="8">8.0</option>
                    </select>
                </section>

                <div class="grid grid-cols-2 gap-2">
                    <div><label class="text-[9px] text-slate-500 uppercase font-bold">Power (kW)</label><input type="number" id="in-p" value="15" oninput="updateDesign()"></div>
                    <div><label class="text-[9px] text-slate-500 uppercase font-bold">RPM (n1)</label><input type="number" id="in-n" value="1440" oninput="updateDesign()"></div>
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <div><label class="text-[9px] text-slate-500 uppercase font-bold">Z1 (Pinion)</label><input type="number" id="z1" value="18" oninput="updateDesign()"></div>
                    <div><label class="text-[9px] text-slate-500 uppercase font-bold">Z2 (Gear)</label><input type="number" id="z2" value="54" oninput="updateDesign()"></div>
                </div>

                <div id="multi-stage-inputs" class="hidden grid grid-cols-2 gap-2 border-t pt-2 border-slate-200">
                    <div><label class="text-[9px] text-slate-500 uppercase font-bold">Z3</label><input type="number" id="z3" value="20" oninput="updateDesign()"></div>
                    <div><label class="text-[9px] text-slate-500 uppercase font-bold">Z4</label><input type="number" id="z4" value="60" oninput="updateDesign()"></div>
                </div>
            </aside>

            <main class="flex-1 relative bg-[#f8fafc]">
                <div id="render-area" class="w-full h-full"></div>
            </main>

            <aside id="data-panel" class="w-80 glass border-l border-black/5 p-6 overflow-y-auto z-10">
                <h2 class="text-xs font-bold text-slate-600 mb-6 uppercase tracking-widest">Engineering Summary</h2>
                <div id="step-output" class="text-[11px] mono space-y-4"></div>
            </aside>
        </div>
    </div>

    <div id="pdf-template">
        <h1 style="font-size: 20px; border-bottom: 2px solid #000;">Design Report (IS:2535)</h1>
        <div id="pdf-content" style="margin-top: 20px; line-height: 1.6;"></div>
    </div>

    <script>
        let scene, camera, renderer, controls, gearGroup, engineMode;
        let activeGears = []; 
        let isAnimating = true;
        let lateralParticles = [];

        const serviceFactorTable = {
            steady: { intermittent: 0.8, standard: 1.0, continuous: 1.25 },
            medium: { intermittent: 1.2, standard: 1.5, continuous: 1.8 },
            heavy: { intermittent: 1.5, standard: 1.8, continuous: 2.0 }
        };

        const dynamicFactorC = {
            "14.5": { "ST_ST": { "0.01": 110, "0.03": 330, "0.06": 660 }, "CI_CI": { "0.01": 55, "0.03": 165, "0.06": 331 }, "CI_ST": { "0.01": 75, "0.03": 227, "0.06": 454 } },
            "20": { "ST_ST": { "0.01": 114, "0.03": 343, "0.06": 686 }, "CI_CI": { "0.01": 57, "0.03": 171, "0.06": 343 }, "CI_ST": { "0.01": 78, "0.03": 235, "0.06": 471 } },
            "20stub": { "ST_ST": { "0.01": 118, "0.03": 356, "0.06": 712 }, "CI_CI": { "0.01": 59, "0.03": 178, "0.06": 356 }, "CI_ST": { "0.01": 81, "0.03": 244, "0.06": 488 } }
        };

        function toggleAnimation() {
            isAnimating = !isAnimating;
            const btn = document.getElementById('toggleBtn');
            btn.innerText = isAnimating ? "MOTION: ON" : "MOTION: OFF";
            btn.classList.toggle('bg-slate-800');
            btn.classList.toggle('bg-red-500');
        }

        function launchEngine(mode) {
            engineMode = mode;
            document.getElementById('splash-screen').style.display = 'none';
            document.getElementById('main-engine').classList.remove('hidden');
            document.getElementById('mode-label').innerText = mode.toUpperCase();
            if(mode !== 'single') document.getElementById('multi-stage-inputs').classList.remove('hidden');
            init();
            updateDesign();
        }

        function init() {
            const area = document.getElementById('render-area');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf8fafc);
            camera = new THREE.PerspectiveCamera(40, area.clientWidth / area.clientHeight, 1, 2000);
            camera.position.set(150, 150, 150);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(area.clientWidth, area.clientHeight);
            area.appendChild(renderer.domElement);
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const sun = new THREE.DirectionalLight(0xffffff, 0.5);
            sun.position.set(10, 20, 10);
            scene.add(sun);
            gearGroup = new THREE.Group();
            scene.add(gearGroup);
            animate();
        }

        function createGearMesh(z, m, x, color, yOffset = 0, zOffset = 0, speedFactor = 1, initialOffset = 0) {
            const r_pitch = (z * m) / 2;
            const r_dedendum = r_pitch - 1.25 * m;
            const thickness = 10;
            const gearContainer = new THREE.Group(); 
            const gearShape = new THREE.Shape();
            gearShape.absarc(0, 0, r_dedendum, 0, Math.PI * 2, false);
            
            const bodySettings = { depth: thickness, bevelEnabled: true, bevelThickness: 0.5, bevelSize: 0.5, segments: 64 };
            const geometry = new THREE.ExtrudeGeometry(gearShape, bodySettings);
            const material = new THREE.MeshStandardMaterial({ color: color, metalness: 0.7, roughness: 0.3 });
            const mesh = new THREE.Mesh(geometry, material);
            gearContainer.add(mesh);

            const toothWidthBottom = m * 1.57;
            const toothWidthTop = m * 0.8;
            const toothHeight = 2.25 * m;

            for (let i = 0; i < z; i++) {
                const angle = (i / z) * Math.PI * 2;
                const toothShape = new THREE.Shape();
                toothShape.moveTo(-toothWidthBottom / 2, 0);
                toothShape.lineTo(-toothWidthTop / 2, toothHeight);
                toothShape.lineTo(toothWidthTop / 2, toothHeight);
                toothShape.lineTo(toothWidthBottom / 2, 0);
                const toothGeo = new THREE.ExtrudeGeometry(toothShape, { depth: thickness, bevelEnabled: false });
                const toothMesh = new THREE.Mesh(toothGeo, material);
                toothMesh.position.x = Math.cos(angle) * r_dedendum;
                toothMesh.position.y = Math.sin(angle) * r_dedendum;
                toothMesh.rotation.z = angle - Math.PI / 2;
                mesh.add(toothMesh);
            }

            gearContainer.position.set(x, yOffset, zOffset);
            gearContainer.rotation.x = Math.PI / 2;
            gearContainer.rotation.y = initialOffset;
            activeGears.push({ obj: gearContainer, speed: speedFactor, pitch: r_pitch });
            
            // Add a "reaction flow" particle for lateral opposite motion
            const pGeo = new THREE.SphereGeometry(1.5, 8, 8);
            const pMat = new THREE.MeshBasicMaterial({ color: 0xff4444 });
            const particle = new THREE.Mesh(pGeo, pMat);
            particle.position.set(x + (speedFactor > 0 ? r_pitch : -r_pitch), yOffset + 12, zOffset);
            gearGroup.add(particle);
            lateralParticles.push({ mesh: particle, originX: x, gearSpeed: speedFactor, radius: r_pitch });

            return gearContainer;
        }

        function updateDesign() {
            if(!gearGroup) return;
            while(gearGroup.children.length > 0) gearGroup.remove(gearGroup.children[0]);
            activeGears = [];
            lateralParticles = [];
            
            const z1 = parseInt(document.getElementById('z1').value) || 1;
            const z2 = parseInt(document.getElementById('z2').value) || 1;
            const z3 = parseInt(document.getElementById('z3').value) || 1;
            const z4 = parseInt(document.getElementById('z4').value) || 1;
            const m = parseFloat(document.getElementById('module-sel').value);
            const p = parseFloat(document.getElementById('in-p').value);
            const n1 = parseFloat(document.getElementById('in-n').value);
            const toothType = document.getElementById('tooth-system').value;
            const errorVal = document.getElementById('gear-error').value;
            const matPair = document.getElementById('mat-pair').value;
            const matEl = document.getElementById('material-stress');
            const sigma0 = parseFloat(matEl.value);
            const gearColor = matEl.options[matEl.selectedIndex].getAttribute('data-color');
            const cs = serviceFactorTable[document.getElementById('load-type').value][document.getElementById('service-type').value];
            const C = dynamicFactorC[toothType][matPair][errorVal];

            const d1 = z1 * m, d2 = z2 * m, b = 10 * m;
            const ratio1 = z1 / z2;
            const v = (Math.PI * d1 * n1) / 60000;
            const getY = (z) => (toothType === "20") ? 0.154 - (0.912/z) : 0.124 - (0.684/z);
            const y1 = getY(z1), y2 = getY(z2);
            const designY = (sigma0 * y1 <= sigma0 * y2) ? y1 : y2;
            const ft = (v > 0) ? (1000 * p) / v : 0;
            const ftEff = ft * cs;
            const fs = sigma0 * b * Math.PI * m * designY;
            const fd = ftEff + ((21 * v * (b * C + ftEff)) / (21 * v + Math.sqrt(b * C + ftEff)));

            if(engineMode === 'single') {
                gearGroup.add(createGearMesh(z1, m, 0, gearColor, 0, 0, 1, 0));
                gearGroup.add(createGearMesh(z2, m, (d1 + d2)/2, gearColor, 0, 0, -ratio1, Math.PI/z2));
            } else if (engineMode === 'double') {
                gearGroup.add(createGearMesh(z1, m, 0, gearColor, 0, 0, 1));
                gearGroup.add(createGearMesh(z2, m, (d1 + d2)/2, gearColor, 0, 0, -ratio1, Math.PI/z2));
                const d3 = z3 * m, d4 = z4 * m;
                const ratio2 = z3 / z4;
                gearGroup.add(createGearMesh(z3, m, 0, gearColor, 0, 50, 1));
                gearGroup.add(createGearMesh(z4, m, (d3 + d4)/2, gearColor, 0, 50, -ratio2, Math.PI/z4));
            } else if (engineMode === 'compound') {
                gearGroup.add(createGearMesh(z1, m, 0, gearColor, 0, 0, 1));
                const shaftX = (d1 + d2)/2;
                gearGroup.add(createGearMesh(z2, m, shaftX, gearColor, 0, 0, -ratio1, Math.PI/z2));
                gearGroup.add(createGearMesh(z3, m, shaftX, gearColor, 12, 0, -ratio1, 0)); 
                const d3 = z3 * m, d4 = z4 * m;
                gearGroup.add(createGearMesh(z4, m, shaftX + (d3 + d4)/2, gearColor, 12, 0, (ratio1 * (z3/z4)), Math.PI/z4));
            }

            const output = document.getElementById('step-output');
            output.innerHTML = `
                <div class="calc-card p-3 bg-slate-100 border border-slate-300 rounded mb-2">
                    <b class="text-slate-700 uppercase text-[9px]">1. System Data</b><br>
                    Velocity: ${v.toFixed(2)} m/s
                </div>
                <div class="calc-card p-3 bg-blue-50 border border-blue-200 rounded mb-2">
                    <b class="text-blue-700 uppercase text-[9px]">2. Load Analysis</b><br>
                    Ft: ${ft.toFixed(2)} N
                </div>
                <div class="calc-card p-3 ${fs > fd ? 'bg-emerald-50' : 'bg-red-50'} rounded mb-2">
                    <b class="uppercase text-[9px]">3. Strength</b><br>
                    Fs: ${fs.toFixed(2)} N
                </div>
            `;
        }

        async function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            document.getElementById('pdf-content').innerHTML = document.getElementById('step-output').innerHTML;
            const canvas = await html2canvas(document.getElementById('pdf-template'));
            doc.addImage(canvas.toDataURL('image/png'), 'PNG', 15, 15, 180, 0);
            doc.save('Gear_Report.pdf');
        }

        function animate() {
            requestAnimationFrame(animate);
            if(isAnimating) {
                const rpm = parseFloat(document.getElementById('in-n').value) || 0;
                const angularVelocity = (rpm * 2 * Math.PI) / (3600); 
                
                activeGears.forEach(gear => {
                    gear.obj.rotation.y += angularVelocity * gear.speed;
                });

                // Lateral Opposite Motion: Particles moving tangentially opposite to the rotation
                lateralParticles.forEach(p => {
                    // Calculate lateral shift based on angular velocity but in opposite sign
                    const lateralSpeed = angularVelocity * p.radius;
                    p.mesh.position.z += lateralSpeed * (p.gearSpeed > 0 ? -1 : 1) * 20; 
                    
                    // Reset position for continuous lateral flow effect
                    if (Math.abs(p.mesh.position.z) > 40) p.mesh.position.z = -p.mesh.position.z;
                });
            }

            if(controls) controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>

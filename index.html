<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VibeSim | Industrial Lab Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --panel-bg: #1a1c21;
            --border: #2d3139;
            --accent: #3b82f6;
            --text: #e2e8f0;
        }

        body { 
            background: #0f1115; 
            color: var(--text); 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0; 
            display: grid; 
            grid-template-columns: 320px 1fr; 
            height: 100vh; 
            overflow: hidden;
        }

        /* Sidebar UI */
        #ui-layer {
            background: var(--panel-bg);
            border-right: 1px solid var(--border);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 10;
        }

        h2 { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); margin-bottom: 20px; }

        .control-unit { margin-bottom: 15px; }
        .label-group { display: flex; justify-content: space-between; font-size: 0.75rem; margin-bottom: 8px; color: #94a3b8; }
        .val-out { font-family: monospace; color: white; background: #2d3139; padding: 2px 6px; border-radius: 4px; }

        input[type="range"] {
            width: 100%; -webkit-appearance: none; background: var(--border); height: 4px; border-radius: 2px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 16px; width: 16px; background: var(--accent); border-radius: 50%; cursor: pointer; border: 2px solid white;
        }

        /* Viewport & Charts */
        #stage { position: relative; display: grid; grid-template-rows: 1fr 280px; }
        #canvas-container { background: #14161a; cursor: move; }
        
        #analytics { 
            background: #111318; 
            border-top: 1px solid var(--border); 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            padding: 20px; 
            gap: 20px;
        }

        .status-pill {
            margin-top: auto;
            padding: 12px;
            background: #252932;
            border-radius: 8px;
            font-size: 0.7rem;
            border-left: 4px solid var(--accent);
        }
    </style>
</head>
<body>

<aside id="ui-layer">
    <h2>System Params</h2>
    
    <div class="control-unit">
        <div class="label-group"><span>Mass [m]</span> <span class="val-out" id="out-m">2.0 kg</span></div>
        <input type="range" id="m" min="0.5" max="10" step="0.1" value="2.0">
    </div>

    <div class="control-unit">
        <div class="label-group"><span>Stiffness [k]</span> <span class="val-out" id="out-k">200 N/m</span></div>
        <input type="range" id="k" min="50" max="1000" step="10" value="200">
    </div>

    <div class="control-unit">
        <div class="label-group"><span>Damping [c]</span> <span class="val-out" id="out-c">1.0 Ns/m</span></div>
        <input type="range" id="c" min="0" max="5" step="0.1" value="1.0">
    </div>

    <div class="control-unit">
        <div class="label-group"><span>Frequency [ω]</span> <span class="val-out" id="out-w">5.0 rad/s</span></div>
        <input type="range" id="w" min="0" max="30" step="0.5" value="5.0">
    </div>

    <div class="status-pill">
        <div style="color: #94a3b8">System State:</div>
        <div id="state-text" style="font-weight: bold; margin-top: 4px;">OPERATIONAL</div>
    </div>
</aside>

<main id="stage">
    <div id="canvas-container"></div>
    <div id="analytics">
        <canvas id="chart-x"></canvas>
        <canvas id="chart-v"></canvas>
    </div>
</main>

<script>
/**
 * INDUSTRIAL PHYSICS ENGINE
 */
class Engine {
    constructor() {
        this.m = 2; this.k = 200; this.c = 1; this.w = 5; this.f0 = 20;
        this.x = 0; this.v = 0; this.t = 0;
    }

    step(dt) {
        // RK4 Algorithm for precision
        const a = (x, v, t) => (this.f0 * Math.sin(this.w * t) - this.c * v - this.k * x) / this.m;
        
        const k1v = a(this.x, this.v, this.t);
        const k1x = this.v;
        const k2v = a(this.x + 0.5*dt*k1x, this.v + 0.5*dt*k1v, this.t + 0.5*dt);
        const k2x = this.v + 0.5*dt*k1v;
        const k3v = a(this.x + 0.5*dt*k2x, this.v + 0.5*dt*k2v, this.t + 0.5*dt);
        const k3x = this.v + 0.5*dt*k2v;
        const k4v = a(this.x + dt*k3x, this.v + dt*k3v, this.t + dt);
        const k4x = this.v + dt*k3v;

        this.v += (dt/6) * (k1v + 2*k2v + 2*k3v + k4v);
        this.x += (dt/6) * (k1x + 2*k2x + 2*k3x + k4x);
        this.t += dt;
        return { x: this.x, v: this.v };
    }
}

/**
 * 3D SCENE & GRAPHICS
 */
class Visualizer {
    constructor() {
        this.engine = new Engine();
        this.initThree();
        this.initCharts();
        this.setupEvents();
        this.animate();
    }

    initThree() {
        const container = document.getElementById('canvas-container');
        this.scene = new THREE.Scene();
        this.camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        this.renderer = new THREE.WebGLRenderer({ antialias: true });
        this.renderer.setSize(container.clientWidth, container.clientHeight);
        this.renderer.setClearColor(0x14161a);
        this.renderer.shadowMap.enabled = true;
        container.appendChild(this.renderer.domElement);

        // Machinery Floor
        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(20, 20),
            new THREE.MeshStandardMaterial({ color: 0x1a1c21, roughness: 0.1, metalness: 0.5 })
        );
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        this.scene.add(floor);

        const grid = new THREE.GridHelper(20, 20, 0x2d3139, 0x1e2126);
        grid.position.y = 0.01;
        this.scene.add(grid);

        // Machined Aluminum Mass
        this.massMesh = new THREE.Mesh(
            new THREE.BoxGeometry(1, 0.5, 1),
            new THREE.MeshStandardMaterial({ color: 0x94a3b8, roughness: 0.3, metalness: 0.8 })
        );
        this.massMesh.castShadow = true;
        this.scene.add(this.massMesh);

        // Industrial Lighting
        const spot = new THREE.DirectionalLight(0xffffff, 2);
        spot.position.set(5, 10, 5);
        spot.castShadow = true;
        this.scene.add(spot, new THREE.AmbientLight(0x404040, 1));

        this.camera.position.set(5, 4, 8);
        this.camera.lookAt(0, 1, 0);
    }

    initCharts() {
        const cfg = (label, color) => ({
            type: 'line',
            data: { labels: Array(100).fill(''), datasets: [{ data: Array(100).fill(0), borderColor: color, borderWidth: 2, pointRadius: 0, fill: false }] },
            options: { responsive: true, maintainAspectRatio: false, animation: false, scales: { x: { display: false }, y: { grid: { color: '#2d3139' } } }, plugins: { legend: { display: false } } }
        });

        this.chartX = new Chart(document.getElementById('chart-x'), cfg('Displacement', '#3b82f6'));
        this.chartV = new Chart(document.getElementById('chart-v'), cfg('Velocity', '#10b981'));
    }

    setupEvents() {
        ['m', 'k', 'c', 'w'].forEach(id => {
            const input = document.getElementById(id);
            input.addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                this.engine[id] = val;
                document.getElementById(`out-${id}`).innerText = `${val.toFixed(1)}`;
            });
        });
    }

    animate() {
        requestAnimationFrame(() => this.animate());
        
        const data = this.engine.step(0.016);
        const yBase = 2.0;

        // Physical Animation
        this.massMesh.position.y = yBase + data.x;

        // Data Update
        this.chartX.data.datasets[0].data.push(data.x);
        this.chartX.data.datasets[0].data.shift();
        this.chartX.update('none');

        this.chartV.data.datasets[0].data.push(data.v);
        this.chartV.data.datasets[0].data.shift();
        this.chartV.update('none');

        // Check for Resonance
        const fn = Math.sqrt(this.engine.k / this.engine.m);
        const status = Math.abs(this.engine.w - fn) < 1 ? "RESONANCE DETECTED" : "OPERATIONAL";
        document.getElementById('state-text').innerText = status;
        document.getElementById('state-text').style.color = status === "OPERATIONAL" ? "#3b82f6" : "#ef4444";

        this.renderer.render(this.scene, this.camera);
    }
}

window.onload = () => new Visualizer();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpurGear Pro | Engineering PDF Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #1e293b; margin: 0; overflow: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(0, 0, 0, 0.05); }
        input, select { background: #ffffff !important; border: 1px solid #cbd5e1 !important; color: #334155 !important; padding: 0.5rem; font-size: 0.75rem; border-radius: 6px; width: 100%; }
        #splash-screen { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(8px); z-index: 100; display: flex; align-items: center; justify-content: center; }
        .option-card { background: white; padding: 2rem; border-radius: 12px; width: 320px; cursor: pointer; border: 2px solid transparent; transition: all 0.3s; }
        .option-card:hover { transform: translateY(-5px); border-color: #3b82f6; }
        #pdf-template { position: absolute; left: -9999px; width: 800px; padding: 40px; background: white; color: black; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="max-w-5xl w-full px-8 text-center">
            <h2 class="text-white text-3xl font-bold mb-10">Select Design Path</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="option-card text-left" onclick="launchEngine('single')">
                    <h3 class="font-bold text-slate-800">Single Stage</h3>
                    <p class="text-xs text-slate-500 mt-2">Standard 2-gear drive (IS:2535).</p>
                </div>
                <div class="option-card text-left" onclick="launchEngine('double')">
                    <h3 class="font-bold text-slate-800">Double Stage</h3>
                    <p class="text-xs text-slate-500 mt-2">Extended multi-shaft system.</p>
                </div>
                <div class="option-card text-left" onclick="launchEngine('compound')">
                    <h3 class="font-bold text-slate-800">Compound</h3>
                    <p class="text-xs text-slate-500 mt-2">Common shaft gear train.</p>
                </div>
            </div>
        </div>
    </div>

    <div id="main-engine" class="h-screen flex flex-col hidden">
        <header class="h-12 glass flex items-center justify-between px-8 border-b border-black/5 z-20">
            <div class="flex items-center gap-4">
                <button onclick="location.reload()" class="text-[10px] bg-slate-100 px-2 py-1 rounded">← MENU</button>
                <h1 class="text-xs font-bold tracking-widest uppercase text-slate-800">SpurGear <span id="mode-label" class="text-blue-600">--</span></h1>
            </div>
            <button onclick="generatePDF()" class="bg-blue-600 text-white text-[10px] px-4 py-1.5 rounded-full font-bold hover:bg-blue-700 transition">
                SAVE PDF REPORT
            </button>
        </header>

        <div class="flex-1 flex overflow-hidden">
            <aside class="w-72 glass border-r border-black/5 p-6 space-y-5 overflow-y-auto z-10">
                
                <section>
                    <label class="text-[9px] text-slate-500 uppercase font-bold">Tooth System (Table 12.5)</label>
                    <select id="tooth-system" onchange="updateDesign()">
                        <option value="fourteen">14.5° Involute</option>
                        <option value="twenty" selected>20° Full Depth</option>
                        <option value="stub">20° Stub Teeth</option>
                    </select>
                </section>

                <section>
                    <label class="text-[9px] text-slate-500 uppercase font-bold">Module (m) - Table 12.2</label>
                    <select id="module-sel" onchange="updateDesign()">
                        <optgroup label="Choice 1 (Preferred)">
                            <option value="1">1.0</option><option value="1.25">1.25</option>
                            <option value="1.5">1.5</option><option value="2">2.0</option>
                            <option value="3" selected>3.0</option><option value="4">4.0</option>
                            <option value="5">5.0</option><option value="8">8.0</option>
                        </optgroup>
                    </select>
                </section>

                <section class="grid grid-cols-2 gap-2">
                    <div><label class="text-[9px] text-slate-500 uppercase font-bold">Power (kW)</label><input type="number" id="in-p" value="15" oninput="updateDesign()"></div>
                    <div><label class="text-[9px] text-slate-500 uppercase font-bold">RPM (n1)</label><input type="number" id="in-n" value="1440" oninput="updateDesign()"></div>
                </section>

                <section class="grid grid-cols-2 gap-2">
                    <div><label class="text-[9px] text-slate-500 uppercase font-bold">Z1 (Pinion)</label><input type="number" id="z1" value="18" oninput="updateDesign()"></div>
                    <div><label class="text-[9px] text-slate-500 uppercase font-bold">Z2 (Gear)</label><input type="number" id="z2" value="54" oninput="updateDesign()"></div>
                </section>
            </aside>

            <main class="flex-1 relative bg-[#f8fafc]">
                <div id="render-area" class="w-full h-full"></div>
            </main>

            <aside id="data-panel" class="w-80 glass border-l border-black/5 p-6 overflow-y-auto z-10">
                <h2 class="text-xs font-bold text-slate-600 mb-6 uppercase tracking-widest">Engineering Summary</h2>
                <div id="step-output" class="text-[11px] mono space-y-4"></div>
            </aside>
        </div>
    </div>

    <div id="pdf-template">
        <h1 style="font-size: 20px; border-bottom: 2px solid #000;">Design Report (IS:2535)</h1>
        <div id="pdf-content" style="margin-top: 20px; line-height: 1.6;"></div>
    </div>

    <script>
        // Data from Table 12.5 (image_8480b8.jpg)
        const lewisTable = {
            fourteen: { 12:0.067, 13:0.071, 14:0.075, 15:0.078, 16:0.081, 17:0.084, 18:0.086, 19:0.088, 20:0.090, 21:0.092, 22:0.093, 24:0.095, 26:0.098, 28:0.100, 30:0.101, 34:0.104, 38:0.106, 43:0.108, 50:0.110, 60:0.113, 100:0.117, 150:0.119, 300:0.122, rack:0.124 },
            twenty: { 12:0.078, 13:0.083, 14:0.088, 15:0.092, 16:0.094, 17:0.096, 18:0.098, 19:0.100, 20:0.102, 21:0.104, 22:0.105, 24:0.107, 26:0.110, 28:0.112, 30:0.114, 34:0.118, 38:0.122, 43:0.126, 50:0.130, 60:0.134, 100:0.142, 150:0.146, 300:0.150, rack:0.154 },
            stub: { 12:0.099, 13:0.103, 14:0.108, 15:0.111, 16:0.115, 17:0.117, 18:0.120, 19:0.123, 20:0.125, 21:0.127, 22:0.129, 24:0.132, 26:0.135, 28:0.137, 30:0.139, 34:0.142, 38:0.145, 43:0.147, 50:0.151, 60:0.154, 100:0.161, 150:0.165, 300:0.170, rack:0.175 }
        };

        function getLewisY(z, type) {
            const row = lewisTable[type];
            if (row[z]) return row[z];
            // Simple linear interpolation for missing intermediate values
            const keys = Object.keys(row).filter(k => k !== 'rack').map(Number).sort((a,b) => a-b);
            for(let i=0; i<keys.length-1; i++) {
                if(z > keys[i] && z < keys[i+1]) {
                    const t = (z - keys[i]) / (keys[i+1] - keys[i]);
                    return row[keys[i]] + t * (row[keys[i+1]] - row[keys[i]]);
                }
            }
            return z > 300 ? row['rack'] : row[12];
        }

        let scene, camera, renderer, controls, gearGroup;
        let currentMode = 'single';

        function launchEngine(mode) {
            currentMode = mode;
            document.getElementById('splash-screen').style.display = 'none';
            document.getElementById('main-engine').classList.remove('hidden');
            document.getElementById('mode-label').innerText = mode.toUpperCase();
            init();
            updateDesign();
        }

        function init() {
            const area = document.getElementById('render-area');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf8fafc);
            camera = new THREE.PerspectiveCamera(40, area.clientWidth / area.clientHeight, 1, 1000);
            camera.position.set(100, 100, 100);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(area.clientWidth, area.clientHeight);
            area.appendChild(renderer.domElement);
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            gearGroup = new THREE.Group();
            scene.add(gearGroup);
            animate();
        }

        function updateDesign() {
            if(!gearGroup) return;
            while(gearGroup.children.length > 0) gearGroup.remove(gearGroup.children[0]);
            
            const z1 = parseInt(document.getElementById('z1').value) || 12;
            const z2 = parseInt(document.getElementById('z2').value) || 12;
            const m = parseFloat(document.getElementById('module-sel').value);
            const p = parseFloat(document.getElementById('in-p').value);
            const n = parseFloat(document.getElementById('in-n').value);
            const toothType = document.getElementById('tooth-system').value;

            const d1 = z1 * m;
            const v = (Math.PI * d1 * n) / (60000);
            const ft = (v > 0) ? (1000 * p) / v : 0;
            
            let cv = (v < 10) ? 3/(3+v) : (v < 20) ? 6/(6+v) : 5.6/(5.6+Math.sqrt(v));
            const y = getLewisY(z1, toothType);
            const fEff = ft / cv;

            gearGroup.add(createGearMesh(z1, m, 0, 0x3b82f6));
            gearGroup.add(createGearMesh(z2, m, (d1 + (z2*m))/2, 0x94a3b8));

            document.getElementById('step-output').innerHTML = `
                <div class="p-3 bg-blue-50 border border-blue-200 rounded">
                    <b class="text-blue-700 uppercase text-[9px]">Calculated Ft</b><br>
                    v = ${v.toFixed(2)} m/s<br>
                    Ft = <b>${ft.toFixed(2)} N</b>
                </div>
                <div class="p-3 bg-indigo-50 border border-indigo-200 rounded">
                    <b class="text-indigo-700 uppercase text-[9px]">Table 12.5 Lewis Factor</b><br>
                    For Z = ${z1} (${toothType}):<br>
                    y = <b>${y.toFixed(4)}</b>
                </div>
                <div class="p-3 bg-amber-50 border border-amber-200 rounded">
                    <b class="text-amber-700 uppercase text-[9px]">Design Load</b><br>
                    Cv = ${cv.toFixed(3)}<br>
                    Feff = <b>${fEff.toFixed(2)} N</b>
                </div>
            `;
        }

        function createGearMesh(z, m, x, color) {
            const r = (z * m) / 2;
            const geo = new THREE.CylinderGeometry(r, r, 10, 32);
            const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color }));
            mesh.position.x = x;
            mesh.rotation.x = Math.PI / 2;
            return mesh;
        }

        async function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            document.getElementById('pdf-content').innerHTML = document.getElementById('step-output').innerHTML;
            const canvas = await html2canvas(document.getElementById('pdf-template'));
            doc.addImage(canvas.toDataURL('image/png'), 'PNG', 15, 15, 180, 0);
            doc.save('Gear_Report_Table12.5.pdf');
        }

        function animate() {
            requestAnimationFrame(animate);
            if(controls) controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>

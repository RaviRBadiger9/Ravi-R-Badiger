<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpurGear Pro | Engineering PDF Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #1e293b; margin: 0; overflow: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(0, 0, 0, 0.05); }
        input, select { background: #ffffff !important; border: 1px solid #cbd5e1 !important; color: #334155 !important; padding: 0.5rem; font-size: 0.75rem; border-radius: 6px; width: 100%; }
        #splash-screen { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(8px); z-index: 100; display: flex; align-items: center; justify-content: center; }
        #pdf-template { position: absolute; left: -9999px; width: 800px; padding: 40px; background: white; color: black; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="max-w-xl text-center">
            <h2 class="text-white text-3xl font-bold mb-10">SpurGear Pro 2026</h2>
            <button onclick="launchEngine()" class="bg-blue-600 text-white px-8 py-3 rounded-lg font-bold hover:bg-blue-700 transition">Initialize Designer</button>
        </div>
    </div>

    <div id="main-engine" class="h-screen flex flex-col hidden">
        <header class="h-12 glass flex items-center justify-between px-8 border-b border-black/5 z-20">
            <h1 class="text-xs font-bold tracking-widest uppercase text-slate-800">SpurGear <span class="text-blue-600">Pro</span></h1>
            <button onclick="generatePDF()" class="bg-blue-600 text-white text-[10px] px-4 py-1.5 rounded-full font-bold">SAVE PDF REPORT</button>
        </header>

        <div class="flex-1 flex overflow-hidden">
            <aside class="w-72 glass border-r border-black/5 p-6 space-y-4 overflow-y-auto z-10">
                
                <section>
                    <label class="text-[9px] text-slate-500 uppercase font-bold">Gear Quality (Velocity Factor Cv)</label>
                    <select id="cv-type" onchange="updateDesign()">
                        <option value="rough">Commercial Cut (v < 10m/s)</option>
                        <option value="medium" selected>Generated Teeth (v < 20m/s)</option>
                        <option value="high">Precision Ground (v > 20m/s)</option>
                    </select>
                </section>

                <section>
                    <label class="text-[9px] text-slate-500 uppercase font-bold">Module (m) [Table 12.2]</label>
                    <select id="module-sel" onchange="updateDesign()">
                        <option value="1.5">1.5 mm</option>
                        <option value="2">2.0 mm</option>
                        <option value="2.5">2.5 mm</option>
                        <option value="3" selected>3.0 mm</option>
                        <option value="4">4.0 mm</option>
                        <option value="5">5.0 mm</option>
                    </select>
                </section>

                <section class="grid grid-cols-2 gap-2">
                    <div><label class="text-[9px] text-slate-500 uppercase font-bold">Power (kW)</label><input type="number" id="in-p" value="15" oninput="updateDesign()"></div>
                    <div><label class="text-[9px] text-slate-500 uppercase font-bold">Input RPM</label><input type="number" id="in-n" value="1440" oninput="updateDesign()"></div>
                </section>

                <section class="grid grid-cols-2 gap-2">
                    <div><label class="text-[9px] text-slate-500 uppercase font-bold">Z1 (Pinion)</label><input type="number" id="z1" value="20" oninput="updateDesign()"></div>
                    <div><label class="text-[9px] text-slate-500 uppercase font-bold">Z2 (Gear)</label><input type="number" id="z2" value="60" oninput="updateDesign()"></div>
                </section>
            </aside>

            <main class="flex-1 relative bg-[#f8fafc]">
                <div id="render-area" class="w-full h-full"></div>
            </main>

            <aside id="data-panel" class="w-80 glass border-l border-black/5 p-6 overflow-y-auto z-10">
                <h2 class="text-xs font-bold text-slate-600 mb-6 uppercase tracking-widest">Calculated Results</h2>
                <div id="step-output" class="text-[11px] mono space-y-4"></div>
            </aside>
        </div>
    </div>

    <div id="pdf-template">
        <h1 style="font-size: 20px; border-bottom: 2px solid #000;">Engineering Design Report (IS:2535)</h1>
        <div id="pdf-content" style="margin-top: 20px; line-height: 1.6;"></div>
    </div>

    <script>
        let scene, camera, renderer, gearGroup;

        function launchEngine() {
            document.getElementById('splash-screen').style.display = 'none';
            document.getElementById('main-engine').classList.remove('hidden');
            init();
            updateDesign();
        }

        function init() {
            const area = document.getElementById('render-area');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf8fafc);
            camera = new THREE.PerspectiveCamera(40, area.clientWidth / area.clientHeight, 1, 1000);
            camera.position.set(100, 100, 100);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(area.clientWidth, area.clientHeight);
            area.appendChild(renderer.domElement);
            new THREE.OrbitControls(camera, renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            gearGroup = new THREE.Group();
            scene.add(gearGroup);
            animate();
        }

        function updateDesign() {
            if(!gearGroup) return;
            while(gearGroup.children.length > 0) gearGroup.remove(gearGroup.children[0]);
            
            const z1 = parseFloat(document.getElementById('z1').value) || 1;
            const z2 = parseFloat(document.getElementById('z2').value) || 1;
            const m = parseFloat(document.getElementById('module-sel').value);
            const p = parseFloat(document.getElementById('in-p').value);
            const n = parseFloat(document.getElementById('in-n').value);
            const cvType = document.getElementById('cv-type').value;

            // 1. Geometric PCD
            const d1 = z1 * m;
            const d2 = z2 * m;
            const v = (Math.PI * d1 * n) / (60 * 1000); // Velocity m/s

            // 2. Tangential Force Ft (From handwritten notes)
            const ft = (v > 0) ? (1000 * p) / v : 0; 

            // 3. Velocity Factor Cv
            let cv = 0;
            let cvFormula = "";
            if(cvType === "rough") {
                cv = 3 / (3 + v);
                cvFormula = "3 / (3 + v)";
            } else if(cvType === "medium") {
                cv = 6 / (6 + v);
                cvFormula = "6 / (6 + v)";
            } else {
                cv = 5.6 / (5.6 + Math.sqrt(v));
                cvFormula = "5.6 / (5.6 + √v)";
            }

            // 4. Effective Load
            const fEff = ft / cv;

            // Update Visuals
            gearGroup.add(createMesh(z1, m, 0, 0x3b82f6));
            gearGroup.add(createMesh(z2, m, (d1+d2)/2, 0x94a3b8));

            document.getElementById('step-output').innerHTML = `
                <div class="space-y-3">
                    <div class="p-3 bg-slate-50 border rounded">
                        <b class="text-blue-600">1. VELOCITY (v)</b><br>
                        v = (π × d1 × n) / 60000<br>
                        Result: <b>${v.toFixed(2)} m/s</b>
                    </div>
                    <div class="p-3 bg-slate-50 border rounded">
                        <b class="text-blue-600">2. TANGENTIAL FORCE (Ft)</b><br>
                        Ft = (1000 × P) / v<br>
                        Result: <b>${ft.toFixed(2)} N</b>
                    </div>
                    <div class="p-3 bg-blue-50 border border-blue-200 rounded">
                        <b class="text-blue-700">3. VELOCITY FACTOR (Cv)</b><br>
                        Formula: ${cvFormula}<br>
                        Result: <b>${cv.toFixed(4)}</b>
                    </div>
                    <div class="p-3 bg-amber-50 border border-amber-200 rounded">
                        <b class="text-amber-700">4. EFFECTIVE LOAD (Feff)</b><br>
                        Feff = Ft / Cv<br>
                        Result: <b>${fEff.toFixed(2)} N</b>
                    </div>
                </div>
            `;
        }

        function createMesh(z, m, x, color) {
            const r = (z * m) / 2;
            const geo = new THREE.CylinderGeometry(r, r, 8, 32);
            const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color }));
            mesh.position.x = x;
            mesh.rotation.x = Math.PI/2;
            return mesh;
        }

        async function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            document.getElementById('pdf-content').innerHTML = document.getElementById('step-output').innerHTML;
            const canvas = await html2canvas(document.getElementById('pdf-template'));
            doc.addImage(canvas.toDataURL('image/png'), 'PNG', 15, 15, 180, 0);
            doc.save('Gear_Velocity_Report.pdf');
        }

        function animate() {
            requestAnimationFrame(animate);
            if(renderer) renderer.render(scene, camera);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VibeSim | Auto-Studio Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --studio-bg: #111;
            --panel-bg: rgba(26, 28, 33, 0.9);
            --border: #2d3139;
            --accent: #f59e0b;
            --text-dim: #94a3b8;
            --text-main: #f1f5f9;
        }

        body { 
            background: var(--studio-bg); 
            color: var(--text-main); 
            font-family: 'SF Pro Display', system-ui, sans-serif; 
            margin: 0; 
            display: grid; 
            grid-template-columns: 340px 1fr; 
            height: 100vh; 
            overflow: hidden;
        }

        /* Sidebar UI */
        #ui-deck {
            background: var(--panel-bg);
            border-right: 1px solid var(--border);
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            z-index: 10;
        }

        .header h1 { font-size: 1.1rem; text-transform: uppercase; letter-spacing: 3px; color: var(--accent); }
        .header p { font-size: 0.7rem; color: var(--text-dim); margin-top: 5px; }

        .param-group { margin-bottom: 20px; }
        .label-row { display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 10px; color: var(--text-dim); }
        .value-pill { color: var(--text-main); font-family: monospace; font-weight: bold; padding: 2px 8px; background: #000; border-radius: 4px; }

        input[type="range"] {
            width: 100%; -webkit-appearance: none; background: #222; height: 3px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 16px; width: 16px; background: var(--accent); border-radius: 50%; cursor: pointer; border: 2px solid white; box-shadow: 0 0 10px rgba(245, 158, 11, 0.5);
        }

        /* Viewport */
        #studio-viewport { position: relative; display: grid; grid-template-rows: 1fr 280px; }
        #canvas-holder { background: radial-gradient(circle at center, #222 0%, #111 100%); cursor: grab; }
        
        #analytics-bar { 
            background: #090909; 
            border-top: 1px solid var(--border); 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            padding: 20px; 
            gap: 20px;
        }

        /* Alerts */
        .status-badge {
            margin-top: auto;
            padding: 15px;
            background: rgba(0,0,0,0.5);
            border-radius: 8px;
            font-size: 0.75rem;
            border-left: 3px solid var(--accent);
        }
        .resonance-mode { border-left-color: #ef4444 !important; background: rgba(239, 68, 68, 0.05) !important; animation: flicker 1s infinite alternate; }
        @keyframes flicker { from { opacity: 1; } to { opacity: 0.8; } }
    </style>
</head>
<body>

<aside id="ui-deck">
    <div class="header">
        <h1>Auto-Studio v6.1</h1>
        <p>Dynamic Suspension Analysis</p>
    </div>
    
    <div class="param-group">
        <div class="label-row"><span>VEHICLE MASS [m]</span> <span class="value-pill" id="out-m">2.0 kg</span></div>
        <input type="range" id="m" min="0.5" max="10" step="0.1" value="2.0">
    </div>

    <div class="param-group">
        <div class="label-row"><span>SUSPENSION STIFFNESS [k]</span> <span class="value-pill" id="out-k">200 N/m</span></div>
        <input type="range" id="k" min="50" max="1000" step="10" value="200">
    </div>

    <div class="param-group">
        <div class="label-row"><span>DAMPING [c]</span> <span class="value-pill" id="out-c">1.0 Ns/m</span></div>
        <input type="range" id="c" min="0" max="10" step="0.1" value="1.0">
    </div>

    <div class="param-group">
        <div class="label-row"><span>FORCE FREQUENCY [ω]</span> <span class="value-pill" id="out-w">5.0 rad/s</span></div>
        <input type="range" id="w" min="0" max="30" step="0.5" value="5.0">
    </div>

    <div class="status-badge" id="state-panel">
        <div style="color: var(--text-dim)">System Integrity:</div>
        <div id="state-text" style="font-weight: bold; margin-top: 5px;">NOMINAL OPERATION</div>
        <div style="font-size: 0.65rem; color: #666; margin-top: 3px;">RK4 SOLVER_STABLE</div>
    </div>
</aside>

<main id="studio-viewport">
    <div id="canvas-holder"></div>
    <div id="analytics-bar">
        <canvas id="trace-chart"></canvas>
        <canvas id="vel-chart"></canvas>
    </div>
</main>

<script>
/**
 * PRECISION PHYSICS CORE
 */
class CorePhysics {
    constructor() {
        this.m = 2; this.k = 200; this.c = 1; this.w = 5; this.f0 = 25;
        this.x = 0; this.v = 0; this.t = 0;
    }

    step(dt) {
        // High-precision RK4 algorithm
        const a = (x, v, t) => (this.f0 * Math.sin(this.w * t) - this.c * v - this.k * x) / this.m;
        const k1v = a(this.x, this.v, this.t); const k1x = this.v;
        const k2v = a(this.x + 0.5*dt*k1x, this.v + 0.5*dt*k1v, this.t + 0.5*dt); const k2x = this.v + 0.5*dt*k1v;
        const k3v = a(this.x + 0.5*dt*k2x, this.v + 0.5*dt*k2v, this.t + 0.5*dt); const k3x = this.v + 0.5*dt*k2v;
        const k4v = a(this.x + dt*k3x, this.v + dt*k3v, this.t + dt); const k4x = this.v + dt*k3v;
        this.v += (dt/6) * (k1v + 2*k2v + 2*k3v + k4v);
        this.x += (dt/6) * (k1x + 2*k2x + 2*k3x + k4x);
        this.t += dt;
        return { x: this.x, v: this.v };
    }
}

/**
 * 3D SCENE & ASSET GENERATION
 */
class StudioView {
    constructor() {
        this.engine = new CorePhysics();
        this.initThree();
        this.initCharts();
        this.setupListeners();
        this.loop();
    }

    initThree() {
        const container = document.getElementById('canvas-holder');
        this.scene = new THREE.Scene();
        this.camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 1000);
        this.renderer = new THREE.WebGLRenderer({ antialias: true });
        this.renderer.setSize(container.clientWidth, container.clientHeight);
        this.renderer.setClearColor(0x111111);
        this.renderer.shadowMap.enabled = true;
        this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(this.renderer.domElement);

        // Diffused Studio Lighting
        this.scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const overhead = new THREE.DirectionalLight(0xffffff, 1.2);
        overhead.position.set(5, 10, 5); overhead.castShadow = true;
        overhead.shadow.mapSize.width = 1024; overhead.shadow.mapSize.height = 1024;
        this.scene.add(overhead);

        // PBR Laboratory Floor
        const floor = new THREE.Mesh(
            new THREE.CircleGeometry(10, 64),
            new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.1, metalness: 0.9 })
        );
        floor.rotation.x = -Math.PI / 2; floor.receiveShadow = true;
        this.scene.add(floor);

        // Setup Physical Objects
        this.createCarMesh();
        this.createCoilSpring();

        this.camera.position.set(6, 4, 9);
        this.camera.lookAt(0, 1.5, 0);
    }

    createCarMesh() {
        this.carGroup = new THREE.Group();
        
        // Materials
        const bodyMat = new THREE.MeshPhysicalMaterial({ color: 0xf59e0b, metalness: 0.9, roughness: 0.2, emissive: 0x221100 });
        const wheelMat = new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.9 });
        const glassMat = new THREE.MeshPhysicalMaterial({ color: 0x888888, metalness: 0.9, roughness: 0.1, transparent: true, opacity: 0.5 });

        // Build Car
        // Chassis (Base)
        const chassis = new THREE.Mesh(new THREE.BoxGeometry(3, 0.5, 1.5), bodyMat);
        chassis.castShadow = true; this.carGroup.add(chassis);

        // Roof (Cabin)
        const roof = new THREE.Mesh(new THREE.SphereGeometry(0.8, 16, 16, 0, Math.PI*2, 0, Math.PI/2), glassMat);
        roof.position.y = 0.4; roof.rotation.y = Math.PI/2; this.carGroup.add(roof);

        // Wheels
        const wheelGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.3, 24); wheelGeo.rotateZ(Math.PI/2);
        const wheels = [
            {p:[1.1,-0.3,0.8]}, {p:[1.1,-0.3,-0.8]},
            {p:[-1.1,-0.3,0.8]}, {p:[-1.1,-0.3,-0.8]}
        ];
        wheels.forEach(w => {
            const mesh = new THREE.Mesh(wheelGeo, wheelMat);
            mesh.position.set(w.p[0], w.p[1], w.p[2]);
            this.carGroup.add(mesh);
        });

        this.scene.add(this.carGroup);
    }

    createCoilSpring() {
        this.springPoints = 120;
        const points = [];
        for(let i=0; i<=this.springPoints; i++) points.push(new THREE.Vector3(0,i/10,0));
        this.springGeo = new THREE.BufferGeometry().setFromPoints(points);
        this.springMesh = new THREE.Line(this.springGeo, new THREE.LineBasicMaterial({ color: 0xcccccc, transparent:true, opacity:0.6 }));
        this.scene.add(this.springMesh);
    }

    updateSpringGeometry(height) {
        const pts = []; const turns = 12, radius = 0.35;
        for (let i = 0; i <= this.springPoints; i++) {
            const t = i / this.springPoints;
            const angle = t * Math.PI * 2 * turns;
            pts.push(new THREE.Vector3(Math.cos(angle) * radius, t * height, Math.sin(angle) * radius));
        }
        this.springMesh.geometry.setFromPoints(pts);
    }

    initCharts() {
        Chart.defaults.color = '#555';
        const cfg = (label, color) => ({
            type: 'line',
            data: { labels: Array(100).fill(''), datasets: [{ data: Array(100).fill(0), borderColor: color, borderWidth: 1.5, pointRadius: 0, fill: false, tension: 0.2 }] },
            options: { responsive: true, maintainAspectRatio: false, animation: false, scales: { x: { display: false }, y: { grid: { color: '#1a1a1a' } } }, plugins: { legend: { display: false } } }
        });

        this.chartX = new Chart(document.getElementById('trace-chart'), cfg('Displacement [x]', '#f59e0b'));
        this.chartV = new Chart(document.getElementById('vel-chart'), cfg('Velocity [v]', '#94a3b8'));
    }

    setupListeners() {
        ['m', 'k', 'c', 'w'].forEach(id => {
            document.getElementById(id).addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                this.engine[id] = val;
                const units = {m:'kg', k:'N/m', c:'Ns/m', w:'rad/s'};
                document.getElementById(`out-${id}`).innerText = `${val.toFixed(1)} ${units[id]}`;
            });
        });
    }

    loop() {
        requestAnimationFrame(() => this.loop());
        
        const data = this.engine.step(0.016);
        const yOffsetCar = 2.4;

        // Visual Synchronization
        this.carGroup.position.y = yOffsetCar + data.x;
        this.updateSpringGeometry(yOffsetCar + data.x);

        // Chart Synchronization
        this.chartX.data.datasets[0].data.push(data.x); this.chartX.data.datasets[0].data.shift(); this.chartX.update('none');
        this.chartV.data.datasets[0].data.push(data.v); this.chartV.data.datasets[0].data.shift(); this.chartV.update('none');

        // Check for Resonance
        const fn = Math.sqrt(this.engine.k / this.engine.m);
        const statePanel = document.getElementById('state-panel');
        const stateText = document.getElementById('state-text');
        
        if (Math.abs(this.engine.w - fn) < 1.0) {
            stateText.innerText = "WARNING: RESONANCE CASCADE";
            stateText.style.color = "#ef4444";
            statePanel.classList.add('resonance-mode');
        } else {
            stateText.innerText = "NOMINAL OPERATION";
            stateText.style.color = "#00e0b0";
            statePanel.classList.remove('resonance-mode');
        }

        this.renderer.render(this.scene, this.camera);
    }
}

window.onload = () => new StudioView();
</script>
</body>
</html>

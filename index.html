<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpurGear Pro | Engineering PDF Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #1e293b; margin: 0; overflow: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(0, 0, 0, 0.05); }
        input, select { background: #ffffff !important; border: 1px solid #cbd5e1 !important; color: #334155 !important; padding: 0.5rem; font-size: 0.75rem; border-radius: 6px; width: 100%; }
        #splash-screen { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(8px); z-index: 100; display: flex; align-items: center; justify-content: center; }
        .option-card { background: white; padding: 2rem; border-radius: 12px; width: 320px; cursor: pointer; border: 2px solid transparent; transition: all 0.3s; }
        .option-card:hover { transform: translateY(-5px); border-color: #3b82f6; }
        #pdf-template { position: absolute; left: -9999px; width: 800px; padding: 40px; background: white; color: black; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="max-w-5xl w-full px-8 text-center">
            <h2 class="text-white text-3xl font-bold mb-10">Select Design Path</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="option-card text-left" onclick="launchEngine('single')">
                    <h3 class="font-bold text-slate-800">Single Stage</h3>
                    <p class="text-xs text-slate-500 mt-2">Standard 2-gear drive [Table 12.2].</p>
                </div>
                <div class="option-card text-left" onclick="launchEngine('double')">
                    <h3 class="font-bold text-slate-800">Double Stage</h3>
                    <p class="text-xs text-slate-500 mt-2">Extended multi-shaft system.</p>
                </div>
                <div class="option-card text-left" onclick="launchEngine('compound')">
                    <h3 class="font-bold text-slate-800">Compound</h3>
                    <p class="text-xs text-slate-500 mt-2">Common shaft gear train.</p>
                </div>
            </div>
        </div>
    </div>

    <div id="main-engine" class="h-screen flex flex-col hidden">
        <header class="h-12 glass flex items-center justify-between px-8 border-b border-black/5 z-20">
            <div class="flex items-center gap-4">
                <button onclick="location.reload()" class="text-[10px] bg-slate-100 px-2 py-1 rounded">← MENU</button>
                <h1 class="text-xs font-bold tracking-widest uppercase text-slate-800">SpurGear <span id="mode-label" class="text-blue-600">--</span></h1>
            </div>
            <button onclick="generatePDF()" class="bg-blue-600 text-white text-[10px] px-4 py-1.5 rounded-full font-bold hover:bg-blue-700 transition">
                PRINT CALCULATION (PDF)
            </button>
        </header>

        <div class="flex-1 flex overflow-hidden">
            <aside class="w-72 glass border-r border-black/5 p-6 space-y-5 overflow-y-auto z-10">
                
                <section>
                    <label class="text-[9px] text-slate-500 uppercase font-bold">Calculation Type</label>
                    <select id="calc-type" onchange="updateDesign()">
                        <option value="geometric">Geometric Dimensions</option>
                        <option value="force">Force Analysis (Handwritten Note)</option>
                    </select>
                </section>

                <section>
                    <label class="text-[9px] text-slate-500 uppercase font-bold">Module (m) - Table 12.2</label>
                    <select id="module-sel" onchange="updateDesign()">
                        <optgroup label="Choice 1 (Preferred)">
                            <option value="1">1.0</option><option value="1.25">1.25</option>
                            <option value="1.5">1.5</option><option value="2">2.0</option>
                            <option value="2.5">2.5</option><option value="3" selected>3.0</option>
                            <option value="4">4.0</option><option value="5">5.0</option>
                            <option value="6">6.0</option><option value="8">8.0</option>
                        </optgroup>
                        <optgroup label="Choice 2">
                            <option value="1.125">1.125</option><option value="1.75">1.75</option>
                            <option value="2.25">2.25</option><option value="2.75">2.75</option>
                        </optgroup>
                    </select>
                </section>

                <section class="grid grid-cols-2 gap-2">
                    <div><label class="text-[9px] text-slate-500 uppercase">Power (kW)</label><input type="number" id="in-p" value="10" oninput="updateDesign()"></div>
                    <div><label class="text-[9px] text-slate-500 uppercase">Input RPM</label><input type="number" id="in-n" value="1440" oninput="updateDesign()"></div>
                </section>
                <section>
                    <label class="text-[9px] text-slate-500 uppercase font-bold">Teeth Count</label>
                    <div class="grid grid-cols-2 gap-2 mt-1">
                        <div><label class="text-[8px] text-slate-400">Pinion (Z1)</label><input type="number" id="z1" value="18" oninput="updateDesign()"></div>
                        <div><label class="text-[8px] text-slate-400">Gear (Z2)</label><input type="number" id="z2" value="54" oninput="updateDesign()"></div>
                    </div>
                </section>
            </aside>

            <main class="flex-1 relative bg-[#f8fafc]">
                <div id="render-area" class="w-full h-full"></div>
            </main>

            <aside id="data-panel" class="w-80 glass border-l border-black/5 p-6 overflow-y-auto z-10">
                <h2 class="text-xs font-bold text-slate-600 mb-6 uppercase">Calculation Results</h2>
                <div id="step-output" class="text-[11px] mono space-y-4"></div>
            </aside>
        </div>
    </div>

    <div id="pdf-template">
        <h1 style="font-size: 22px; border-bottom: 2px solid #333;">Engineering Design Report (IS:2535)</h1>
        <div id="pdf-content" style="margin-top: 20px; font-family: monospace; font-size: 13px; line-height: 1.6;"></div>
    </div>

    <script>
        let scene, camera, renderer, controls, gearGroup;
        let currentMode = 'single';

        function launchEngine(mode) {
            currentMode = mode;
            document.getElementById('splash-screen').style.display = 'none';
            document.getElementById('main-engine').classList.remove('hidden');
            document.getElementById('mode-label').innerText = mode.toUpperCase();
            init();
            updateDesign();
        }

        function init() {
            const area = document.getElementById('render-area');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf8fafc);
            camera = new THREE.PerspectiveCamera(40, area.clientWidth / area.clientHeight, 1, 1000);
            camera.position.set(120, 100, 120);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(area.clientWidth, area.clientHeight);
            area.appendChild(renderer.domElement);
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            gearGroup = new THREE.Group();
            scene.add(gearGroup);
            animate();
        }

        function updateDesign() {
            if(!gearGroup) return;
            while(gearGroup.children.length > 0) gearGroup.remove(gearGroup.children[0]);
            
            const z1 = parseInt(document.getElementById('z1').value) || 1;
            const z2 = parseInt(document.getElementById('z2').value) || 1;
            const m = parseFloat(document.getElementById('module-sel').value);
            const p = parseFloat(document.getElementById('in-p').value);
            const n = parseFloat(document.getElementById('in-n').value);
            const type = document.getElementById('calc-type').value;

            // Calculations
            const d1 = z1 * m;
            const d2 = z2 * m;
            const cDist = (d1 + d2) / 2;
            const v = (Math.PI * d1 * n) / (60 * 1000); // Pitch Line Velocity (m/s)
            const ft = (v > 0) ? (1000 * p) / v : 0; // Tangential Force (N) from handwritten note

            // Visuals
            gearGroup.add(createGear(z1, m, 0, 0x3b82f6));
            gearGroup.add(createGear(z2, m, cDist, 0x94a3b8));

            let outputHtml = '';
            if(type === 'geometric') {
                outputHtml = `
                    <div class="p-3 bg-blue-50 border border-blue-100 rounded">
                        <b class="text-blue-700">Dimensions (Table 12.2)</b><br>
                        Module: ${m} mm<br>
                        PCD Pinion (d1): ${d1.toFixed(2)} mm<br>
                        PCD Gear (d2): ${d2.toFixed(2)} mm<br>
                        Center Distance: ${cDist.toFixed(2)} mm
                    </div>`;
            } else {
                outputHtml = `
                    <div class="p-3 bg-amber-50 border border-amber-100 rounded">
                        <b class="text-amber-700">Force Analysis</b><br>
                        Velocity (v): ${v.toFixed(2)} m/s<br>
                        <hr class="my-2 border-amber-200">
                        <b class="text-[10px]">Formula: Ft = (1000 * P) / v</b><br>
                        Tangential Force (Ft): <b>${ft.toFixed(2)} N</b>
                    </div>`;
            }

            document.getElementById('step-output').innerHTML = outputHtml + `
                <p class="text-[9px] text-slate-400 mt-4 italic">Standard: IS:2535-1969</p>
            `;
        }

        function createGear(z, m, x, color) {
            const pitchR = (z * m) / 2;
            const shape = new THREE.Shape();
            for(let i=0; i <= z*2; i++) {
                const a = (i/(z*2)) * Math.PI * 2;
                const r = i%2 === 0 ? pitchR + (m * 0.8) : pitchR - (m * 1.2);
                if (i === 0) shape.moveTo(Math.cos(a)*r, Math.sin(a)*r);
                else shape.lineTo(Math.cos(a)*r, Math.sin(a)*r);
            }
            const gearGeo = new THREE.ExtrudeGeometry(shape, { depth: 8, bevelEnabled: false });
            const gearMesh = new THREE.Mesh(gearGeo, new THREE.MeshStandardMaterial({ color }));
            gearMesh.position.x = x;
            gearMesh.rotation.x = Math.PI/2;
            return gearMesh;
        }

        async function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            document.getElementById('pdf-content').innerHTML = document.getElementById('step-output').innerHTML;
            const canvas = await html2canvas(document.getElementById('pdf-template'));
            doc.addImage(canvas.toDataURL('image/png'), 'PNG', 10, 10, 190, 0);
            doc.save('Gear_Design_Data.pdf');
        }

        function animate() {
            requestAnimationFrame(animate);
            if(controls) controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>

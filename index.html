<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpurGear Pro | Engineering PDF Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #1e293b; margin: 0; overflow: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(0, 0, 0, 0.05); }
        input, select { background: #ffffff !important; border: 1px solid #cbd5e1 !important; color: #334155 !important; padding: 0.4rem; font-size: 0.7rem; border-radius: 6px; width: 100%; }
        #splash-screen { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(8px); z-index: 100; display: flex; align-items: center; justify-content: center; }
        .option-card { background: white; padding: 2rem; border-radius: 12px; width: 320px; cursor: pointer; border: 2px solid transparent; transition: all 0.3s; }
        .option-card:hover { transform: translateY(-5px); border-color: #3b82f6; }
        #pdf-template { position: absolute; left: -9999px; width: 800px; padding: 40px; background: white; color: black; }
    </style></head><body>

    <div id="splash-screen">
        <div class="max-w-5xl w-full px-8 text-center">
            <h2 class="text-white text-3xl font-bold mb-10">Select Design Path</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="option-card text-left" onclick="launchEngine('single')">
                    <h3 class="font-bold text-slate-800">Single Stage</h3>
                    <p class="text-xs text-slate-500 mt-2">Standard 2-gear drive (IS:2535).</p>
                </div>
                <div class="option-card text-left" onclick="launchEngine('double')">
                    <h3 class="font-bold text-slate-800">Double Stage</h3>
                    <p class="text-xs text-slate-500 mt-2">Extended multi-shaft system.</p>
                </div>
                <div class="option-card text-left" onclick="launchEngine('compound')">
                    <h3 class="font-bold text-slate-800">Compound</h3>
                    <p class="text-xs text-slate-500 mt-2">Common shaft gear train.</p>
                </div>
            </div>
        </div>
    </div>

    <div id="main-engine" class="h-screen flex flex-col hidden">
        <header class="h-12 glass flex items-center justify-between px-8 border-b border-black/5 z-20">
            <div class="flex items-center gap-4">
                <button onclick="location.reload()" class="text-[10px] bg-slate-100 px-2 py-1 rounded">← MENU</button>
                <h1 class="text-xs font-bold tracking-widest uppercase text-slate-800">SpurGear <span id="mode-label" class="text-blue-600">--</span></h1>
            </div>
            <button onclick="generatePDF()" class="bg-blue-600 text-white text-[10px] px-4 py-1.5 rounded-full font-bold hover:bg-blue-700 transition">
                SAVE PDF REPORT
            </button>
        </header>

        <div class="flex-1 flex overflow-hidden">
            <aside class="w-80 glass border-r border-black/5 p-5 space-y-4 overflow-y-auto z-10">
                
                <section>
                    <label class="text-[9px] text-slate-500 uppercase font-bold">Gear Material (Table 12.7)</label>
                    <select id="material-stress" onchange="updateDesign()">
                        <option value="47.1">Cast Iron Grade 20</option>
                        <option value="56.4">Cast Iron Grade 25</option>
                        <option value="78.5">Cast Iron Grade 35</option>
                        <option value="138.3">Cast Steel 0.20%C (Untreated)</option>
                        <option value="193.2">Cast Steel 0.20%C (Heat Treated)</option>
                        <option value="138.3">Phosphor Gear Bronze</option>
                        <option value="172.6">Forged Steel 0.30%C (Untreated)</option>
                        <option value="220.0">Forged Steel 0.30%C (Heat Treated)</option>
                        <option value="207.0">Steel C40 (Untreated)</option>
                        <option value="233.4" selected>Steel C45 (Untreated)</option>
                        <option value="345.2">Alloy Steel (Case Hardened)</option>
                        <option value="41.2">Plastic (Bakelite/Celon)</option>
                    </select>
                </section>

                <section>
                    <label class="text-[9px] text-slate-500 uppercase font-bold">Material Combination (Table 12.12)</label>
                    <select id="mat-pair" onchange="updateDesign()">
                        <option value="CI_CI">Cast Iron & Cast Iron</option>
                        <option value="CI_ST">Cast Iron & Steel</option>
                        <option value="ST_ST" selected>Steel & Steel</option>
                    </select>
                </section>

                <section class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="text-[9px] text-slate-500 uppercase font-bold">Load Type (Table 12.8)</label>
                        <select id="load-type" onchange="updateDesign()">
                            <option value="steady">Steady</option>
                            <option value="light">Light Shocks</option>
                            <option value="medium" selected>Medium Shocks</option>
                            <option value="heavy">Heavy Shocks</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[9px] text-slate-500 uppercase font-bold">Service (Table 12.8)</label>
                        <select id="service-type" onchange="updateDesign()">
                            <option value="intermittent">Intermittent (3h/day)</option>
                            <option value="standard" selected>8 to 10 h/day</option>
                            <option value="continuous">Continuous (24h/day)</option>
                        </select>
                    </div>
                </section>

                <section class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="text-[9px] text-slate-500 uppercase font-bold">Tooth System</label>
                        <select id="tooth-system" onchange="updateDesign()">
                            <option value="14.5">14.5° Involute</option>
                            <option value="20" selected>20° Full Depth</option>
                            <option value="20stub">20° Stub Teeth</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[9px] text-slate-500 uppercase font-bold">Gear Error (mm)</label>
                        <select id="gear-error" onchange="updateDesign()">
                            <option value="0.01">0.01</option>
                            <option value="0.02">0.02</option>
                            <option value="0.03" selected>0.03</option>
                            <option value="0.04">0.04</option>
                            <option value="0.06">0.06</option>
                            <option value="0.08">0.08</option>
                            <option value="0.10">0.10</option>
                        </select>
                    </div>
                </section>

                <section>
                    <label class="text-[9px] text-slate-500 uppercase font-bold">Module (m)</label>
                    <select id="module-sel" onchange="updateDesign()">
                        <option value="1">1.0</option><option value="2">2.0</option>
                        <option value="3" selected>3.0</option><option value="4">4.0</option>
                        <option value="5">5.0</option>
                    </select>
                </section>

                <section class="grid grid-cols-2 gap-2">
                    <div><label class="text-[9px] text-slate-500 uppercase font-bold">Power (kW)</label><input type="number" id="in-p" value="15" oninput="updateDesign()"></div>
                    <div><label class="text-[9px] text-slate-500 uppercase font-bold">RPM (n1)</label><input type="number" id="in-n" value="1440" oninput="updateDesign()"></div>
                </section>

                <section class="grid grid-cols-2 gap-2">
                    <div><label class="text-[9px] text-slate-500 uppercase font-bold">Z1</label><input type="number" id="z1" value="18" oninput="updateDesign()"></div>
                    <div><label class="text-[9px] text-slate-500 uppercase font-bold">Z2</label><input type="number" id="z2" value="54" oninput="updateDesign()"></div>
                </section>
            </aside>

            <main class="flex-1 relative bg-[#f8fafc]">
                <div id="render-area" class="w-full h-full"></div>
            </main>

            <aside id="data-panel" class="w-80 glass border-l border-black/5 p-6 overflow-y-auto z-10">
                <h2 class="text-xs font-bold text-slate-600 mb-6 uppercase tracking-widest">Engineering Summary</h2>
                <div id="step-output" class="text-[11px] mono space-y-4"></div>
            </aside>
        </div>
    </div>

    <div id="pdf-template">
        <h1 style="font-size: 20px; border-bottom: 2px solid #000;">Design Report (IS:2535)</h1>
        <div id="pdf-content" style="margin-top: 20px; line-height: 1.6;"></div>
    </div>

    <script>
        let scene, camera, renderer, controls, gearGroup;
        
        const serviceFactorTable = {
            steady: { intermittent: 0.80, standard: 1.00, continuous: 1.25 },
            light: { intermittent: 1.00, standard: 1.25, continuous: 1.50 },
            medium: { intermittent: 1.25, standard: 1.50, continuous: 1.80 },
            heavy: { intermittent: 1.50, standard: 1.80, continuous: 2.00 }
        };

        const dynamicFactorC = {
            "14.5": {
                "CI_CI": { "0.01": 55.2, "0.02": 110.4, "0.03": 165.6, "0.04": 220.9, "0.06": 331.3, "0.08": 441.7, "0.10": 552.1 },
                "CI_ST": { "0.01": 75.8, "0.02": 151.6, "0.03": 227.4, "0.04": 303.2, "0.06": 454.8, "0.08": 606.4, "0.10": 758.1 },
                "ST_ST": { "0.01": 110.3, "0.02": 220.6, "0.03": 330.9, "0.04": 441.3, "0.06": 662.0, "0.08": 882.6, "0.10": 1103.2 }
            },
            "20": {
                "CI_CI": { "0.01": 57.3, "0.02": 114.5, "0.03": 171.8, "0.04": 229.1, "0.06": 343.6, "0.08": 458.2, "0.10": 572.7 },
                "CI_ST": { "0.01": 78.6, "0.02": 157.3, "0.03": 235.9, "0.04": 314.6, "0.06": 471.9, "0.08": 629.2, "0.10": 786.5 },
                "ST_ST": { "0.01": 114.4, "0.02": 228.9, "0.03": 343.3, "0.04": 457.8, "0.06": 686.7, "0.08": 915.6, "0.10": 1144.4 }
            },
            "20stub": {
                "CI_CI": { "0.01": 59.3, "0.02": 118.7, "0.03": 178.0, "0.04": 237.3, "0.06": 356.0, "0.08": 474.6, "0.10": 593.3 },
                "CI_ST": { "0.01": 81.4, "0.02": 162.8, "0.03": 244.2, "0.04": 325.6, "0.06": 488.4, "0.08": 651.2, "0.10": 814.0 },
                "ST_ST": { "0.01": 118.7, "0.02": 237.3, "0.03": 356.0, "0.04": 474.6, "0.06": 712.0, "0.08": 949.3, "0.10": 1186.6 }
            }
        };

        function launchEngine(mode) {
            document.getElementById('splash-screen').style.display = 'none';
            document.getElementById('main-engine').classList.remove('hidden');
            document.getElementById('mode-label').innerText = mode.toUpperCase();
            init();
            updateDesign();
        }

        function init() {
            const area = document.getElementById('render-area');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf8fafc);
            camera = new THREE.PerspectiveCamera(40, area.clientWidth / area.clientHeight, 1, 1000);
            camera.position.set(100, 100, 100);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(area.clientWidth, area.clientHeight);
            area.appendChild(renderer.domElement);
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            gearGroup = new THREE.Group();
            scene.add(gearGroup);
            animate();
        }

        function updateDesign() {
            if(!gearGroup) return;
            while(gearGroup.children.length > 0) gearGroup.remove(gearGroup.children[0]);
            
            const z1 = parseInt(document.getElementById('z1').value) || 1;
            const z2 = parseInt(document.getElementById('z2').value) || 1;
            const m = parseFloat(document.getElementById('module-sel').value);
            const p = parseFloat(document.getElementById('in-p').value);
            const n = parseFloat(document.getElementById('in-n').value);
            const toothType = document.getElementById('tooth-system').value;
            const errorVal = document.getElementById('gear-error').value;
            const matPair = document.getElementById('mat-pair').value;
            const sigmaD = parseFloat(document.getElementById('material-stress').value);
            
            const load = document.getElementById('load-type').value;
            const service = document.getElementById('service-type').value;
            const cs = serviceFactorTable[load][service];
            
            const factorC = dynamicFactorC[toothType][matPair][errorVal];

            const d1 = z1 * m;
            const v = (Math.PI * d1 * n) / (60000);
            const ft = (v > 0) ? (1000 * p) / v : 0;

            gearGroup.add(createGearMesh(z1, m, 0, 0x3b82f6));
            gearGroup.add(createGearMesh(z2, m, (d1 + (z2*m))/2, 0x94a3b8));

            document.getElementById('step-output').innerHTML = `
                <div class="p-3 bg-emerald-50 border border-emerald-200 rounded">
                    <b class="text-emerald-700 uppercase text-[9px]">0. Material & Service Factors</b><br>
                    Static Stress (σd): <b>${sigmaD.toFixed(2)} MN/m²</b><br>
                    Service Factor (Cs): <b>${cs.toFixed(2)}</b><br>
                    Dynamic Factor (C): <b>${factorC} N/mm</b>
                </div>
                <div class="p-3 bg-blue-50 border border-blue-200 rounded">
                    <b class="text-blue-700 uppercase text-[9px]">1. Velocity & Force</b><br>
                    v = ${v.toFixed(2)} m/s<br>
                    Ft = <b>${ft.toFixed(2)} N</b>
                </div>
                <div class="p-3 bg-amber-50 border border-amber-200 rounded">
                    <b class="text-amber-700 uppercase text-[9px]">2. Dynamic Load Data</b><br>
                    Gear Error: ${errorVal} mm<br>
                    C (Table 12.12): <b>${factorC}</b>
                </div>
            `;
        }

        function createGearMesh(z, m, x, color) {
            const r = (z * m) / 2;
            const geo = new THREE.CylinderGeometry(r, r, 10, 32);
            const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color }));
            mesh.position.x = x;
            mesh.rotation.x = Math.PI / 2;
            return mesh;
        }

        async function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            document.getElementById('pdf-content').innerHTML = document.getElementById('step-output').innerHTML;
            const canvas = await html2canvas(document.getElementById('pdf-template'));
            doc.addImage(canvas.toDataURL('image/png'), 'PNG', 15, 15, 180, 0);
            doc.save('Gear_Design_Report.pdf');
        }

        function animate() {
            requestAnimationFrame(animate);
            if(controls) controls.update();
            renderer.render(scene, camera);
        }
    </script></body></html>

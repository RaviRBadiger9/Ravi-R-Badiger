<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Off-Road Gear Engine | Professional Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #1e293b; margin: 0; overflow: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(0, 0, 0, 0.05); }
        input, select { background: #ffffff !important; border: 1px solid #cbd5e1 !important; color: #334155 !important; padding: 0.4rem; font-size: 0.75rem; border-radius: 6px; width: 100%; }
        #splash-screen { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(8px); z-index: 100; display: flex; align-items: center; justify-content: center; }
        .option-card { background: white; padding: 2rem; border-radius: 12px; width: 300px; cursor: pointer; border: 2px solid transparent; transition: all 0.3s; }
        .option-card:hover { transform: translateY(-5px); border-color: #3b82f6; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="max-w-md w-full px-8 text-center">
            <h2 class="text-white text-3xl font-bold mb-10">Off-Road Powertrain Lab</h2>
            <div class="option-card text-left" onclick="launchEngine('offroad')">
                <h3 class="font-bold text-slate-800">Start Simulation</h3>
                <p class="text-xs text-slate-500 mt-2">Includes shock loading and dynamic velocity factors.</p>
            </div>
        </div>
    </div>

    <div id="main-engine" class="h-screen flex flex-col hidden">
        <header class="h-12 glass flex items-center justify-between px-8 border-b border-black/5 z-20">
            <h1 class="text-xs font-bold tracking-widest uppercase">Off-Road Design <span class="text-blue-600">v2.1</span></h1>
            <button onclick="generatePDF()" class="bg-blue-600 text-white text-[10px] px-4 py-1.5 rounded-full font-bold">REPORT</button>
        </header>

        <div class="flex-1 flex overflow-hidden">
            <aside class="w-80 glass border-r border-black/5 p-6 space-y-4 overflow-y-auto z-10">
                <h3 class="text-[10px] font-bold text-slate-400 uppercase">Load Factors</h3>
                
                <div class="space-y-2">
                    <label class="text-[9px] text-slate-500">Overload Factor (Ko) - Shock Load</label>
                    <select id="in-ko" onchange="updateDesign()">
                        <option value="1.0">Uniform (1.0)</option>
                        <option value="1.25">Light Shock (1.25)</option>
                        <option value="1.75" selected>Heavy Shock/Off-Road (1.75)</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <div><label class="text-[9px] text-slate-500">Power (kW)</label><input type="number" id="in-p" value="45" oninput="updateDesign()"></div>
                    <div><label class="text-[9px] text-slate-500">Input RPM</label><input type="number" id="in-n" value="3000" oninput="updateDesign()"></div>
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <div><label class="text-[9px] text-slate-500">Pinion Teeth (Z1)</label><input type="number" id="z1" value="15" oninput="updateDesign()"></div>
                    <div><label class="text-[9px] text-slate-500">Gear Teeth (Z2)</label><input type="number" id="z2" value="45" oninput="updateDesign()"></div>
                </div>
            </aside>

            <main class="flex-1 relative bg-[#f8fafc]">
                <div id="render-area" class="w-full h-full"></div>
            </main>

            <aside class="w-96 glass border-l border-black/5 p-6 overflow-y-auto z-10">
                <h2 class="text-xs font-bold text-slate-600 mb-4 uppercase">Industrial Calculation</h2>
                <div id="step-output" class="text-[11px] mono space-y-4"></div>
            </aside>
        </div>
    </div>

    <script>
        let scene, camera, renderer, controls, gear1, gear2;
        let pinionRotation = 0;

        function launchEngine() {
            document.getElementById('splash-screen').style.display = 'none';
            document.getElementById('main-engine').classList.remove('hidden');
            init();
            updateDesign();
        }

        function init() {
            const area = document.getElementById('render-area');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf8fafc);
            camera = new THREE.PerspectiveCamera(40, area.clientWidth / area.clientHeight, 1, 1000);
            camera.position.set(120, 100, 120);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(area.clientWidth, area.clientHeight);
            area.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const sun = new THREE.DirectionalLight(0xffffff, 0.6);
            sun.position.set(100, 200, 100);
            scene.add(sun);

            animate();
        }

        function updateDesign() {
            const P = parseFloat(document.getElementById('in-p').value);
            const N1 = parseFloat(document.getElementById('in-n').value);
            const z1 = parseInt(document.getElementById('z1').value);
            const z2 = parseInt(document.getElementById('z2').value);
            const Ko = parseFloat(document.getElementById('in-ko').value);
            const m = 4; // Design Module

            // 1. Velocity Ratio
            const i = z2 / z1;

            // 2. Pitch Line Velocity
            const v = (Math.PI * m * z1 * N1) / 60000;

            // 3. Dynamic Factor (Kv) - Industry Standard (Barth Equation for cut gears)
            const Kv = 3 / (3 + v); 

            // 4. Tangential Load with Off-Road Overload
            // Ft = (1000 * P * Ko) / (v * Kv)
            const Ft = (1000 * P * Ko) / (v); 

            document.getElementById('step-output').innerHTML = `
                <div class="p-3 bg-blue-50 border border-blue-100 rounded text-blue-800">
                    <b>OFF-ROAD SPECIFIC FACTORS</b><br>
                    Overload Factor (Ko): ${Ko}<br>
                    <i>Accounts for terrain impact/jumps.</i>
                </div>
                <div class="p-3 bg-slate-100 rounded">
                    <b>1. VELOCITY (v)</b><br>
                    v = π * m * z1 * n / 60000<br>
                    v = <b>${v.toFixed(2)} m/s</b>
                </div>
                <div class="p-3 bg-slate-100 rounded">
                    <b>2. DYNAMIC FACTOR (Kv)</b><br>
                    Kv = 3 / (3 + v) = <b>${Kv.toFixed(3)}</b><br>
                    <i>Industry adjustment for vibration at speed.</i>
                </div>
                <div class="p-3 bg-slate-100 rounded">
                    <b>3. EFFECTIVE LOAD (Feff)</b><br>
                    Feff = (Ft * Ko) / Kv<br>
                    Effective Tangential Load: <b>${(Ft / Kv).toFixed(2)} N</b>
                </div>
            `;

            update3D(z1, z2, m);
        }

        function update3D(z1, z2, m) {
            if (gear1) scene.remove(gear1);
            if (gear2) scene.remove(gear2);

            const dist = (z1 + z2) * m / 2;
            gear1 = createGear(z1, m, 0, 0x3b82f6);
            gear2 = createGear(z2, m, dist, 0x64748b);
            
            scene.add(gear1);
            scene.add(gear2);
        }

        function createGear(z, m, x, color) {
            const group = new THREE.Group();
            const pitchR = (z * m) / 2;
            const shape = new THREE.Shape();

            for(let i=0; i <= z*2; i++) {
                const a = (i/(z*2)) * Math.PI * 2;
                const r = i%2 === 0 ? pitchR + (m * 0.7) : pitchR - (m * 1.1);
                if (i === 0) shape.moveTo(Math.cos(a)*r, Math.sin(a)*r);
                else shape.lineTo(Math.cos(a)*r, Math.sin(a)*r);
            }

            const geo = new THREE.ExtrudeGeometry(shape, { depth: 10, bevelEnabled: false });
            const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color: color }));
            mesh.rotation.x = Math.PI/2;
            group.add(mesh);
            group.position.x = x;
            return group;
        }

        function animate() {
            requestAnimationFrame(animate);
            
            if (gear1 && gear2) {
                const z1 = parseInt(document.getElementById('z1').value);
                const z2 = parseInt(document.getElementById('z2').value);
                const i = z2 / z1;

                // Move gears (Rotating around the shaft axis)
                pinionRotation += 0.02;
                gear1.children[0].rotation.z = pinionRotation;
                gear2.children[0].rotation.z = -pinionRotation / i;
            }

            if(controls) controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>

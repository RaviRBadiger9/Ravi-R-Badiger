<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpurGear Pro | Multi-Stage Engineering Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #1e293b; margin: 0; overflow: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(0, 0, 0, 0.05); }
        input, select { background: #ffffff !important; border: 1px solid #cbd5e1 !important; color: #334155 !important; padding: 0.4rem; font-size: 0.7rem; border-radius: 6px; width: 100%; }
        #splash-screen { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(8px); z-index: 100; display: flex; align-items: center; justify-content: center; }
        .option-card { background: white; padding: 1.5rem; border-radius: 12px; width: 280px; cursor: pointer; border: 2px solid transparent; transition: all 0.3s; }
        .option-card:hover { transform: translateY(-5px); border-color: #3b82f6; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="max-w-5xl w-full px-8 text-center">
            <h2 class="text-white text-3xl font-bold mb-10">Select Transmission Architecture</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="option-card text-left" onclick="launchEngine('single')">
                    <h3 class="font-bold text-slate-800">Single Stage</h3>
                    <p class="text-xs text-slate-500 mt-2">1 Pair: Z1 → Z2</p>
                </div>
                <div class="option-card text-left" onclick="launchEngine('double')">
                    <h3 class="font-bold text-slate-800">Double Stage</h3>
                    <p class="text-xs text-slate-500 mt-2">2 Pairs: Z1→Z2 & Z3→Z4 (Parallel)</p>
                </div>
                <div class="option-card text-left" onclick="launchEngine('compound')">
                    <h3 class="font-bold text-slate-800">Compound Train</h3>
                    <p class="text-xs text-slate-500 mt-2">Z2 & Z3 share a shaft (Compact High Reduction)</p>
                </div>
            </div>
        </div>
    </div>

    <div id="main-engine" class="h-screen flex flex-col hidden">
        <header class="h-12 glass flex items-center justify-between px-8 border-b border-black/5 z-20">
            <div class="flex items-center gap-4">
                <button onclick="location.reload()" class="text-[10px] bg-slate-100 px-2 py-1 rounded">← MENU</button>
                <h1 class="text-xs font-bold tracking-widest uppercase text-slate-800">SpurGear <span id="mode-label" class="text-blue-600">--</span></h1>
            </div>
        </header>

        <div class="flex-1 flex overflow-hidden">
            <aside class="w-80 glass border-r border-black/5 p-5 space-y-4 overflow-y-auto z-10">
                
                <section>
                    <label class="text-[9px] text-slate-500 uppercase font-bold">Material & Surface Finish</label>
                    <select id="material-stress" onchange="updateDesign()">
                        <option value="47.1" data-color="#52525b">Cast Iron (Industrial Gray)</option>
                        <option value="138.3" data-color="#94a3b8">Cast Steel (Polished Silver)</option>
                        <option value="233.4" selected data-color="#1e40af">Steel C45 (Deep Blue)</option>
                        <option value="345.2" data-color="#b45309">Alloy Steel (Hardened Bronze)</option>
                    </select>
                </section>

                <section>
                    <label class="text-[9px] text-slate-500 uppercase font-bold">Module (m)</label>
                    <select id="module-sel" onchange="updateDesign()">
                        <option value="2">2.0</option>
                        <option value="3" selected>3.0</option>
                        <option value="5">5.0</option>
                    </select>
                </section>

                <div class="grid grid-cols-2 gap-2">
                    <div><label class="text-[9px] text-slate-500 uppercase font-bold">Z1 (Drive)</label><input type="number" id="z1" value="18" oninput="updateDesign()"></div>
                    <div><label class="text-[9px] text-slate-500 uppercase font-bold">Z2 (Driven)</label><input type="number" id="z2" value="45" oninput="updateDesign()"></div>
                </div>

                <div id="secondary-gears" class="hidden space-y-4 pt-2 border-t border-slate-200">
                    <div class="grid grid-cols-2 gap-2">
                        <div><label class="text-[9px] text-slate-500 uppercase font-bold">Z3</label><input type="number" id="z3" value="18" oninput="updateDesign()"></div>
                        <div><label class="text-[9px] text-slate-500 uppercase font-bold">Z4</label><input type="number" id="z4" value="45" oninput="updateDesign()"></div>
                    </div>
                </div>

                <section class="grid grid-cols-2 gap-2">
                    <div><label class="text-[9px] text-slate-500 uppercase font-bold">Power (kW)</label><input type="number" id="in-p" value="10"></div>
                    <div><label class="text-[9px] text-slate-500 uppercase font-bold">RPM (In)</label><input type="number" id="in-n" value="1440"></div>
                </section>
            </aside>

            <main class="flex-1 relative bg-[#f1f5f9]">
                <div id="render-area" class="w-full h-full"></div>
            </main>

            <aside id="data-panel" class="w-80 glass border-l border-black/5 p-6 overflow-y-auto z-10">
                <h2 class="text-xs font-bold text-slate-600 mb-6 uppercase tracking-widest">Engineering Summary</h2>
                <div id="step-output" class="text-[11px] mono space-y-4"></div>
            </aside>
        </div>
    </div>

    <script>
        let scene, camera, renderer, controls, gearGroup, currentMode;

        function launchEngine(mode) {
            currentMode = mode;
            document.getElementById('splash-screen').style.display = 'none';
            document.getElementById('main-engine').classList.remove('hidden');
            document.getElementById('mode-label').innerText = mode.toUpperCase();
            
            if(mode !== 'single') {
                document.getElementById('secondary-gears').classList.remove('hidden');
            }
            
            init();
            updateDesign();
        }

        function init() {
            const area = document.getElementById('render-area');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf1f5f9);
            camera = new THREE.PerspectiveCamera(40, area.clientWidth / area.clientHeight, 1, 2000);
            camera.position.set(150, 150, 150);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(area.clientWidth, area.clientHeight);
            area.appendChild(renderer.domElement);
            
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            
            const light1 = new THREE.DirectionalLight(0xffffff, 1);
            light1.position.set(100, 100, 100);
            scene.add(light1);
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            
            gearGroup = new THREE.Group();
            scene.add(gearGroup);
            animate();
        }

        function createHollowGear(z, m, color) {
            const outerR = (z * m) / 2;
            const innerR = outerR * 0.25; // 25% Shaft Hole
            const thickness = 10;

            const shape = new THREE.Shape();
            shape.absarc(0, 0, outerR, 0, Math.PI * 2, false);
            
            const holePath = new THREE.Path();
            holePath.absarc(0, 0, innerR, 0, Math.PI * 2, true);
            shape.holes.push(holePath);

            const extrudeSettings = { depth: thickness, bevelEnabled: true, bevelThickness: 1, bevelSize: 1 };
            const geometry = new THREE.ExtrudeGeometry(shape, extrudeSettings);
            const material = new THREE.MeshStandardMaterial({ 
                color: color, 
                metalness: 0.7, 
                roughness: 0.3 
            });
            
            const mesh = new THREE.Mesh(geometry, material);
            mesh.rotation.x = Math.PI / 2; // Flat on XZ plane
            return mesh;
        }

        function updateDesign() {
            if(!gearGroup) return;
            while(gearGroup.children.length > 0) gearGroup.remove(gearGroup.children[0]);
            
            const z1 = parseInt(document.getElementById('z1').value) || 1;
            const z2 = parseInt(document.getElementById('z2').value) || 1;
            const z3 = parseInt(document.getElementById('z3').value) || 1;
            const z4 = parseInt(document.getElementById('z4').value) || 1;
            const m = parseFloat(document.getElementById('module-sel').value);
            
            const matSelect = document.getElementById('material-stress');
            const matColor = matSelect.options[matSelect.selectedIndex].dataset.color;

            let totalRatio = (z2/z1);

            // STAGE 1: Z1 & Z2
            const g1 = createHollowGear(z1, m, matColor);
            gearGroup.add(g1);

            const g2 = createHollowGear(z2, m, matColor);
            const dist12 = (z1 * m + z2 * m) / 2;
            g2.position.x = dist12;
            gearGroup.add(g2);

            if(currentMode === 'double') {
                // Parallel Setup: Offset Z3 and Z4 along the Z-axis
                const zOffset = 30;
                const g3 = createHollowGear(z3, m, matColor);
                g3.position.z = zOffset;
                gearGroup.add(g3);

                const g4 = createHollowGear(z4, m, matColor);
                const dist34 = (z3 * m + z4 * m) / 2;
                g4.position.x = dist34;
                g4.position.z = zOffset;
                gearGroup.add(g4);
                totalRatio = `Stage 1: ${(z2/z1).toFixed(2)} | Stage 2: ${(z4/z3).toFixed(2)}`;
            } 
            else if(currentMode === 'compound') {
                // Compound Setup: Z2 and Z3 are on the same shaft
                // Gear Z3 is placed directly on top of Z2
                const g3 = createHollowGear(z3, m, matColor);
                g3.position.x = dist12;
                g3.position.y = 12; // Stacked slightly above
                gearGroup.add(g3);

                const g4 = createHollowGear(z4, m, matColor);
                const dist34 = (z3 * m + z4 * m) / 2;
                g4.position.x = dist12 + dist34;
                g4.position.y = 12;
                gearGroup.add(g4);
                totalRatio = ((z2/z1) * (z4/z3)).toFixed(2);
            }

            document.getElementById('step-output').innerHTML = `
                <div class="p-3 bg-blue-50 border border-blue-200 rounded">
                    <b class="text-blue-700 uppercase text-[9px]">Transmission Specs</b><br>
                    Module: ${m} mm<br>
                    Total Ratio: <b>${totalRatio}</b>
                </div>
                <div class="p-3 bg-slate-100 border border-slate-300 rounded">
                    <b class="text-slate-700 uppercase text-[9px]">Material Properties</b><br>
                    Grade Stress: ${matSelect.value} MPa<br>
                    Appearance: <span style="color:${matColor}">⬤</span> ${matSelect.options[matSelect.selectedIndex].text}
                </div>
            `;
        }

        function animate() {
            requestAnimationFrame(animate);
            if(controls) controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>

<!-- Enhanced Export Template (Hidden) -->
<div id="pdf-template" class="p-10 bg-white" style="width: 800px; color: #1e293b;">
    <div class="flex justify-between items-center border-b-4 border-slate-900 pb-4 mb-6">
        <div>
            <h1 class="text-3xl font-black uppercase tracking-tighter">Gear Analysis Report</h1>
            <p class="text-xs font-mono text-slate-500">Standards Compliance: IS:2535 / Lewis & Buckingham Theory</p>
        </div>
        <div class="text-right">
            <div id="pdf-date" class="text-[10px] font-bold"></div>
            <div class="text-[10px] text-blue-600 font-mono uppercase">System: SpurGear Pro v2.0</div>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-8 mb-8">
        <div class="border p-4 rounded bg-slate-50">
            <h3 class="text-xs font-bold mb-3 border-b pb-1 uppercase">1. Design Parameters</h3>
            <div id="pdf-params" class="text-[11px] space-y-1 font-mono"></div>
        </div>
        <div class="border p-4 rounded bg-slate-50">
            <h3 class="text-xs font-bold mb-3 border-b pb-1 uppercase">2. Material Specifications</h3>
            <div id="pdf-mats" class="text-[11px] space-y-1 font-mono"></div>
        </div>
    </div>

    <div class="mb-8 border p-4 rounded">
        <h3 class="text-xs font-bold mb-4 border-b pb-1 uppercase">3. Calculation Summary & Safety Check</h3>
        <div id="pdf-calc-summary" class="grid grid-cols-2 gap-4"></div>
    </div>

    <div class="grid grid-cols-1 gap-4">
        <div class="border p-4 rounded bg-slate-900 text-white">
            <h3 class="text-xs font-bold mb-2 uppercase text-blue-400">4. Engineering Conclusion</h3>
            <div id="pdf-conclusion" class="text-sm font-bold"></div>
        </div>
    </div>
</div>

<script>
async function generatePDF() {
    const { jsPDF } = window.jspdf;
    
    // Grab current data from UI
    const z1 = document.getElementById('z1').value;
    const z2 = document.getElementById('z2').value;
    const m = document.getElementById('module-sel').value;
    const p = document.getElementById('in-p').value;
    const n = document.getElementById('in-n').value;
    const sigma0 = document.getElementById('material-stress').value;
    const matText = document.getElementById('material-stress').options[document.getElementById('material-stress').selectedIndex].text;
    const loadType = document.getElementById('load-type').value;
    const toothSys = document.getElementById('tooth-system').value;
    
    // Inject Data into Template
    document.getElementById('pdf-date').innerText = new Date().toLocaleString();
    
    document.getElementById('pdf-params').innerHTML = `
        • Pinion Teeth (Z1): ${z1}<br>
        • Gear Teeth (Z2): ${z2}<br>
        • Velocity Ratio (i): ${(z2/z1).toFixed(2)}<br>
        • Input Module (m): ${m} mm<br>
        • Input Power (P): ${p} kW<br>
        • Rated Speed (n): ${n} RPM
    `;

    document.getElementById('pdf-mats').innerHTML = `
        • Selected Material: ${matText}<br>
        • Allowable Stress (σo): ${sigma0} MPa<br>
        • Tooth Profile: ${toothSys}° Involute<br>
        • Application Load: ${loadType.toUpperCase()}
    `;

    // Clone the summary cards from the UI to the PDF
    document.getElementById('pdf-calc-summary').innerHTML = document.getElementById('step-output').innerHTML;
    
    // Final Status Text
    const isSafe = document.getElementById('step-output').innerText.includes('DYNAMIC SAFE');
    document.getElementById('pdf-conclusion').innerHTML = isSafe 
        ? "✅ The gear pair meets both Static (Lewis) and Dynamic (Buckingham) criteria for the specified service life."
        : "❌ DESIGN FAILURE: The gear pair is insufficient for the dynamic load. Increase Module (m) or Face Width (b).";

    // Generate Canvas and PDF
    const template = document.getElementById('pdf-template');
    const canvas = await html2canvas(template, { 
        scale: 2,
        useCORS: true,
        logging: false
    });
    
    const doc = new jsPDF('p', 'mm', 'a4');
    const imgData = canvas.toDataURL('image/png');
    
    // Add Image to PDF (scaled to fit A4)
    const imgWidth = 190; 
    const pageHeight = 295;  
    const imgHeight = canvas.height * imgWidth / canvas.width;
    
    doc.addImage(imgData, 'PNG', 10, 10, imgWidth, imgHeight);
    
    // Optional: Add a text footer to every page
    doc.setFontSize(8);
    doc.text("Generated by SpurGear Pro Analytical Engineering Suite - Verified for MP Lab Journal", 10, 285);
    
    doc.save(`Gear_Analysis_${z1}T_${z2}T.pdf`);
}
</script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VibeSim | Fixed Viewport & Momentum</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; color: #fff; font-family: sans-serif; }
        
        /* Fixed Layout Grid */
        #app-container {
            display: grid;
            grid-template-columns: 300px 1fr;
            height: 100vh;
            width: 100vw;
        }

        /* Sidebar */
        #controls {
            background: #111;
            padding: 20px;
            border-right: 2px solid #333;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 100;
        }

        /* Main Viewport Area */
        #viewport-container {
            display: grid;
            grid-template-rows: 1fr 250px; /* Top: 3D, Bottom: Charts */
            background: #050505;
        }

        #canvas-3d { width: 100%; height: 100%; position: relative; }

        /* Chart Area */
        #charts-tray {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            padding: 10px;
            background: #000;
            border-top: 2px solid #222;
        }

        .chart-wrapper { background: #0a0a0a; border: 1px solid #222; height: 230px; position: relative; }

        input[type="range"] { width: 100%; }
        label { font-size: 12px; color: #888; }
        .val-text { color: #f59e0b; font-weight: bold; }
    </style>
</head>
<body>

<div id="app-container">
    <aside id="controls">
        <h3>CONTROLS</h3>
        <div>
            <label>MASS: <span id="v-m" class="val-text">2.0</span> kg</label>
            <input type="range" id="m" min="0.5" max="10" step="0.1" value="2.0">
        </div>
        <div>
            <label>STIFFNESS: <span id="v-k" class="val-text">200</span> N/m</label>
            <input type="range" id="k" min="50" max="1000" step="10" value="200">
        </div>
        <div>
            <label>DAMPING: <span id="v-c" class="val-text">1.0</span> Ns/m</label>
            <input type="range" id="c" min="0" max="10" step="0.1" value="1.0">
        </div>
        <div>
            <label>FREQ: <span id="v-w" class="val-text">5.0</span> rad/s</label>
            <input type="range" id="w" min="0" max="30" step="0.5" value="5.0">
        </div>
    </aside>

    <div id="viewport-container">
        <div id="canvas-3d"></div>
        
        <div id="charts-tray">
            <div class="chart-wrapper"><canvas id="c1"></canvas></div>
            <div class="chart-wrapper"><canvas id="c2"></canvas></div>
            <div class="chart-wrapper"><canvas id="c3"></canvas></div>
        </div>
    </div>
</div>

<script>
    // 1. Setup Simulation Engine
    const sim = {
        m: 2, k: 200, c: 1, w: 5, f0: 30,
        x: 0, v: 0, t: 0,
        update: function(dt) {
            const a = (this.f0 * Math.sin(this.w * this.t) - this.c * this.v - this.k * this.x) / this.m;
            this.v += a * dt;
            this.x += this.v * dt;
            this.t += dt;
            return { x: this.x, v: this.v, p: this.m * this.v };
        }
    };

    // 2. Setup 3D View (Three.js)
    const container = document.getElementById('canvas-3d');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    container.appendChild(renderer.domElement);

    // Add Lights
    const light = new THREE.DirectionalLight(0xffffff, 2);
    light.position.set(5, 5, 5);
    scene.add(light, new THREE.AmbientLight(0x404040));

    // Create Car
    const car = new THREE.Group();
    const body = new THREE.Mesh(new THREE.BoxGeometry(2, 0.5, 1), new THREE.MeshStandardMaterial({color: 0xf59e0b}));
    const top = new THREE.Mesh(new THREE.BoxGeometry(1, 0.4, 0.8), new THREE.MeshStandardMaterial({color: 0x222222}));
    top.position.y = 0.45;
    car.add(body, top);
    scene.add(car);

    // Create Spring (Visual)
    const springGeo = new THREE.CylinderGeometry(0.2, 0.2, 1, 8);
    const spring = new THREE.Mesh(springGeo, new THREE.MeshBasicMaterial({color: 0x444444, wireframe: true}));
    scene.add(spring);

    camera.position.set(5, 3, 10);
    camera.lookAt(0, 1, 0);

    // 3. Setup Charts (Chart.js)
    const chartConfig = (id, label, color) => new Chart(document.getElementById(id), {
        type: 'line',
        data: { labels: Array(50).fill(''), datasets: [{ label: label, data: Array(50).fill(0), borderColor: color, borderWidth: 2, pointRadius: 0 }] },
        options: { responsive: true, maintainAspectRatio: false, scales: { x: { display: false }, y: { beginAtZero: false } } }
    });

    const cX = chartConfig('c1', 'Displacement', '#f59e0b');
    const cV = chartConfig('c2', 'Velocity', '#3b82f6');
    const cP = chartConfig('c3', 'Momentum', '#ef4444');

    // 4. UI Listeners
    ['m','k','c','w'].forEach(p => {
        document.getElementById(p).oninput = (e) => {
            sim[p] = parseFloat(e.target.value);
            document.getElementById('v-'+p).innerText = sim[p].toFixed(1);
        };
    });

    // 5. Animation Loop
    function animate() {
        requestAnimationFrame(animate);
        const data = sim.update(0.016);
        
        // Move Car
        car.position.y = 2 + data.x;
        
        // Stretch Spring
        spring.scale.y = 2 + data.x;
        spring.position.y = (2 + data.x) / 2;

        // Update Charts
        [ [cX, data.x], [cV, data.v], [cP, data.p] ].forEach(pair => {
            pair[0].data.datasets[0].data.push(pair[1]);
            pair[0].data.datasets[0].data.shift();
            pair[0].update('none');
        });

        renderer.render(scene, camera);
    }
    animate();

    // Handle Resize
    window.onresize = () => {
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpurGear Pro | Industrial Design Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;700&display=swap');
        
        :root { 
            --accent: #3b82f6; 
            --bg-site: #0f172a; /* Deep Industrial Navy/Slate */
            --panel-bg: rgba(30, 41, 59, 0.8);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-site); 
            color: #f1f5f9; 
            margin: 0; 
            overflow: hidden; 
        }

        .mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Glassmorphism Panels */
        .glass { 
            background: var(--panel-bg); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }

        input, select { 
            background: #020617 !important; 
            border: 1px solid #334155 !important; 
            color: #60a5fa !important; 
            padding: 0.5rem; 
            font-size: 0.75rem; 
            border-radius: 6px; 
            width: 100%;
        }

        .step-card { 
            border-left: 3px solid var(--accent); 
            background: rgba(255, 255, 255, 0.03);
            padding: 15px; 
            margin-bottom: 20px; 
            border-radius: 0 8px 8px 0;
        }

        .scroll-v::-webkit-scrollbar { width: 5px; }
        .scroll-v::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        
        #canvas-container { background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); }
    </style>
</head>
<body>

    <div class="h-screen flex flex-col">
        <!-- TOP NAV -->
        <header class="h-14 glass flex items-center justify-between px-8 border-b border-white/5 z-20">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-blue-600 rounded flex items-center justify-center font-bold">G</div>
                <h1 class="text-sm font-bold tracking-widest uppercase">SpurGear <span class="text-blue-500">Pro V7</span></h1>
            </div>
            <div class="flex gap-6 text-[10px] mono text-slate-400">
                <span>BG: INDUSTRIAL SLATE</span>
                <span>ENGINE: THREE.JS EXTRUDE</span>
            </div>
        </header>

        <div class="flex-1 flex overflow-hidden">
            <!-- LEFT INPUTS -->
            <aside class="w-80 glass border-r border-white/5 p-6 space-y-6 overflow-y-auto scroll-v z-10">
                <section class="space-y-4">
                    <h2 class="text-[10px] font-bold text-blue-400 uppercase tracking-widest">1. Material Configuration</h2>
                    <div>
                        <label class="text-[9px] text-slate-400 block mb-1">Ultimate Tensile Strength (Sut)</label>
                        <select id="mat-sut" onchange="updateSystem()">
                            <option value="600">Steel C45 (600 MPa)</option>
                            <option value="400">Cast Iron (400 MPa)</option>
                            <option value="1000">Alloy Steel (1000 MPa)</option>
                        </select>
                    </div>
                </section>

                <section class="space-y-4">
                    <h2 class="text-[10px] font-bold text-blue-400 uppercase tracking-widest">2. Operating Conditions</h2>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-[9px] text-slate-400 block mb-1">Power (kW)</label>
                            <input type="number" id="in-p" value="15" step="0.5" oninput="updateSystem()">
                        </div>
                        <div>
                            <label class="text-[9px] text-slate-400 block mb-1">Input RPM</label>
                            <input type="number" id="in-n" value="1440" oninput="updateSystem()">
                        </div>
                    </div>
                </section>

                <section class="space-y-4">
                    <h2 class="text-[10px] font-bold text-blue-400 uppercase tracking-widest">3. Geometry Setup</h2>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-[9px] text-slate-400 block mb-1">Pinion Z1</label>
                            <input type="number" id="in-z1" value="18" oninput="updateSystem()">
                        </div>
                        <div>
                            <label class="text-[9px] text-slate-400 block mb-1">Gear Z2</label>
                            <input type="number" id="in-z2" value="54" oninput="updateSystem()">
                        </div>
                    </div>
                </section>

                <div class="p-4 bg-blue-500/5 rounded-lg border border-blue-500/20">
                    <p class="text-[10px] text-blue-300 mono leading-relaxed">
                        <b>3D Controls:</b><br>
                        • Left Click: Rotate<br>
                        • Scroll: Zoom In/Out<br>
                        • Right Click: Pan Camera
                    </p>
                </div>
            </aside>

            <!-- CENTER 3D VIEW -->
            <main class="flex-1 relative">
                <div id="canvas-container" class="w-full h-full"></div>
                
                <!-- REAL-TIME HUD -->
                <div class="absolute top-6 right-6 flex flex-col gap-2">
                    <div class="glass px-4 py-2 rounded border-l-4 border-blue-500">
                        <p class="text-[10px] text-slate-400 uppercase">System Ratio</p>
                        <p id="hud-ratio" class="text-xl font-bold mono">--</p>
                    </div>
                    <div class="glass px-4 py-2 rounded border-l-4 border-emerald-500">
                        <p class="text-[10px] text-slate-400 uppercase">Safety Factor</p>
                        <p id="hud-fs" class="text-xl font-bold mono">--</p>
                    </div>
                </div>
            </main>

            <!-- RIGHT ANALYTICS -->
            <aside class="w-96 glass border-l border-white/5 p-6 overflow-y-auto scroll-v z-10">
                <h2 class="text-xs font-bold text-blue-400 mb-6 uppercase tracking-tighter flex items-center gap-2">
                    <span class="w-2 h-2 bg-blue-500 rounded-full"></span> Design Calculation Steps
                </h2>
                <div id="calc-steps" class="space-y-6 text-[11px] mono">
                    <!-- Steps Injected Here -->
                </div>
            </aside>
        </div>
    </div>

    <script>
        let scene, camera, renderer, controls, gearGroup;
        const MODULES = [1, 1.25, 1.5, 2, 2.5, 3, 4, 5, 6, 8, 10, 12];

        function init() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(50, 40, 80);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            const ambient = new THREE.AmbientLight(0xffffff, 0.6);
            const spot = new THREE.SpotLight(0xffffff, 1);
            spot.position.set(50, 100, 50);
            scene.add(ambient, spot);

            gearGroup = new THREE.Group();
            scene.add(gearGroup);

            updateSystem();
            animate();
        }

        function createGearMesh(z, m, color, x, speed) {
            const pitchR = (z * m) / 2;
            const shape = new THREE.Shape();
            const segments = z * 2;
            
            for(let i=0; i <= segments; i++) {
                const angle = (i / segments) * Math.PI * 2;
                const r = i % 2 === 0 ? pitchR + m : pitchR - (1.25 * m);
                const px = Math.cos(angle) * r;
                const py = Math.sin(angle) * r;
                if(i === 0) shape.moveTo(px, py); else shape.lineTo(px, py);
            }

            const geo = new THREE.ExtrudeGeometry(shape, { depth: 10, bevelEnabled: true, bevelSize: 0.3 });
            const mat = new THREE.MeshStandardMaterial({ 
                color: color, 
                metalness: 0.9, 
                roughness: 0.1,
                envMapIntensity: 1
            });
            
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, 0, 0);
            mesh.rotation.x = Math.PI/2;
            mesh.userData = { speed };
            return mesh;
        }

        function updateSystem() {
            while(gearGroup.children.length > 0) gearGroup.remove(gearGroup.children[0]);
            
            const P = parseFloat(document.getElementById('in-p').value) * 1000;
            const n = parseFloat(document.getElementById('in-n').value);
            const Sut = parseInt(document.getElementById('mat-sut').value);
            const z1 = parseInt(document.getElementById('in-z1').value);
            const z2 = parseInt(document.getElementById('in-z2').value);

            // Calculation Logic
            const sig_b = Sut / 3;
            const y1 = 0.154 - (0.912/z1);
            const y2 = 0.154 - (0.912/z2);
            
            // Weaker member is pinion if same material
            const Y = Math.PI * y1; 
            const Mt = (9550 * (P/1000)) / n;
            const Cs = 1.5;

            // Solve for module
            let m_req = Math.pow((2 * Mt * 1000 * Cs) / (sig_b * 10 * z1 * Y), 1/3);
            const m = MODULES.find(v => v >= m_req) || m_req;

            // Strength Checks
            const dp = m * z1;
            const v = (Math.PI * dp * n) / 60000;
            const Cv = 3 / (3 + v);
            const Sb = m * (10*m) * sig_b * Y;
            const Ft = (P * Cs) / (v || 1);
            const Feff = Ft / Cv;
            const fs = Sb / Feff;

            // UI Updates
            document.getElementById('hud-ratio').innerText = (z2/z1).toFixed(2) + ":1";
            document.getElementById('hud-fs').innerText = fs.toFixed(2);
            document.getElementById('hud-fs').style.color = fs > 1.5 ? '#10b981' : '#f43f5e';

            renderCalculationSteps(sig_b, Mt, m, Sb, Feff, fs);

            // 3D Rendering
            const centerDist = (z1 + z2) * m / 2;
            const pinion = createGearMesh(z1, m, 0x3b82f6, 0, 1);
            const gear = createGearMesh(z2, m, 0x64748b, centerDist, -(z1/z2));
            
            gearGroup.add(pinion, gear);
            gearGroup.position.x = -centerDist/2;
        }

        function renderCalculationSteps(sig, Mt, m, Sb, Feff, fs) {
            const container = document.getElementById('calc-steps');
            container.innerHTML = `
                <div class="step-card">
                    <p class="text-blue-400 font-bold mb-2">1. Material Properties</p>
                    <p>• Permissible Stress (σb): ${sig.toFixed(2)} MPa</p>
                    <p>• Service Factor (Cs): 1.5</p>
                </div>
                <div class="step-card">
                    <p class="text-blue-400 font-bold mb-2">2. Load Calculation</p>
                    <p>• Rated Torque (Mt): ${Mt.toFixed(2)} Nm</p>
                    <p>• Design Torque: ${(Mt * 1.5).toFixed(2)} Nm</p>
                </div>
                <div class="step-card">
                    <p class="text-blue-400 font-bold mb-2">3. Module Selection</p>
                    <p>• Lewis Equation solve... </p>
                    <p>• Req Module: ${m.toFixed(2)} mm</p>
                    <p class="text-emerald-400">• Standardized: ${m} mm</p>
                </div>
                <div class="step-card">
                    <p class="text-blue-400 font-bold mb-2">4. Dynamic Analysis</p>
                    <p>• Beam Strength (Sb): ${Math.round(Sb)} N</p>
                    <p>• Effective Load (Feff): ${Math.round(Feff)} N</p>
                    <p class="font-bold mt-2 ${fs > 1.5 ? 'text-emerald-500' : 'text-red-400'}">
                        RESULT: ${fs > 1.5 ? 'SAFE' : 'RE-DESIGN'} (FS: ${fs.toFixed(2)})
                    </p>
                </div>
            `;
        }

        function animate() {
            requestAnimationFrame(animate);
            if(controls) controls.update();
            gearGroup.children.forEach(g => {
                g.rotation.z += 0.01 * g.userData.speed;
            });
            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>

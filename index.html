<!-- Replace your Aside Input section with this CVT-specific block -->
<aside class="w-80 glass border-r border-black/5 p-6 space-y-4 overflow-y-auto z-10">
    <h3 class="text-[10px] font-bold text-slate-400 uppercase">CVT System Parameters</h3>
    
    <div class="grid grid-cols-2 gap-2">
        <div><label class="text-[9px] text-slate-500">Power (kW)</label><input type="number" id="in-p" value="15.0" oninput="updateCVT()"></div>
        <div><label class="text-[9px] text-slate-500">Input RPM</label><input type="number" id="in-n" value="4500" oninput="updateCVT()"></div>
    </div>

    <hr class="border-slate-100">
    <h3 class="text-[10px] font-bold text-slate-400 uppercase">Variator Limits</h3>
    
    <div class="grid grid-cols-2 gap-2">
        <div><label class="text-[9px] text-slate-500">Min Ratio (OD)</label><input type="number" id="cvt-min" value="0.5" step="0.1" oninput="updateCVT()"></div>
        <div><label class="text-[9px] text-slate-500">Max Ratio (Low)</label><input type="number" id="cvt-max" value="2.5" step="0.1" oninput="updateCVT()"></div>
    </div>

    <!-- The Simulation Slider -->
    <div>
        <label class="text-[9px] text-slate-500">Active Shift Simulation</label>
        <input type="range" id="cvt-slider" min="0.5" max="2.5" step="0.05" value="1.0" oninput="updateCVT()">
        <div class="flex justify-between text-[10px] mono text-blue-600 mt-1">
            <span>Overdrive</span>
            <span id="slider-val">1.00</span>
            <span>Low Gear</span>
        </div>
    </div>

    <div class="p-3 bg-amber-50 border border-amber-100 rounded text-[10px] text-amber-700">
        * Visualization: Dynamic pulley sheave spacing relative to belt pitch radius.
    </div>
</aside>

<script>
    // Logic for CVT Analytics
    function updateCVT() {
        const P = parseFloat(document.getElementById('in-p').value);
        const Ni = parseFloat(document.getElementById('in-n').value);
        const ratio = parseFloat(document.getElementById('cvt-slider').value);
        
        document.getElementById('slider-val').innerText = ratio.toFixed(2);

        // 1. Output Speed
        const No = Ni / ratio;

        // 2. Torque (Nm)
        const Ti = (P * 60000) / (2 * Math.PI * Ni);
        const To = Ti * ratio * 0.85; // 85% approx efficiency for friction belt

        // 3. Belt Dynamics (assuming 150mm mean driver diameter)
        const D_driver = 150 / Math.sqrt(ratio); 
        const D_driven = D_driver * ratio;
        const v = (Math.PI * D_driver * Ni) / 60000;
        const Ft = (P * 1000) / v;

        document.getElementById('step-output').innerHTML = `
            <div class="space-y-4">
                <div class="p-3 bg-slate-100 rounded">
                    <b class="text-blue-600">CVT KINEMATICS</b><br>
                    Current Ratio: <b>${ratio.toFixed(2)}:1</b><br>
                    Output Speed: <b>${No.toFixed(0)} RPM</b><br>
                    Belt Velocity: <b>${v.toFixed(2)} m/s</b>
                </div>
                <div class="p-3 bg-slate-100 rounded">
                    <b class="text-blue-600">FORCE ANALYSIS</b><br>
                    Input Torque: ${Ti.toFixed(2)} Nm<br>
                    Output Torque: <b>${To.toFixed(2)} Nm</b><br>
                    Effective Tension ($F_t$): <b>${Ft.toFixed(1)} N</b>
                </div>
                ${v > 40 ? `<div class="p-2 bg-red-100 text-red-700 rounded text-[10px]"><b>WARNING:</b> Velocity exceeds 40m/s. High centrifugal stress.</div>` : ''}
            </div>
        `;

        // Update your 3D function here using D_driver and D_driven for radii
        update3D_CVT(D_driver, D_driven);
    }
</script>

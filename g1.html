<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DriveSense // Vehicle Dynamics</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --panel: #1a1a1d;
            --accent: #ff3e3e;
            --trim: #444;
            --screen: #0a0a0a;
        }

        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: 'Inter', sans-serif; overflow: hidden; color: #fff; }

        /* Dashboard Layout */
        #dashboard-frame {
            display: flex;
            flex-direction: column;
            height: 100vh;
            border: 15px solid #111;
            box-sizing: border-box;
        }

        /* Top 3D Viewport */
        #view-area {
            flex: 1;
            position: relative;
            background: radial-gradient(circle at center, #222 0%, #000 100%);
            border-bottom: 5px solid var(--trim);
        }

        /* Bottom Console */
        #console-area {
            height: 320px;
            background: var(--panel);
            display: grid;
            grid-template-columns: 300px 1fr 300px;
            padding: 20px;
            gap: 20px;
        }

        /* Control Stack */
        .stack { display: flex; flex-direction: column; gap: 15px; }
        .control-knob { background: var(--screen); padding: 10px; border-radius: 8px; border: 1px solid var(--trim); }
        .label { font-size: 0.65rem; color: #888; text-transform: uppercase; margin-bottom: 5px; letter-spacing: 1px; }
        .value { color: var(--accent); font-family: monospace; font-weight: bold; float: right; }

        input[type="range"] { width: 100%; accent-color: var(--accent); }

        /* Telemetry Screens */
        #telemetry-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
        }
        .screen { background: var(--screen); border: 2px solid #222; border-radius: 4px; padding: 5px; position: relative; }
        
        /* HUD Badge */
        #hud-overlay {
            position: absolute; top: 20px; right: 20px;
            text-align: right; pointer-events: none;
        }
        .speedo { font-size: 2rem; font-weight: 900; color: var(--accent); }
    </style>
</head>
<body>

<div id="dashboard-frame">
    <div id="view-area">
        <div id="canvas-3d" style="width:100%; height:100%;"></div>
        <div id="hud-overlay">
            <div class="label">Instant Momentum</div>
            <div class="speedo" id="mom-val">0.00</div>
            <div class="label">P-UNIT (kg·m/s)</div>
        </div>
    </div>

    <div id="console-area">
        <div class="stack">
            <div class="label" style="font-weight: bold; color: #fff;">Suspension Tuning</div>
            <div class="control-knob">
                <div class="label">Vehicle Mass <span class="value" id="out-m">2.0 kg</span></div>
                <input type="range" id="m" min="0.5" max="10" step="0.1" value="2.0">
            </div>
            <div class="control-knob">
                <div class="label">Spring Rate (k) <span class="value" id="out-k">200 N/m</span></div>
                <input type="range" id="k" min="50" max="1000" step="10" value="200">
            </div>
        </div>

        <div id="telemetry-grid">
            <div class="screen"><canvas id="cX"></canvas></div>
            <div class="screen"><canvas id="cV"></canvas></div>
            <div class="screen"><canvas id="cP"></canvas></div>
        </div>

        <div class="stack">
            <div class="label" style="font-weight: bold; color: #fff;">Road Conditions</div>
            <div class="control-knob">
                <div class="label">Damping (c) <span class="value" id="out-c">1.0 Ns/m</span></div>
                <input type="range" id="c" min="0" max="10" step="0.1" value="1.0">
            </div>
            <div class="control-knob">
                <div class="label">Bumpy Freq (ω) <span class="value" id="out-w">5.0 rad/s</span></div>
                <input type="range" id="w" min="0" max="30" step="0.5" value="5.0">
            </div>
        </div>
    </div>
</div>

<script>
    // --- PHYSICS KERNEL ---
    class CarPhysics {
        constructor() {
            this.m = 2; this.k = 200; this.c = 1; this.w = 5; this.f0 = 30;
            this.x = 0; this.v = 0; this.t = 0;
        }
        update(dt) {
            const accel = (this.f0 * Math.sin(this.w * this.t) - this.c * this.v - this.k * this.x) / this.m;
            this.v += accel * dt;
            this.x += this.v * dt;
            this.t += dt;
            return { x: this.x, v: this.v, p: this.m * this.v };
        }
    }

    // --- 3D SCENE ---
    const container = document.getElementById('canvas-3d');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(40, container.clientWidth/container.clientHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    container.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.4));
    const sun = new THREE.DirectionalLight(0xffffff, 1.5); sun.position.set(5, 10, 5);
    scene.add(sun);

    // Dashboard Plate
    const plate = new THREE.Mesh(new THREE.CylinderGeometry(4, 4, 0.2, 32), new THREE.MeshStandardMaterial({color: 0x111111, metalness: 0.8}));
    scene.add(plate);

    // Car Asset
    const car = new THREE.Group();
    const body = new THREE.Mesh(new THREE.BoxGeometry(2, 0.5, 1), new THREE.MeshStandardMaterial({color: 0xff3e3e, metalness: 0.9, roughness: 0.2}));
    const cabin = new THREE.Mesh(new THREE.BoxGeometry(1, 0.4, 0.8), new THREE.MeshStandardMaterial({color: 0x222222}));
    cabin.position.y = 0.4;
    car.add(body, cabin);
    scene.add(car);

    // Spring Asset
    const spring = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 1, 12), new THREE.MeshStandardMaterial({color: 0x888888, wireframe: true}));
    scene.add(spring);

    camera.position.set(8, 6, 12);
    camera.lookAt(0, 1.5, 0);

    // --- TELEMETRY ---
    const chartConfig = (id, label, color) => new Chart(document.getElementById(id), {
        type: 'line',
        data: { labels: Array(30).fill(''), datasets: [{ label: label, data: Array(30).fill(0), borderColor: color, borderWidth: 2, pointRadius: 0 }] },
        options: { responsive: true, maintainAspectRatio: false, scales: { x: { display: false }, y: { grid: { color: '#222' } } }, plugins: { legend: { labels: { color: '#888', font: { size: 9 } } } } }
    });

    const charts = { x: chartConfig('cX', 'HEIGHT', '#fff'), v: chartConfig('cV', 'VELOCITY', '#ff3e3e'), p: chartConfig('cP', 'MOMENTUM', '#555') };

    // --- SYSTEM LOGIC ---
    const physics = new CarPhysics();
    ['m','k','c','w'].forEach(id => {
        document.getElementById(id).oninput = (e) => {
            physics[id] = parseFloat(e.target.value);
            document.getElementById('out-'+id).innerText = physics[id].toFixed(1);
        };
    });

    function loop() {
        requestAnimationFrame(loop);
        const d = physics.update(0.016);
        
        // Update 3D
        car.position.y = 2.5 + d.x;
        spring.scale.y = 2.5 + d.x;
        spring.position.y = (2.5 + d.x) / 2;

        // Update HUD
        document.getElementById('mom-val').innerText = Math.abs(d.p).toFixed(2);

        // Update Charts
        [['x', d.x], ['v', d.v], ['p', d.p]].forEach(([k, v]) => {
            charts[k].data.datasets[0].data.push(v);
            charts[k].data.datasets[0].data.shift();
            charts[k].update('none');
        });

        renderer.render(scene, camera);
    }
    loop();
</script>
</body>
</html>
